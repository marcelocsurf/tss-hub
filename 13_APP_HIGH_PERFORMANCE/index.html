<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>TSS — The Surf Sequence® | El Salvador 2026</title>
<meta name="theme-color" content="#00C9E8">
<link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🌊</text></svg>">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,300;0,9..40,400;0,9..40,500;0,9..40,600;0,9..40,700;1,9..40,400&family=Space+Mono:wght@400;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jspdf/2.5.1/jspdf.umd.min.js"></script>
<style>
:root{
  --bg:#040810;--bg2:#080E16;--bg3:#0C141E;
  --cyan:#00C9E8;--cyan2:#00A8C4;--cyan3:rgba(0,201,232,.07);
  --green:#22C55E;--red:#EF4444;--amber:#F59E0B;--purple:#A855F7;
  --white:#EDF2F7;--grey:#5A7A8A;
  --border:rgba(0,201,232,.14);--border2:rgba(255,255,255,.055);
  --glass:rgba(255,255,255,.025);--r:16px;--r2:11px;
  --shadow:0 1px 3px rgba(0,0,0,.4),0 4px 16px rgba(0,0,0,.3);
  --shadow-cyan:0 0 0 1px rgba(0,201,232,.15),0 4px 24px rgba(0,201,232,.12);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent;}
html{scroll-behavior:smooth;}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--white);min-height:100vh;overflow-x:hidden;font-size:14px;line-height:1.6;max-width:480px;margin:0 auto;-webkit-font-smoothing:antialiased;}
body::before{content:'';position:fixed;inset:0;background:radial-gradient(ellipse 70% 50% at 75% 5%,rgba(0,201,232,.07) 0%,transparent 55%),radial-gradient(ellipse 50% 70% at 15% 95%,rgba(0,168,196,.05) 0%,transparent 50%),radial-gradient(ellipse 30% 30% at 50% 50%,rgba(0,201,232,.02) 0%,transparent 70%);pointer-events:none;z-index:0;}

#loading{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;z-index:9000;flex-direction:column;gap:16px;}
.spinner{width:36px;height:36px;border:3px solid rgba(0,201,232,.15);border-top-color:var(--cyan);border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg)}}
#toast{position:fixed;top:20px;left:50%;transform:translateX(-50%) translateY(-80px);background:rgba(8,14,22,.96);border:1px solid rgba(0,201,232,.3);color:var(--white);padding:11px 22px;border-radius:30px;font-size:13px;z-index:8000;transition:transform .3s cubic-bezier(.34,1.56,.64,1);white-space:nowrap;max-width:90vw;backdrop-filter:blur(12px);box-shadow:0 4px 20px rgba(0,0,0,.5),0 0 0 1px rgba(0,201,232,.1);font-family:'DM Sans',sans-serif;}
#toast.show{transform:translateX(-50%) translateY(0);}
#toast.error{border-color:var(--red);color:var(--red);}
#toast.success{border-color:var(--green);color:var(--green);}

/* LANDING */
#landingScreen{display:none;position:relative;z-index:1;min-height:100vh;align-items:center;justify-content:center;flex-direction:column;padding:40px 24px;text-align:center;}
#landingScreen.active{display:flex;}
.tss-wave-svg{width:80px;height:58px;margin-bottom:14px;}
.tss-name{font-size:14px;font-weight:300;letter-spacing:5px;color:var(--white);text-transform:uppercase;margin-bottom:4px;opacity:.9;}
.tss-tagline{font-size:12px;letter-spacing:2px;color:var(--cyan);font-weight:400;}
.pin-display{display:flex;gap:14px;justify-content:center;margin-bottom:20px;}
.pin-dot{width:14px;height:14px;border-radius:50%;border:2px solid var(--grey);transition:all .2s;}
.pin-dot.filled{background:var(--cyan);border-color:var(--cyan);box-shadow:0 0 10px rgba(0,201,232,.5);}
.pin-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:10px;max-width:260px;margin:0 auto;}
.pin-btn{background:linear-gradient(135deg,rgba(15,24,32,.9) 0%,rgba(8,14,22,.9) 100%);border:1px solid rgba(255,255,255,.07);border-radius:var(--r2);color:var(--white);font-size:20px;font-weight:700;padding:16px;cursor:pointer;transition:all .15s cubic-bezier(.4,0,.2,1);font-family:'Space Mono',monospace;box-shadow:0 2px 8px rgba(0,0,0,.4),inset 0 1px 0 rgba(255,255,255,.05);}
.pin-btn:active{background:rgba(0,201,232,.12);border-color:rgba(0,201,232,.3);transform:scale(.93);box-shadow:0 0 12px rgba(0,201,232,.2);}
.pin-btn.del{font-size:16px;color:var(--grey);}
.pin-btn.zero{grid-column:2;}
#athPinErr{display:none;color:var(--red);font-size:12px;text-align:center;margin-top:10px;}

/* BUTTONS */
.btn{padding:14px 20px;border-radius:var(--r2);border:none;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:600;cursor:pointer;transition:all .18s cubic-bezier(.4,0,.2,1);display:flex;align-items:center;justify-content:center;gap:9px;letter-spacing:.2px;width:100%;}
.btn-cyan{background:var(--cyan);color:#050A0F;}
.btn-cyan:hover{background:linear-gradient(135deg,#00DCff 0%,var(--cyan) 100%);transform:translateY(-1px);box-shadow:0 6px 24px rgba(0,201,232,.35);}
.btn-outline{background:transparent;border:1px solid var(--border);color:var(--white);}
.btn-outline:hover{border-color:var(--cyan);color:var(--cyan);}
.btn-ghost{background:var(--glass);border:1px solid var(--border2);color:var(--grey);}
.btn-green{background:rgba(34,197,94,.1);border:1px solid rgba(34,197,94,.2);color:var(--green);}
.btn-amber{background:rgba(245,158,11,.1);border:1px solid rgba(245,158,11,.2);color:var(--amber);}
.btn-red{background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.2);color:var(--red);}
.btn-purple{background:rgba(168,85,247,.1);border:1px solid rgba(168,85,247,.2);color:var(--purple);}
.btn-sm{padding:7px 14px;font-size:12px;border-radius:8px;width:auto;}
.btn-xs{padding:5px 10px;font-size:11px;border-radius:7px;width:auto;}

header{padding:10px 16px;display:flex;align-items:center;justify-content:space-between;gap:8px;border-bottom:1px solid rgba(255,255,255,.05);background:rgba(4,8,16,.88);backdrop-filter:blur(20px) saturate(1.2);-webkit-backdrop-filter:blur(20px) saturate(1.2);position:sticky;top:0;z-index:200;}
.hdr-logo{display:flex;align-items:center;gap:8px;cursor:pointer;}
.hdr-logo-svg{width:28px;height:20px;flex-shrink:0;}
.hdr-logo-text{font-size:13px;font-weight:600;color:var(--white);letter-spacing:.5px;}
.hdr-logo-text span{display:block;font-size:9px;font-weight:400;color:var(--grey);letter-spacing:.5px;margin-top:-1px;}
.role-chip{font-size:9px;font-weight:700;letter-spacing:1px;text-transform:uppercase;padding:3px 8px;border-radius:20px;}
.rc-coach{background:rgba(245,158,11,.1);color:var(--amber);border:1px solid rgba(245,158,11,.2);}
.rc-acoach{background:rgba(168,85,247,.1);color:var(--purple);border:1px solid rgba(168,85,247,.2);}
.rc-athlete{background:rgba(34,197,94,.1);color:var(--green);border:1px solid rgba(34,197,94,.2);}
.logout-btn{background:transparent;border:1px solid var(--border2);color:var(--grey);font-family:'Inter',sans-serif;font-size:11px;padding:5px 10px;border-radius:8px;cursor:pointer;}

.bottom-nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:rgba(4,8,16,.92);border-top:1px solid rgba(255,255,255,.05);backdrop-filter:blur(24px) saturate(1.3);-webkit-backdrop-filter:blur(24px) saturate(1.3);display:flex;z-index:300;padding-bottom:env(safe-area-inset-bottom,0);}
.nav-btn{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:10px 4px 8px;cursor:pointer;border:none;background:none;color:var(--grey);font-size:9.5px;gap:4px;font-family:'DM Sans',sans-serif;font-weight:500;transition:color .2s,opacity .2s;letter-spacing:.3px;}
.nav-btn .icon{font-size:20px;}
.nav-btn.active{color:var(--cyan);}

#appShell{display:none;position:relative;z-index:1;}
#appShell.active{display:block;}
#mainContent{padding:16px 14px 100px;min-height:calc(100vh - 52px);}

.card{background:var(--bg2);border:1px solid var(--border2);border-radius:var(--r);padding:16px;margin-bottom:10px;box-shadow:var(--shadow);transition:border-color .2s;}
.card-cyan{background:linear-gradient(135deg,rgba(0,201,232,.06) 0%,rgba(0,168,196,.03) 100%);border-color:var(--border);box-shadow:var(--shadow-cyan);}
.card-green{background:linear-gradient(135deg,rgba(34,197,94,.06) 0%,rgba(34,197,94,.02) 100%);border-color:rgba(34,197,94,.18);box-shadow:0 0 0 1px rgba(34,197,94,.08),0 4px 16px rgba(0,0,0,.3);}
.card-amber{background:linear-gradient(135deg,rgba(245,158,11,.06) 0%,rgba(245,158,11,.02) 100%);border-color:rgba(245,158,11,.18);}
.card-purple{background:linear-gradient(135deg,rgba(168,85,247,.06) 0%,rgba(168,85,247,.02) 100%);border-color:rgba(168,85,247,.18);}

.sec-title{font-size:10px;font-weight:700;letter-spacing:1.8px;text-transform:uppercase;color:var(--grey);font-family:'Space Mono',monospace;margin-bottom:10px;opacity:.8;}
.page-title{font-size:20px;font-weight:800;color:var(--white);letter-spacing:-.5px;margin-bottom:2px;}
.page-sub{font-size:12px;color:var(--grey);margin-bottom:16px;}

.chip{display:inline-flex;align-items:center;font-size:10px;font-weight:700;letter-spacing:.8px;text-transform:uppercase;padding:3px 10px;border-radius:20px;}
.chip-cyan{background:rgba(0,201,232,.1);color:var(--cyan);border:1px solid rgba(0,201,232,.25);}
.chip-green{background:rgba(34,197,94,.1);color:var(--green);border:1px solid rgba(34,197,94,.2);}
.chip-red{background:rgba(239,68,68,.1);color:var(--red);border:1px solid rgba(239,68,68,.2);}
.chip-amber{background:rgba(245,158,11,.1);color:var(--amber);border:1px solid rgba(245,158,11,.2);}
.chip-grey{background:rgba(255,255,255,.05);color:var(--grey);border:1px solid rgba(255,255,255,.08);}
.chip-purple{background:rgba(168,85,247,.1);color:var(--purple);border:1px solid rgba(168,85,247,.2);}

.inp-label{font-size:10px;font-weight:600;color:var(--grey);letter-spacing:.8px;text-transform:uppercase;margin-bottom:5px;margin-top:12px;display:block;}
.inp{width:100%;background:rgba(255,255,255,.03);border:1px solid var(--border2);border-radius:10px;padding:11px 14px;color:var(--white);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;transition:border-color .2s,box-shadow .2s;}
.inp:focus{border-color:rgba(0,201,232,.5);box-shadow:0 0 0 3px rgba(0,201,232,.08);}
.inp::placeholder{color:rgba(255,255,255,.2);}
.ta{width:100%;background:rgba(255,255,255,.03);border:1px solid var(--border2);border-radius:10px;padding:11px 14px;color:var(--white);font-family:'DM Sans',sans-serif;font-size:13px;outline:none;resize:none;min-height:64px;transition:border-color .2s,box-shadow .2s;}
.ta:focus{border-color:rgba(0,201,232,.5);box-shadow:0 0 0 3px rgba(0,201,232,.08);}
.ta::placeholder{color:rgba(255,255,255,.2);}
.sel{background:var(--glass);border:1px solid var(--border2);border-radius:9px;padding:9px 12px;color:var(--white);font-family:'Inter',sans-serif;font-size:13px;cursor:pointer;outline:none;appearance:none;width:100%;}
.sel:focus{border-color:var(--cyan);}
.sel option{background:var(--bg);}

.scale-row{display:flex;gap:5px;flex-wrap:wrap;margin-top:6px;}
.se-n{width:38px;height:38px;border-radius:9px;border:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.02);color:var(--grey);font-size:13px;font-weight:700;cursor:pointer;transition:all .15s cubic-bezier(.4,0,.2,1);font-family:'Space Mono',monospace;display:flex;align-items:center;justify-content:center;}
.se-n:hover{border-color:var(--cyan);color:var(--cyan);}
.se-n.on{background:var(--cyan);border-color:var(--cyan);color:#050A0F;}
.se-n.on-green{background:var(--green);border-color:var(--green);color:#050A0F;}
.se-n.on-amber{background:var(--amber);border-color:var(--amber);color:#050A0F;}

.save-btn{width:100%;padding:14px;border-radius:var(--r2);border:none;background:linear-gradient(135deg,var(--cyan) 0%,var(--cyan2) 100%);color:#040810;font-family:'DM Sans',sans-serif;font-size:14px;font-weight:700;cursor:pointer;transition:all .18s cubic-bezier(.4,0,.2,1);margin-top:8px;letter-spacing:.2px;}
.save-btn:hover{background:#00DCff;transform:translateY(-1px);box-shadow:0 4px 16px rgba(0,201,232,.25);}

.stat-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:8px;margin-bottom:12px;}
.stat-box{background:linear-gradient(135deg,var(--bg2) 0%,var(--bg3) 100%);border:1px solid var(--border2);border-radius:var(--r2);padding:14px 12px;text-align:center;box-shadow:var(--shadow);}
.stat-n{font-size:28px;font-weight:800;color:var(--cyan);line-height:1;letter-spacing:-1px;font-family:'Space Mono',monospace;}
.stat-l{font-size:9px;color:var(--grey);margin-top:3px;letter-spacing:1px;text-transform:uppercase;}

.ath-row{display:flex;align-items:center;gap:12px;padding:13px 14px;background:linear-gradient(135deg,var(--bg2) 0%,var(--bg3) 100%);border:1px solid var(--border2);border-radius:var(--r);margin-bottom:8px;cursor:pointer;transition:all .18s;box-shadow:var(--shadow);}
.ath-row:hover{border-color:rgba(0,201,232,.25);transform:translateY(-1px);box-shadow:0 4px 20px rgba(0,0,0,.4),0 0 0 1px rgba(0,201,232,.1);}
.ath-avatar{width:42px;height:42px;border-radius:50%;background:rgba(0,201,232,.1);border:1px solid rgba(0,201,232,.2);display:flex;align-items:center;justify-content:center;font-size:18px;font-weight:800;color:var(--cyan);flex-shrink:0;font-family:'Space Mono',monospace;}
.ath-info{flex:1;min-width:0;}
.ath-name{font-size:14px;font-weight:600;color:var(--white);}
.ath-meta{font-size:11px;color:var(--grey);margin-top:2px;}

.status-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;}
.dot-active{background:var(--green);}
.dot-inactive{background:var(--red);}

.prog-bar{height:4px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden;margin-top:6px;}
.prog-fill{height:100%;background:linear-gradient(90deg,var(--cyan2),var(--cyan),#40E0F5);border-radius:4px;transition:width .6s cubic-bezier(.4,0,.2,1);box-shadow:0 0 8px rgba(0,201,232,.3);}

.week-card{border-radius:var(--r);padding:16px;background:var(--bg2);border:1px solid var(--border2);margin-bottom:10px;}
.week-card.current{border-color:rgba(0,201,232,.35);background:rgba(0,201,232,.03);}
.week-n{font-size:32px;font-weight:800;color:var(--cyan);line-height:1;letter-spacing:-1px;font-family:'Space Mono',monospace;}
.week-dates{font-size:11px;color:var(--grey);margin-top:2px;}
.week-nav-row{display:flex;gap:8px;margin-bottom:14px;}
.nav-arrow{background:var(--glass);border:1px solid var(--border2);border-radius:8px;padding:7px 13px;color:var(--grey);font-size:11px;cursor:pointer;transition:all .15s;font-family:'Inter',sans-serif;}
.nav-arrow:hover{color:var(--cyan);border-color:var(--border);}
.current-badge{font-size:9px;background:var(--cyan);color:#050A0F;padding:2px 7px;border-radius:10px;font-weight:700;font-family:'Space Mono',monospace;letter-spacing:.5px;}

.eval-scores-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px;}
.eval-score-item{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r2);padding:10px;text-align:center;}
.eval-score-val{font-size:22px;font-weight:800;color:var(--amber);line-height:1;font-family:'Space Mono',monospace;}
.eval-score-name{font-size:9px;color:var(--grey);margin-top:3px;letter-spacing:.8px;text-transform:uppercase;}

.wave-score-wrap{text-align:center;padding:20px 0 14px;}
.score-ring{width:120px;height:120px;border-radius:50%;display:flex;align-items:center;justify-content:center;margin:0 auto 10px;}
.score-inner{width:88px;height:88px;background:var(--bg2);border-radius:50%;display:flex;flex-direction:column;align-items:center;justify-content:center;}
.score-n{font-size:26px;font-weight:800;color:var(--cyan);line-height:1;font-family:'Space Mono',monospace;}
.score-lbl{font-size:9px;color:var(--grey);letter-spacing:1px;text-transform:uppercase;margin-top:2px;}

.yt-embed{width:100%;padding-top:56.25%;position:relative;border-radius:var(--r2);overflow:hidden;margin-top:12px;}
.yt-embed iframe{position:absolute;top:0;left:0;width:100%;height:100%;border:none;}

.inner-tabs{display:flex;gap:6px;margin-bottom:14px;overflow-x:auto;scrollbar-width:none;padding-bottom:2px;}
.inner-tabs::-webkit-scrollbar{display:none;}
.itab{flex-shrink:0;padding:7px 13px;border-radius:8px;border:1px solid var(--border2);background:transparent;color:var(--grey);font-size:12px;font-weight:500;cursor:pointer;transition:all .15s;white-space:nowrap;font-family:'Inter',sans-serif;}
.itab.active{background:rgba(0,201,232,.1);border-color:rgba(0,201,232,.25);color:var(--cyan);}

.intensity-bar{height:4px;background:rgba(255,255,255,.06);border-radius:4px;overflow:hidden;margin-top:8px;}
.intensity-fill{height:100%;background:linear-gradient(90deg,var(--cyan),var(--green));border-radius:4px;}

.alert{padding:12px 14px;border-radius:var(--r2);font-size:12px;margin-bottom:10px;display:flex;align-items:center;gap:8px;}
.alert-amber{background:rgba(245,158,11,.07);border:1px solid rgba(245,158,11,.2);color:var(--amber);}
.alert-green{background:rgba(34,197,94,.07);border:1px solid rgba(34,197,94,.2);color:var(--green);}
.alert-cyan{background:rgba(0,201,232,.07);border:1px solid rgba(0,201,232,.2);color:var(--cyan);}

.empty{text-align:center;padding:40px 24px;}
.empty-icon{font-size:44px;margin-bottom:12px;}
.empty-txt{font-size:13px;color:var(--grey);line-height:1.6;}

.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.8);z-index:600;display:flex;align-items:flex-end;backdrop-filter:blur(8px);}
.modal-sheet{background:var(--bg2);border:1px solid var(--border);border-radius:20px 20px 0 0;padding:24px 20px 40px;width:100%;max-width:480px;margin:0 auto;max-height:92vh;overflow-y:auto;}
.modal-head{display:flex;justify-content:space-between;align-items:center;margin-bottom:20px;}
.modal-title{font-size:18px;font-weight:800;color:var(--white);letter-spacing:-.3px;}
.modal-sub{font-size:11px;color:var(--grey);margin-top:2px;}
.modal-close{background:transparent;border:1px solid var(--border2);color:var(--grey);width:30px;height:30px;border-radius:8px;font-size:16px;cursor:pointer;display:flex;align-items:center;justify-content:center;}

/* DAY PLAN */
.day-strip{display:flex;gap:6px;overflow-x:auto;scrollbar-width:none;padding-bottom:6px;margin-bottom:14px;}
.day-strip::-webkit-scrollbar{display:none;}
.day-pill{flex-shrink:0;padding:8px 12px;border-radius:10px;border:1px solid var(--border2);background:transparent;color:var(--grey);font-size:11px;font-weight:600;cursor:pointer;transition:all .15s;text-align:center;min-width:52px;}
.day-pill:hover{border-color:var(--border);color:var(--white);}
.day-pill.active{background:rgba(0,201,232,.1);border-color:rgba(0,201,232,.3);color:var(--cyan);}
.day-pill.today{border-color:var(--cyan);}
.day-pill .day-num{font-size:16px;font-weight:800;font-family:'Space Mono',monospace;display:block;}
.day-pill .day-name{font-size:9px;letter-spacing:.5px;text-transform:uppercase;display:block;margin-top:2px;}

/* CHECK-IN */
.checkin-grid{display:grid;grid-template-columns:repeat(2,1fr);gap:8px;margin-bottom:12px;}
.checkin-box{background:var(--bg3);border:1px solid var(--border2);border-radius:var(--r2);padding:12px;text-align:center;}
.checkin-val{font-size:22px;font-weight:800;line-height:1;font-family:'Space Mono',monospace;}
.checkin-lbl{font-size:9px;color:var(--grey);margin-top:3px;letter-spacing:.8px;text-transform:uppercase;}

/* OPTION PILLS */
.opt-row{display:flex;gap:8px;flex-wrap:wrap;margin-top:6px;}
.opt-pill{padding:8px 14px;border-radius:20px;border:1px solid rgba(255,255,255,.1);background:transparent;color:var(--grey);font-size:12px;font-weight:600;cursor:pointer;transition:all .13s;font-family:'Inter',sans-serif;}
.opt-pill:hover{border-color:var(--cyan);color:var(--cyan);}
.opt-pill.on{background:var(--cyan);border-color:var(--cyan);color:#050A0F;}
.opt-pill.on-green{background:var(--green);border-color:var(--green);color:#050A0F;}
.opt-pill.on-red{background:var(--red);border-color:var(--red);color:#fff;}

function getWeekDates(w,y){ const jan1=new Date(y,0,1); const dow=jan1.getDay()||7; const mon=new Date(jan1); mon.setDate(jan1.getDate()+(8-dow)%7); const start=new Date(mon); start.setDate(mon.getDate()+(w-1)*7); const end=new Date(start); end.setDate(start.getDate()+6); const f=d=>d.toLocaleDateString('es-SV',{day:'2-digit',month:'short'}); return{start,end,label:`${f(start)} – ${f(end)}`}; }

function pd(){ S.pin=S.pin.slice(0,-1); updateDots(); document.getElementById('athPinErr').style.display='none'; }
function updateDots(){ for(let i=0;i<4;i++) document.getElementById(`pd${i}`).className='pin-dot'+(i<S.pin.length?' filled':''); }

async function tryLogin(){
  const pin=S.pin; S.pin=''; updateDots(); showLoad(true);
  try {
    const{data,error}=await db.from('tss_profiles').select('*').eq('pin',pin);
    if(error) throw error;
    if(!data||!data.length){ document.getElementById('athPinErr').style.display='block'; return; }
    const user=data[0];
    // Validate role matches
    const roleMap={coach:'coach',acoach:'acoach',athlete:'athlete'};
    if(S.loginRole==='coach'&&user.role!=='coach'){ document.getElementById('athPinErr').style.display='block'; return; }
    if(S.loginRole==='acoach'&&user.role!=='acoach'){ document.getElementById('athPinErr').style.display='block'; return; }
    if(S.loginRole==='athlete'&&(user.role==='coach'||user.role==='acoach')){ document.getElementById('athPinErr').style.display='block'; return; }
    S.user=user; localStorage.setItem('tss_uid',S.user.id);
    await bootApp();
  } catch(e){ toast('Error de conexión','error'); console.error(e); }
  finally{ showLoad(false); }
}

async function restoreSession(){
  const uid=localStorage.getItem('tss_uid'); if(!uid) return false;
  try {
    const{data}=await db.from('tss_profiles').select('*').eq('id',uid).single();
    if(!data){ localStorage.removeItem('tss_uid'); return false; }
    S.user=data;
    await bootApp();
    return true;
  } catch(e){ console.error('restoreSession',e); return false; }
}

/* ── RENDER SESSION CARD ── */
function renderSpCard(s, isToday){
  const isCoach = S.user.role === 'coach';
  const isACoach = S.user.role === 'acoach';
  const canEdit = isCoach;
  const canExecute = isCoach || isACoach;
  const pilColor = PILARES_COLOR[s.pilar] || 'mix';
  const vid = ytId(s.video_url);
  const statusMap = {planned:'sb-planned',live:'sb-live',done:'sb-done'};
  const statusLbl = {planned:'Planificada',live:'En Curso',done:'Completada'};
  const today = todayStr();
  const isLive = s.status === 'live';
  const isDone = s.status === 'done';
  // Parse athlete_ids at card level so it's available everywhere in this function
  const cardAthIds = s.athlete_ids ? (Array.isArray(s.athlete_ids) ? s.athlete_ids : (() => { try{ return JSON.parse(s.athlete_ids); } catch(e){ return []; } })()) : [];

/* ── START SESSION ── */
async function startSp(sessionId){
  if(!confirm('¿Iniciar esta sesión ahora?')) return;
  showLoad(true);
  try {
    const {error} = await db.from('tss_presencial_sessions')
      .update({status:'live', started_at: new Date().toISOString()})
      .eq('id', sessionId);
    if(error) throw error;
    toast('🟢 Sesión iniciada','success');
    loadSpHoy();
  } catch(e){ toast('Error','error'); console.error(e); } finally { showLoad(false); }
}

function pickFb(id, val, btn){
  btn.closest('.fb-scale').querySelectorAll('.fb-n').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById(`fb-${id}`).value = val;
}

function pickSpOpt(id, btn, val){
  btn.closest('div').querySelectorAll('.opt-pill').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById(`fb-${id}`).value = val;
}

async function finalizeSp(sessionId){
  showLoad(true);
  try {
    const generalNotes = document.getElementById('sp-general-notes')?.value || '';
    // Update session status to done
    const {error: sessErr} = await db.from('tss_presencial_sessions')
      .update({status:'done', finished_at: new Date().toISOString(), coach_notes: generalNotes})
      .eq('id', sessionId);
    if(sessErr) throw sessErr;

    // Save individual feedbacks — only athletes assigned to this session
    const {data: sessData} = await db.from('tss_presencial_sessions').select('athlete_ids').eq('id',sessionId).single();
    const sessAthIds = sessData?.athlete_ids ? (Array.isArray(sessData.athlete_ids)?sessData.athlete_ids:JSON.parse(sessData.athlete_ids||'[]')) : [];
    const sessAthletes = sessAthIds.length ? S.athletes.filter(a=>sessAthIds.includes(a.id)) : S.athletes;
    const feedbacks = [];
    for(const a of sessAthletes){
      const present = document.getElementById(`fb-present-${a.id}`)?.checked;
      if(!present) continue;
      const focus = parseInt(document.getElementById(`fb-focus-${a.id}`)?.value || 0);
      const frustration = parseInt(document.getElementById(`fb-frust-${a.id}`)?.value || 0);
      const achieved = document.getElementById(`fb-achieved-${a.id}`)?.value || '';
      const note = document.getElementById(`fb-note-${a.id}`)?.value || '';
      feedbacks.push({
        session_id: sessionId, athlete_id: a.id,
        focus_rating: focus || null, frustration_rating: frustration || null,
        achieved: achieved || null, coach_note: note || null,
        recorded_by: S.user.id
      });
    }
    if(feedbacks.length){
      const {error: fbErr} = await db.from('tss_presencial_feedbacks').insert(feedbacks);
      if(fbErr) throw fbErr;
    }

    toast(`✅ Sesión finalizada · ${feedbacks.length} atletas registrados`, 'success');
    closeModal('spFeedbackModal');
    spTab('hist');
  } catch(e){ toast('Error al finalizar','error'); console.error(e); } finally { showLoad(false); }
}

          ${fb.achieved ? `<span class="chip ${fb.achieved==='Sí'?'chip-green':fb.achieved==='Parcial'?'chip-amber':'chip-red'}">✅ ${fb.achieved}</span>` : ''}

// Render athlete selector in presencial form
function renderSpAthletes(existingIds=[]) {
  spSelectedAthletes = [...existingIds];
  const grid = document.getElementById('sp-athletes-grid');
  if(!grid) return;
  grid.innerHTML = S.athletes.map(a => {
    const sel = spSelectedAthletes.includes(a.id);
    return `<div onclick="toggleSpAthlete('${a.id}',this)" id="spa-${a.id}" style="
      padding:10px 12px;border-radius:10px;cursor:pointer;border:2px solid ${sel?'var(--cyan)':'var(--border2)'};
      background:${sel?'var(--cyan3)':'var(--bg3)'};transition:all .2s;text-align:center;">
      <div style="font-size:12px;font-weight:700;color:${sel?'var(--cyan)':'var(--white)'};">${a.name}</div>
      <div style="font-size:10px;margin-top:3px;color:${sel?'var(--cyan)':'var(--grey)'};">${sel?'✅ Seleccionado':'Toca para agregar'}</div>
    </div>`;
  }).join('');
}

function toggleSpAthlete(id, el) {
  if(spSelectedAthletes.includes(id)) {
    spSelectedAthletes = spSelectedAthletes.filter(x=>x!==id);
    el.style.border = '2px solid var(--border2)';
    el.style.background = 'var(--bg3)';
    el.querySelector('div').style.color = 'var(--white)';
    el.querySelectorAll('div')[1].textContent = 'Toca para agregar';
    el.querySelectorAll('div')[1].style.color = 'var(--grey)';
  } else {
    spSelectedAthletes.push(id);
    el.style.border = '2px solid var(--cyan)';
    el.style.background = 'var(--cyan3)';
    el.querySelector('div').style.color = 'var(--cyan)';
    el.querySelectorAll('div')[1].textContent = '✅ Seleccionado';
    el.querySelectorAll('div')[1].style.color = 'var(--cyan)';
  }
}

function pickSpOpt2(field, btn, val){

  btn.classList.add('on');

      <div style="display:flex;gap:8px;">
        <div style="flex:1;"><label class="inp-label">Tiempo (min)</label><input type="number" class="inp" value="${d.time}" oninput="spDrills[${i}].time=this.value" placeholder="15" min="1"></div>
        <div style="flex:1;"><label class="inp-label">Reps</label><input type="text" class="inp" value="${d.reps}" oninput="spDrills[${i}].reps=this.value" placeholder="4"></div>
      </div>

      <input type="url" class="inp" value="${d.video}" oninput="spDrills[${i}].video=this.value" placeholder="https://youtube.com/...">
    </div>`).join('');
}

async function saveSp(existId){
  const title = document.getElementById('sp-title')?.value?.trim();
  const date = document.getElementById('sp-date')?.value;
  const pilar = document.getElementById('sp-pilar')?.value;
  if(!title){ toast('Ingresa el título de la sesión','error'); return; }
  if(!date){ toast('Selecciona la fecha','error'); return; }

  const payload = {
    title, date,
    time_start: document.getElementById('sp-time')?.value || null,
    duration_min: parseInt(document.getElementById('sp-duration')?.value) || null,
    location: document.getElementById('sp-location')?.value || null,
    conditions: document.getElementById('sp-conditions')?.value || null,
    pilar: pilar || null,
    pilar_part: document.getElementById('sp-pilar-part')?.value?.trim() || null,
    mission: document.getElementById('sp-mission')?.value?.trim() || null,
    drills: spDrills.filter(d=>d.name).length ? JSON.stringify(spDrills.filter(d=>d.name)) : null,
    reps: document.getElementById('sp-reps')?.value?.trim() || null,
    warmup: document.getElementById('sp-warmup')?.value?.trim() || null,
    simulation: document.getElementById('sp-simulation')?.value?.trim() || null,
    mental_hack: document.getElementById('sp-mental')?.value?.trim() || null,
    video_url: document.getElementById('sp-video')?.value?.trim() || null,
    notes: document.getElementById('sp-notes')?.value?.trim() || null,
    athlete_ids: spSelectedAthletes.length ? JSON.stringify(spSelectedAthletes) : null,
    created_by: S.user.id,
    status: existId ? undefined : 'planned'
  };
  if(!existId) payload.status = 'planned';
  // Clean undefined and null to avoid schema cache errors on missing columns
  Object.keys(payload).forEach(k => (payload[k]===undefined || payload[k]===null) && delete payload[k]);

  showLoad(true);
  try {
    if(existId){
      const {error} = await db.from('tss_presencial_sessions').update(payload).eq('id', existId);
      if(error) throw error;
      toast('✅ Sesión actualizada','success');
    } else {
      const {error} = await db.from('tss_presencial_sessions').insert(payload);
      if(error) throw error;
      toast('✅ Sesión publicada','success');
    }
    spTab('hoy');
  } catch(e){ toast('Error al guardar: '+e.message,'error'); console.error(e); } finally { showLoad(false); }
}

async function editSp(sessionId){
  showLoad(true);
  try {
    const {data, error} = await db.from('tss_presencial_sessions').select('*').eq('id',sessionId).single();
    if(error) throw error;
    spTab('crear');
    // slight delay to allow tab render
    setTimeout(()=>{ renderSpForm(data); }, 50);
  } catch(e){ toast('Error al cargar sesión','error'); console.error(e); } finally { showLoad(false); }
}

async function deleteSp(sessionId){
  if(!confirm('¿Eliminar esta sesión presencial?')) return;
  showLoad(true);
  try {
    await db.from('tss_presencial_feedbacks').delete().eq('session_id', sessionId);
    const {error} = await db.from('tss_presencial_sessions').delete().eq('id', sessionId);
    if(error) throw error;
    toast('Sesión eliminada','success');
    spTab('hoy');
  } catch(e){ toast('Error','error'); console.error(e); } finally { showLoad(false); }
}

function updateHeaderAvatar(){
  const el = document.getElementById('hdrAvatar'); if(!el) return;
  const url = S.user?.avatar_url;
  const initial = (S.user?.name||'?').charAt(0).toUpperCase();
  if(url){
    el.innerHTML = `<img src="${url}" style="width:30px;height:30px;object-fit:cover;border-radius:50%;" onerror="this.parentElement.textContent='${initial}'">`;
  } else {
    el.textContent = initial;
  }
  el.style.display = 'flex';

function buildNav(){
  const r=S.user.role;
  let tabs;
  if(r==='coach') tabs=[{id:'panel',icon:'📊',lbl:'Panel'},{id:'planeacion',icon:'📋',lbl:'Planeación'},{id:'presencial',icon:'🏄',lbl:'Sesión'},{id:'evaluar',icon:'⭐',lbl:'Evaluar'},{id:'atletas',icon:'👥',lbl:'Atletas'},{id:'perfil',icon:'👤',lbl:'Mi Perfil'}];

async function loadHoy(date){
  const el=document.getElementById('hoyContent'); if(!el) return;
  try {
    // Get ALL plans for this athlete for this date
    const plans = await getPlanForAthlete(S.user.id, date);
    // Get check-in if exists
    const{data:ci}=await db.from('tss_daily_checkins').select('*').eq('athlete_id',S.user.id).eq('date',date).maybeSingle();
    // Get presencial sessions for this athlete today
    const{data:presSessions}=await db.from('tss_presencial_sessions')
      .select('*').eq('date',date).neq('status','cancelled').order('time_start');
    // Filter only sessions where this athlete is assigned
    const myPresSessions=(presSessions||[]).filter(s=>{
      try{ const ids=s.athlete_ids?(Array.isArray(s.athlete_ids)?s.athlete_ids:JSON.parse(s.athlete_ids||'[]')):[];
        return ids.includes(S.user.id);
      }catch(e){return false;}
    });

    // Load completion state from DB (fallback to localStorage)
    const compKey = `tss_comp_${S.user.id}_${date}`;
    let compState = await loadCompStateFromDb(date);
    if(!Object.keys(compState).length){
      try{ compState=JSON.parse(localStorage.getItem(compKey)||'{}'); }catch(e){}

/* ════════════════════════════════════════════════════════════════════
   MÓDULO: PROGRESO Y TAREAS
   ⚠️  REGLA: Solo reloadPlansSection() llama saveProgressToDb()
   toggleBlock, toggleTask, reloadPlansSection, saveProgressToDb,
   loadCompStateFromDb
   ════════════════════════════════════════════════════════════════════ */
async function toggleBlock(planId, date){
  const compKey = `tss_comp_${S.user.id}_${date}`;
  let compState = {};
  try{ compState=JSON.parse(localStorage.getItem(compKey)||'{}'); }catch(e){}
  compState[planId+'_block'] = !compState[planId+'_block'];
  localStorage.setItem(compKey, JSON.stringify(compState));
  // NOTE: saveProgressToDb is called inside reloadPlansSection with correct real totals
  // Calling it here first (without real totals) causes false 100% progress bug
  await reloadPlansSection(date, compState);
}

async function toggleTask(planId, taskIdx, date){
  const compKey = `tss_comp_${S.user.id}_${date}`;
  let compState = {};
  try{ compState=JSON.parse(localStorage.getItem(compKey)||'{}'); }catch(e){}
  const key = planId+'_task_'+taskIdx;
  compState[key] = !compState[key];
  localStorage.setItem(compKey, JSON.stringify(compState));
  // NOTE: saveProgressToDb is called inside reloadPlansSection with correct real totals
  // Calling it here first (without real totals) causes false 100% progress bug
  await reloadPlansSection(date, compState);
}

async function reloadPlansSection(date, compState){
  const cacheKey = `tss_plans_cache_${date}`;
  let allBlocks = [];

  try {
    // Always fetch fresh from DB to avoid cache issues
    const regularPlans = await getPlanForAthlete(S.user.id, date);
    
    // Fetch presencial sessions
    const{data:presSessions}=await db.from('tss_presencial_sessions')
      .select('*').eq('date',date).neq('status','cancelled').order('time_start');
    const myPres=(presSessions||[]).filter(s=>{
      try{ const ids=s.athlete_ids?(Array.isArray(s.athlete_ids)?s.athlete_ids:JSON.parse(s.athlete_ids||'[]')):[];
        return ids.includes(S.user.id);
      }catch(e){return false;}
    });
    const presBlocks=myPres.map(ps=>({
      _isPresencial:true, id:'pres_'+ps.id, _presId:ps.id,
      title:ps.title, time_start:ps.time_start, mission:ps.mission,
      duration_min:ps.duration_min, location:ps.location,
      drills:ps.drills, video_url:ps.video_url, status:ps.status,
    }));

    allBlocks = [...presBlocks, ...(regularPlans||[])];
    try{ sessionStorage.setItem(cacheKey, JSON.stringify(allBlocks)); }catch(e){}
  } catch(e){ 
    console.error('reloadPlansSection error',e);
    // Fallback to cache
    try{ allBlocks = JSON.parse(sessionStorage.getItem(cacheKey)||'[]'); }catch(e2){}
  }

  // Count real totals — exclude sesion and presencial blocks from progress calculation
  const regularBlocks = allBlocks.filter(b=>!b._isPresencial && b.work_type!=='sesion');
  const regularBlockIds = new Set(regularBlocks.map(b=>String(b.id)));
  let realTotalTasks=0, realTotalBlocks=regularBlocks.length;
  regularBlocks.forEach(b=>{ try{ const t=JSON.parse(b.exercises||'[]'); realTotalTasks+=t.length; }catch(e){} });
  // Count done — only from regular blocks (exclude sesion/presencial)
  const realDoneBlocks = Object.keys(compState).filter(k=>k.endsWith('_block')&&compState[k]&&regularBlockIds.has(k.replace('_block',''))).length;
  const realDoneTasks = Object.keys(compState).filter(k=>k.includes('_task_')&&compState[k]&&regularBlockIds.has(k.split('_task_')[0])).length;
  // Re-save progress with correct totals if compState has data
  if(Object.keys(compState).length>0){
    await saveProgressToDb(date, compState, realTotalTasks||null, realTotalBlocks||null, realDoneBlocks, realDoneTasks);
  }
  const plansEl = document.getElementById('plansSection');
  if(plansEl && allBlocks.length) {
    plansEl.innerHTML = buildPlansHtml(allBlocks, compState, date);
  }
}

/*
 * ╔══════════════════════════════════════════════════════════════════╗
 * ║  REGLA CRÍTICA — saveProgressToDb                               ║
 * ║                                                                  ║
 * ║  ÚNICA función autorizada a llamar esto: reloadPlansSection()   ║
 * ║                                                                  ║
 * ║  ❌ NO llamar desde: toggleBlock, toggleTask, loadHoy,          ║
 * ║     saveCheckin, ni ninguna otra función                         ║
 * ║                                                                  ║
 * ║  ¿POR QUÉ? Sin realTotalTasks/realTotalBlocks correctos,        ║
 * ║  el cálculo usa solo las keys del compState actual →            ║
 * ║  1 bloque completado de 1 conocido = 100% FALSO.               ║
 * ║                                                                  ║
 * ║  reloadPlansSection() primero carga TODOS los bloques del día   ║
 * ║  desde DB, luego llama esta función con los totales reales.     ║
 * ║                                                                  ║
 * ║  ESTA FUNCIÓN NUNCA escribe: water_glasses, energy_level,       ║
 * ║  focus_level, nutrition. Solo toca: blocks_completed,           ║
 * ║  tasks_completed, progress_pct, comp_state.                     ║
 * ╚══════════════════════════════════════════════════════════════════╝
 */
async function saveProgressToDb(date, compState, realTotalTasks=null, realTotalBlocks=null, realDoneBlocks=null, realDoneTasks=null){
  try {
    const doneBlocks = realDoneBlocks ?? Object.keys(compState).filter(k=>k.endsWith('_block')&&compState[k]).length;
    const totalBlocks = realTotalBlocks ?? Object.keys(compState).filter(k=>k.endsWith('_block')).length;
    const doneTasks = realDoneTasks ?? Object.keys(compState).filter(k=>k.includes('_task_')&&compState[k]).length;
    const totalTasks = realTotalTasks ?? Object.keys(compState).filter(k=>k.includes('_task_')).length;
    // Use real totals — never jump to 100 unless everything is truly done
    const pct = totalTasks>0
      ? Math.round((doneTasks/totalTasks)*100)
      : (totalBlocks>0 ? Math.round((doneBlocks/totalBlocks)*100) : 0);
    // Check if checkin exists first
    const{data:existing}=await db.from('tss_daily_checkins').select('id').eq('athlete_id',S.user.id).eq('date',date).maybeSingle();
    if(existing){
      // Only update progress columns, never overwrite wellness data
      await db.from('tss_daily_checkins').update({
        blocks_completed: doneBlocks,
        tasks_completed: doneTasks,
        progress_pct: pct,
        comp_state: JSON.stringify(compState)
      }).eq('athlete_id',S.user.id).eq('date',date);
    } else {
      // No checkin yet - just save progress state
      await db.from('tss_daily_checkins').insert({
        athlete_id: S.user.id,
        date,
        blocks_completed: doneBlocks,
        tasks_completed: doneTasks,
        progress_pct: pct,
        comp_state: JSON.stringify(compState)
      });
    }
  } catch(e){ console.error('Progress save error',e); }
}

async function loadCompStateFromDb(date){
  try {
    const{data}=await db.from('tss_daily_checkins').select('comp_state').eq('athlete_id',S.user.id).eq('date',date).maybeSingle();
    if(data&&data.comp_state){ return JSON.parse(data.comp_state); }
  } catch(e){}
  return {};
}

  btn.closest('.opt-row').querySelectorAll('.opt-pill').forEach(b=>{b.classList.remove('on','on-green','on-red','on-amber');});

  document.getElementById(hiddenId).value=val;
}

/*
 * ╔══════════════════════════════════════════════════════════════════╗
 * ║  REGLA CRÍTICA — saveCheckin                                    ║
 * ║                                                                  ║
 * ║  ÚNICA función autorizada a escribir wellness data:             ║
 * ║  water_glasses, energy_level, focus_level, nutrition,           ║
 * ║  goal_achieved, surf_hours, sesion_result, notes                ║
 * ║                                                                  ║
 * ║  ❌ NO escribir esas columnas desde: saveProgressToDb,          ║
 * ║     toggleBlock, toggleTask, ni ninguna otra función            ║
 * ║                                                                  ║
 * ║  ¿POR QUÉ? Si otra función hace upsert/insert en               ║
 * ║  tss_daily_checkins tocando esas columnas, sobreescribe         ║
 * ║  los valores del atleta con 0 o null → bug de wellness reset.  ║
 * ╚══════════════════════════════════════════════════════════════════╝
 */
async function saveCheckin(date){
  const water=parseInt(gv('ci-water')||0);
  const energy=parseInt(gv('sc-ci-energy')||0);
  const nutri=gv('ci-nutri');
  const focus=parseInt(gv('sc-ci-focus')||0);
  const goal=gv('ci-goal');
  if(!water){toast('Indica cuántos vasos de agua tomaste','error');return;}
  if(!energy){toast('Indica tu nivel de energía','error');return;}
  if(!nutri){toast('Indica tu nutrición','error');return;}
  // focus and goal only required when sesion fields are present
  const hasFocusField = !!document.getElementById('sc-ci-focus');
  const hasGoalField = document.getElementById('ci-goal')?.value !== undefined;
  if(hasFocusField && focus===0){toast('Indica tu nivel de enfoque','error');return;}
  if(hasGoalField && !goal && document.querySelector('[data-ci-goal]')){toast('Indica si lograste tu objetivo','error');return;}
  showLoad(true);
  try {
    const surfHours = parseFloat(document.getElementById('ci-surf-hours')?.value||0)||null;
    const{error}=await db.from('tss_daily_checkins').upsert({
      athlete_id:S.user.id,date,water_glasses:water,energy_level:energy,
      nutrition:nutri,focus_level:focus,goal_achieved:goal,notes:gv('ci-notes'),
      surf_hours:surfHours
    },{onConflict:'athlete_id,date'});
    if(error) throw error;
    toast('✅ Check-in guardado','success');
    loadHoy(date);
  } catch(e){toast('Error al guardar','error');console.error(e);}
  finally{showLoad(false);}
}

/* Get ALL plans for athlete: individual + group + general */
async function getPlanForAthlete(athleteId, date){
  try {
    const allPlans = [];
    const{data:ind}=await db.from('tss_daily_plans').select('*').eq('date',date).eq('scope','individual').eq('target_id',athleteId).order('created_at');
    if(ind&&ind.length) allPlans.push(...ind);
    const{data:memberships}=await db.from('tss_group_members').select('group_id').eq('athlete_id',athleteId);
    if(memberships&&memberships.length){
      const gids=memberships.map(m=>m.group_id);
      const{data:grp}=await db.from('tss_daily_plans').select('*').eq('date',date).eq('scope','group').in('target_id',gids).order('created_at');
      if(grp&&grp.length) allPlans.push(...grp);
    }
    const{data:gen}=await db.from('tss_daily_plans').select('*').eq('date',date).eq('scope','general').order('created_at');
    if(gen&&gen.length) allPlans.push(...gen);
    return allPlans;
  } catch(e){ console.error(e); return []; }
}

/* ════════════════════════════════════════════════════════════════════
   MÓDULO: SEMANA — Vista semanal del atleta
   vSemana, showDayDetail
   ════════════════════════════════════════════════════════════════════ */
async function vSemana(weekOffset=0){
  const todaySV = new Date(new Date().toLocaleString('en-US', {timeZone:'America/El_Salvador'}));
  const today = todaySV;
  const todayStr2 = today.toISOString().split('T')[0];
  const dayOfWeek = today.getDay()||7;
  const monday = new Date(today);
  monday.setDate(today.getDate()-(dayOfWeek-1)+(weekOffset*7));
  // Build 14 days (2 weeks)
  const days = [];
  for(let i=0;i<14;i++){
    const d = new Date(monday); d.setDate(monday.getDate()+i);
    days.push(d.toISOString().split('T')[0]);
  }
  const dayNames = ['LUN','MAR','MIÉ','JUE','VIE','SÁB','DOM'];

  // Week labels
  const week1start = days[0].split('-'); const week1end = days[6].split('-');
  const week2start = days[7].split('-'); const week2end = days[13].split('-');
  const fmt = d => parseInt(d[2])+'/'+parseInt(d[1]);
  const w1label = fmt(week1start)+' — '+fmt(week1end);
  const w2label = fmt(week2start)+' — '+fmt(week2end);

  render(`<div class="page-title">Mi Plan</div><div class="page-sub">Próximas 2 semanas</div>
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px;gap:8px;">
      <button class="btn btn-ghost btn-sm" onclick="vSemana(${weekOffset-1})">← Anterior</button>
      <span style="font-size:11px;color:var(--grey);">Semana ${weekOffset===0?'actual':weekOffset>0?'+'+weekOffset:weekOffset}</span>
      <button class="btn btn-ghost btn-sm" onclick="vSemana(${weekOffset+1})">Siguiente →</button>
    </div>
    <div id="semanaContent"><p style="padding:20px;text-align:center;color:var(--grey);font-size:12px;">Cargando...</p></div>`);

  const el = document.getElementById('semanaContent'); if(!el) return;
  try {
    const[plansRes, membRes, ciRes, presRes] = await Promise.all([
      db.from('tss_daily_plans').select('*').gte('date',days[0]).lte('date',days[13]).order('created_at'),
      db.from('tss_group_members').select('group_id').eq('athlete_id',S.user.id),
      db.from('tss_daily_checkins').select('date,progress_pct,blocks_completed,goal_achieved').eq('athlete_id',S.user.id).gte('date',days[0]).lte('date',days[13]),
      db.from('tss_presencial_sessions').select('id,date,title,time_start,status').gte('date',days[0]).lte('date',days[13]).neq('status','cancelled'),
    ]);
    const myGroups=(membRes.data||[]).map(m=>m.group_id);
    const ciByDate={};
    (ciRes.data||[]).forEach(ci=>ciByDate[ci.date]=ci);
    // presencial sessions by date
    const presByDate={};
    (presRes.data||[]).forEach(ps=>{
      if(!presByDate[ps.date]) presByDate[ps.date]=[];
      presByDate[ps.date].push(ps);
    });
    // filter plans per athlete
    const plansByDate={};
    (plansRes.data||[]).forEach(p=>{
      const ok=p.scope==='general'||(p.scope==='individual'&&p.target_id===S.user.id)||(p.scope==='group'&&myGroups.includes(p.target_id));
      if(!ok) return;
      if(!plansByDate[p.date]) plansByDate[p.date]=[];
      plansByDate[p.date].push(p);
    });

    // Render 2 weeks
    let html='';
    [0,1].forEach(week=>{
      const weekDays = days.slice(week*7, week*7+7);
      const label = week===0?w1label:w2label;
      const isCurrentWeek = weekDays.includes(todayStr2);
      html+=`<div style="margin-bottom:16px;">
        <div style="font-size:10px;letter-spacing:1px;text-transform:uppercase;color:${isCurrentWeek?'var(--cyan)':'var(--grey)'};font-weight:700;margin-bottom:8px;padding:0 2px;">
          ${isCurrentWeek?'● ':''} Semana ${week+1} · ${label}
        </div>
        <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:4px;">`;
      weekDays.forEach((date,i)=>{
        const isToday=date===todayStr2;
        const isPast=date<todayStr2;
        const dayPlans=plansByDate[date]||[];
        const presessions=presByDate[date]||[];
        const ci=ciByDate[date];
        const pct=ci?.progress_pct||0;
        const hasPlans=dayPlans.length>0||presessions.length>0;
        const hasPresencial=presessions.length>0;
        html+=`<button onclick="showDayDetail('${date}')" style="display:flex;flex-direction:column;align-items:center;gap:3px;padding:8px 4px;
          border-radius:10px;border:1px solid ${isToday?'var(--cyan)':hasPlans?'rgba(255,255,255,.12)':'rgba(255,255,255,.04)'};
          background:${isToday?'rgba(0,201,232,.12)':isPast?'rgba(255,255,255,.01)':'rgba(255,255,255,.02)'};cursor:pointer;position:relative;">
          <span style="font-size:9px;font-weight:700;color:${isToday?'var(--cyan)':isPast?'#3a4a54':'var(--grey)'};">${dayNames[i]}</span>
          <span style="font-size:13px;font-weight:800;color:${isToday?'var(--white)':isPast?'#3a4a54':'rgba(232,240,245,.7)'};">${parseInt(date.split('-')[2])}</span>
          ${hasPresencial?`<span style="font-size:8px;color:var(--green);">🏄</span>`:(hasPlans?`<div style="width:24px;height:3px;border-radius:2px;background:var(--bg3);overflow:hidden;"><div style="height:100%;width:${pct}%;background:${pct===100?'var(--green)':pct>0?'var(--cyan)':'rgba(0,201,232,.2)'};"></div></div>`:'<div style="height:11px;"></div>')}
          <span style="font-size:9px;">${hasPlans?(pct===100?'✅':dayPlans.length+presessions.length+'📋'):'—'}</span>
        </button>`;
      });
      html+='</div></div>';
    });

    html+=`<div id="weekDayDetail"></div>`;
    el.innerHTML=html;
    // Auto-show today or first day of range
    const autoDay = days.includes(todayStr2)?todayStr2:days[0];
    showDayDetail(autoDay, plansByDate, ciByDate, myGroups);

  } catch(e){ el.innerHTML='<p style="padding:20px;text-align:center;color:var(--red);">Error al cargar</p>'; console.error(e); }
}

async function saveSes(){
  const intensity=parseInt(gv('sc-si')||0),duration=parseInt(gv('sdur')||0);
  if(!intensity){toast('Selecciona la intensidad','error');return;}
  if(!duration){toast('Ingresa la duración','error');return;}
  showLoad(true);
  try {
    const{error}=await db.from('tss_sessions').insert({athlete_id:S.user.id,date:gv('sd'),type:gv('st'),duration,intensity,notes:gv('sn'),video_url:gv('sv')||null});
    if(error) throw error;
    toast('✅ Sesión guardada','success'); sTab('hist');
  } catch(e){toast('Error al guardar','error');console.error(e);}
  finally{showLoad(false);}
}

          <div><div style="font-size:14px;font-weight:700;">${s.type}</div><div style="font-size:11px;color:var(--grey);margin-top:2px;">${fmtDate(s.date)} · ${s.duration} min</div></div>
          <span class="chip chip-cyan">Int. ${s.intensity}/10</span>

function vPlaneacion(){
  render(`<div class="page-title">Planeación</div><div class="page-sub">Planes diarios del equipo</div>
    <div class="inner-tabs">
      <button class="itab active" id="it-dias" onclick="pTab('dias')">📅 Días</button>
      <button class="itab" id="it-grupos" onclick="pTab('grupos')">👥 Grupos</button>
    </div>
    <div id="planTab"></div>`);
  pTab('dias');
}
function pTab(t){
  document.querySelectorAll('.itab').forEach(b=>b.classList.remove('active'));
  const el=document.getElementById(`it-${t}`); if(el) el.classList.add('active');
  if(t==='dias') renderPlanDias(); else renderGrupos();
}

function renderPlanDias(){
  if(!S.selDate) S.selDate=todayStr();
  document.getElementById('planTab').innerHTML=`
    <div style="display:flex;align-items:center;gap:10px;margin-bottom:14px;">
      <button class="btn btn-xs btn-outline" onclick="shiftPlanDate(-1)">← Anterior</button>
      <input type="date" id="planDatePicker" class="inp" style="flex:1;text-align:center;font-weight:700;font-size:14px;" value="${S.selDate}">
      <button class="btn btn-xs btn-outline" onclick="shiftPlanDate(1)">Siguiente →</button>
    </div>
    <div id="planDayContent"></div>`;
  document.getElementById('planDatePicker').addEventListener('change', function(){
    S.selDate = this.value;
    loadPlanDay(this.value);
  });
  loadPlanDay(S.selDate);
}

function shiftPlanDate(days){
  const d = new Date(S.selDate+'T00:00:00');
  d.setDate(d.getDate()+days);
  S.selDate = d.toISOString().split('T')[0];
  const picker = document.getElementById('planDatePicker');
  if(picker) picker.value = S.selDate;
  loadPlanDay(S.selDate);
}

function selDay(date){
  S.selDate=date;
  document.querySelectorAll('.day-pill').forEach(b=>b.classList.remove('active'));
  event.currentTarget.classList.add('active');
  loadPlanDay(date);
}

  {id:'ritual',    emoji:'🌅', label:'Ritual Diario',    color:'cyan'},

  {id:'meditacion',emoji:'🧘', label:'Meditación',       color:'purple'},
  {id:'mobility',  emoji:'🤸', label:'Morning Mobility', color:'green'},
  {id:'fisico',    emoji:'💪', label:'Físico',           color:'amber'},
  {id:'tecnico',   emoji:'🏄', label:'Técnico',          color:'cyan'},
  {id:'tactico',   emoji:'🎯', label:'Táctico',          color:'amber'},
  {id:'mental',    emoji:'🧠', label:'Mental',           color:'purple'},

];

function getBlockType(id){ return BLOCK_TYPES.find(b=>b.id===id) || BLOCK_TYPES[BLOCK_TYPES.length-1]; }

async function openSaveTemplate(date){
  const name = prompt('Nombre del template (ej: Lunes Técnico):');
  if(!name||!name.trim()) return;
  showLoad(true);
  try {
    const{data:plans}=await db.from('tss_daily_plans').select('*').eq('date',date).order('created_at');
    if(!plans||!plans.length){ toast('No hay actividades en este día','error'); return; }
    const blocks = plans.map(p=>({
      work_type:p.work_type, scope:p.scope, target_id:p.target_id,
      objective:p.objective, notes:p.notes, exercises:p.exercises,
      video_url:p.video_url, sesion_time:p.sesion_time, sesion_reps:p.sesion_reps
    }));
    const{error}=await db.from('tss_templates').insert({
      name:name.trim(), created_by:S.user.id, blocks:JSON.stringify(blocks)
    });
    if(error) throw error;
    toast('✅ Template "'+name.trim()+'" guardado','success');
  } catch(e){ toast('Error guardando template','error'); console.error(e); }
  finally{ showLoad(false); }
}

async function openApplyTemplate(date){
  showLoad(true);
  let templates=[];
  try {
    const{data}=await db.from('tss_templates').select('*').order('created_at',{ascending:false});
    templates=data||[];
  } catch(e){ toast('Error cargando templates','error'); showLoad(false); return; }
  finally{ showLoad(false); }

  if(!templates.length){
    toast('No hay templates guardados aún','error'); return;
  }

  const m=document.createElement('div'); m.className='modal-overlay'; m.id='templateModal';
  m.innerHTML=`<div class="modal-sheet">
    <div class="modal-head">
      <div><div class="modal-title">⚡ Aplicar Template</div><div class="modal-sub">${date}</div></div>
      <button class="modal-close" onclick="closeModal('templateModal')">✕</button>
    </div>
    <p style="font-size:13px;color:var(--grey);margin-bottom:14px;">Selecciona un template para aplicar al día ${date}. Los bloques existentes no se borran.</p>
    <div style="display:flex;flex-direction:column;gap:8px;">
      ${templates.map(t=>{
        let blocks=[]; try{blocks=JSON.parse(t.blocks||'[]');}catch(e){}
        return `<div style="background:var(--bg3);border-radius:12px;padding:12px 14px;display:flex;justify-content:space-between;align-items:center;">
          <div>
            <div style="font-size:14px;font-weight:700;">${t.name}</div>
            <div style="font-size:11px;color:var(--grey);margin-top:2px;">${blocks.length} actividades</div>
          </div>
          <div style="display:flex;gap:6px;">
            <button class="btn btn-cyan btn-sm" onclick="applyTemplate('${t.id}','${date}')">Aplicar</button>
            <button class="btn btn-ghost btn-sm" onclick="deleteTemplate('${t.id}')">🗑</button>
          </div>
        </div>`;
      }).join('')}
    </div>
  </div>`;
  document.body.appendChild(m);
  m.addEventListener('click',e=>{if(e.target===m)closeModal('templateModal');});
}

async function applyTemplate(templateId, date){
  showLoad(true);
  try {
    const{data:tmpl}=await db.from('tss_templates').select('*').eq('id',templateId).single();
    if(!tmpl) throw new Error('Template no encontrado');
    let blocks=[]; try{blocks=JSON.parse(tmpl.blocks||'[]');}catch(e){}
    if(!blocks.length){ toast('Template vacío','error'); return; }
    const inserts=blocks.map(b=>({...b, date, created_by:S.user.id}));
    const{error}=await db.from('tss_daily_plans').insert(inserts);
    if(error) throw error;
    closeModal('templateModal');
    toast('✅ Template "'+tmpl.name+'" aplicado','success');
    loadPlanDay(date);
  } catch(e){ toast('Error aplicando template','error'); console.error(e); }
  finally{ showLoad(false); }
}

async function deleteTemplate(templateId){
  if(!confirm('¿Eliminar este template?')) return;
  showLoad(true);
  try {
    const{error}=await db.from('tss_templates').delete().eq('id',templateId);
    if(error) throw error;
    closeModal('templateModal');
    toast('Template eliminado','success');
  } catch(e){ toast('Error eliminando template','error'); console.error(e); }
  finally{ showLoad(false); }
}

function filterPlanView(){
  const sel = document.getElementById('planFilter');
  if(!sel) return;
  const val = sel.value;
  document.querySelectorAll('.plan-block').forEach(el=>{
    if(val==='all'){ el.style.display=''; return; }
    const scope = el.dataset.scope;
    const target = el.dataset.target;
    if(val.startsWith('ath_')){
      const athId = val.replace('ath_','');
      el.style.display = (scope==='general'||scope==='individual'&&target===athId) ? '' : 'none';
    } else if(val.startsWith('grp_')){
      const grpId = val.replace('grp_','');
      el.style.display = (scope==='general'||scope==='group'&&target===grpId) ? '' : 'none';
    }
  });
}

    if(!blocks.length){

        <div style="font-size:32px;margin-bottom:8px;">📋</div>
        <p style="font-size:13px;color:var(--grey);">Sin actividades planificadas para este día</p>
      </div>`;
    } else {
      blocks.forEach(plan=>{

        const vid = ytId(plan.video_url);
        let scopeLabel = '';
        if(plan.scope==='general'){ scopeLabel=`<span class="chip" style="font-size:9px;background:rgba(0,201,232,.12);color:var(--cyan);border:1px solid rgba(0,201,232,.25);">🌊 Todo el equipo</span>`; }
        if(plan.scope==='group'){ const g=S.groups.find(g=>g.id===plan.target_id); scopeLabel=`<span class="chip chip-amber" style="font-size:9px;">👥 ${g?g.name:'Grupo'}</span>`; }
        if(plan.scope==='individual'){ const a=S.athletes.find(a=>a.id===plan.target_id); scopeLabel=`<span class="chip chip-purple" style="font-size:9px;">🏄 ${a?a.name:'Atleta'}</span>`; }
        html+=`<div class="card card-${bt.color} anim-up plan-block" data-scope="${plan.scope}" data-target="${plan.target_id||''}" style="margin-bottom:10px;">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:10px;">
            <div style="display:flex;align-items:center;gap:8px;">
              <span style="font-size:22px;">${bt.emoji}</span>
              <div>
                <div style="font-size:15px;font-weight:800;color:var(--white);">${bt.label}</div>
                <div style="display:flex;gap:5px;margin-top:3px;flex-wrap:wrap;">
                  ${scopeLabel}
                  ${plan.objective?`<div style="font-size:11px;color:var(--grey);">${plan.objective}</div>`:''}
                </div>
              </div>
            </div>
            ${isCoach?`<div style="display:flex;gap:5px;">
              <button class="btn btn-xs btn-outline" onclick="openEditBlockModal('${plan.id}','${date}')">✏️</button>
              <button class="btn btn-xs btn-red" onclick="deleteBlock('${plan.id}','${date}')">🗑</button>
            </div>`:''}
          </div>
          ${plan.notes?`<p style="font-size:13px;line-height:1.7;color:rgba(232,240,245,.8);white-space:pre-wrap;margin-bottom:8px;">${plan.notes}</p>`:''}
          ${plan._blocks&&plan._blocks.length?`
            <div style="margin-top:8px;display:flex;flex-direction:column;gap:6px;">
              ${plan._blocks.map((t,i)=>`
                <div style="background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:8px;padding:10px 12px;display:flex;align-items:flex-start;gap:10px;">
                  <span style="font-size:13px;color:var(--grey);font-family:'Space Mono',monospace;min-width:20px;">${i+1}.</span>
                  <div style="flex:1;">
                    <div style="font-size:13px;font-weight:600;color:var(--white);">${t.name}</div>
                    ${t.desc?`<div style="font-size:12px;color:rgba(232,240,245,.55);margin-top:3px;line-height:1.5;">${t.desc}</div>`:''}

/* Buffer de tareas para el modal */
let _planTasks = [];

function renderPlanTaskList(){
  const el = document.getElementById('planTaskList'); if(!el) return;
  if(!_planTasks.length){
    el.innerHTML='<p style="font-size:12px;color:var(--grey);text-align:center;padding:10px 0;">Sin tareas. Usa el botón + para agregar.</p>';
    return;
  }
  el.innerHTML = _planTasks.map((t,i)=>`
    <div style="background:rgba(255,255,255,.04);border:1px solid rgba(255,255,255,.07);border-radius:8px;padding:10px;margin-bottom:6px;">
      <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:6px;">
        <span style="font-size:11px;font-weight:700;color:var(--cyan);">Tarea ${i+1}</span>
        <button type="button" class="btn btn-xs btn-red" onclick="_planTasks.splice(${i},1);renderPlanTaskList()">✕</button>
      </div>
      <input type="text" class="inp" style="margin-bottom:5px;" value="${t.name}" oninput="_planTasks[${i}].name=this.value" placeholder="Nombre de la tarea">
      <textarea class="ta" style="min-height:44px;margin-bottom:5px;" oninput="_planTasks[${i}].desc=this.value" placeholder="Descripción / instrucciones">${t.desc}</textarea>
      <input type="text" class="inp" value="${t.duration}" oninput="_planTasks[${i}].duration=this.value" placeholder="Duración (ej: 10 min, 3 series)">
    </div>`).join('');
}

function switchScope(scope, btn){
  document.querySelectorAll('.scope-tab').forEach(b=>b.classList.remove('active'));
  if(btn) btn.classList.add('active');
  document.getElementById('blockScopeVal').value = scope;
  document.getElementById('scopeGroupRow').style.display = scope==='group'?'block':'none';
  document.getElementById('scopeAthRow').style.display = scope==='individual'?'block':'none';
}

function openAddBlockModalWithFilter(date){
  const sel = document.getElementById('planFilter');
  const val = sel ? sel.value : 'all';
  let preScope = 'general', preTarget = '';
  if(val && val.startsWith('ath_')){ preScope='individual'; preTarget=val.replace('ath_',''); }
  else if(val && val.startsWith('grp_')){ preScope='group'; preTarget=val.replace('grp_',''); }
  const preData = preScope==='general' ? null : {scope:preScope, target_id:preTarget, _blocks:[]};

  openAddBlockModal(date, preData);
}

function openAddBlockModal(date, existData=null){
  _planTasks = existData&&existData._blocks ? (Array.isArray(existData._blocks)?existData._blocks:JSON.parse(existData._blocks)) : [];
  const curScope = existData?existData.scope:'general';
  const curTarget = existData?existData.target_id||'':'';
  const groupOpts = S.groups.map(g=>`<option value="${g.id}" ${curTarget===g.id?'selected':''}>${g.name}</option>`).join('');
  const athOpts = S.athletes.map(a=>`<option value="${a.id}" ${curTarget===a.id?'selected':''}>${a.name}</option>`).join('');
  const m=document.createElement('div'); m.className='modal-overlay'; m.id='blockModal';
  m.innerHTML=`<div class="modal-sheet">
    <div class="modal-head">
      <div>
        <div class="modal-title">${existData?'Editar Actividad':'Nueva Actividad'}</div>
        <div class="modal-sub">${fmtDate(date)}</div>
      </div>
      <button class="modal-close" onclick="closeModal('blockModal')">✕</button>
    </div>

    <label class="inp-label">¿Para quién?</label>
    <div style="display:flex;gap:6px;margin-bottom:10px;">
      <button type="button" class="scope-tab${curScope==='general'?' active':''}" onclick="switchScope('general',this)">🌊 Todo el equipo</button>
      <button type="button" class="scope-tab${curScope==='group'?' active':''}" onclick="switchScope('group',this)">👥 Grupo</button>
      <button type="button" class="scope-tab${curScope==='individual'?' active':''}" onclick="switchScope('individual',this)">🏄 Individual</button>
    </div>
    <input type="hidden" id="blockScopeVal" value="${curScope}">
    <div id="scopeGroupRow" style="display:${curScope==='group'?'block':'none'};">
      <label class="inp-label">Grupo</label>
      <select class="sel" id="blockGroupSel">${groupOpts||'<option value="">Sin grupos</option>'}</select>
    </div>
    <div id="scopeAthRow" style="display:${curScope==='individual'?'block':'none'};">
      <label class="inp-label">Atleta</label>
      <select class="sel" id="blockAthSel">${athOpts}</select>
    </div>

    <label class="inp-label">Tipo de Actividad</label>
    <div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:12px;" id="blockTypeRow">
      ${BLOCK_TYPES.map(bt=>`
        <button type="button" class="opt-pill${existData&&existData.work_type===bt.id?' on':''}"
          onclick="selectBlockType('${bt.id}',this)">${bt.emoji} ${bt.label}</button>`).join('')}
    </div>
    <input type="hidden" id="blockTypeVal" value="${existData?existData.work_type:''}">

    <label class="inp-label">Objetivo / Título corto</label>
    <input type="text" class="inp" id="blockObj" value="${existData?existData.objective||'':''}" placeholder="Ej: Activar sistema nervioso">

    <label class="inp-label">Instrucciones generales</label>
    <textarea class="ta" id="blockNotes" style="min-height:70px;" placeholder="Descripción general...">${existData?existData.notes||'':''}</textarea>

    <div id="sesionExtraFields" style="display:${existData&&existData.work_type==='sesion'?'block':'none'};">
      <label class="inp-label">⏱ Tiempo en el agua</label>
      <input type="text" class="inp" id="blockSesionTime" value="${existData?existData.sesion_time||'':''}" placeholder="Ej: 45 min, 1:30 hs">
      <label class="inp-label">🔁 Repeticiones / Series</label>
      <input type="text" class="inp" id="blockSesionReps" value="${existData?existData.sesion_reps||'':''}" placeholder="Ej: 3 series de 15 min">
    </div>

    <div style="display:flex;justify-content:space-between;align-items:center;margin-top:16px;margin-bottom:8px;">
      <label class="inp-label" style="margin:0;">Tareas específicas</label>
      <button type="button" class="btn btn-xs btn-cyan" onclick="_planTasks.push({name:'',desc:'',duration:''});renderPlanTaskList()">+ Tarea</button>
    </div>
    <div id="planTaskList"></div>

    <label class="inp-label">Video YouTube (opcional)</label>
    <input type="url" class="inp" id="blockVideo" value="${existData?existData.video_url||'':''}" placeholder="https://youtube.com/...">
    <button class="save-btn" style="margin-top:16px;" onclick="saveBlock('${date}','${existData?existData.id:''}')">💾 Guardar Actividad</button>
  </div>`;
  document.body.appendChild(m);
  m.onclick=e=>{ if(e.target===m) closeModal('blockModal'); };
  // Apply preselected scope/target after DOM ready
  if(existData && existData.scope && existData.scope!=='general'){
    switchScope(existData.scope, null);
    if(existData.scope==='individual' && existData.target_id){
      const athSel=document.getElementById('blockAthSel');
      if(athSel) athSel.value=existData.target_id;
    }
    if(existData.scope==='group' && existData.target_id){
      const grpSel=document.getElementById('blockGroupSel');
      if(grpSel) grpSel.value=existData.target_id;
    }
  }  renderPlanTaskList();
}

function selectBlockType(id, btn){
  document.querySelectorAll('#blockTypeRow .opt-pill').forEach(b=>b.classList.remove('on'));
  btn.classList.add('on');
  document.getElementById('blockTypeVal').value=id;

  const sf=document.getElementById('sesionExtraFields');
  if(sf) sf.style.display = id==='sesion'?'block':'none';
}

async function openEditBlockModal(planId, date){
  showLoad(true);
  try {
    const{data}=await db.from('tss_daily_plans').select('*').eq('id',planId).single();
    if(!data) return;
    try { data._blocks=JSON.parse(data.exercises||'[]'); } catch(e){ data._blocks=[]; }
    data.id=planId;
    openAddBlockModal(date, data);
  } catch(e){ toast('Error','error'); console.error(e); } finally { showLoad(false); }
}

async function saveSesionResult(planId, result, date){
  try {
    const{error}=await db.from('tss_daily_checkins').upsert({
      athlete_id: S.user.id,
      date,
      sesion_result: JSON.stringify(Object.assign(
        JSON.parse((await db.from('tss_daily_checkins').select('sesion_result').eq('athlete_id',S.user.id).eq('date',date).maybeSingle()).data?.sesion_result||'{}'),
        {[planId]: result}
      ))
    },{onConflict:'athlete_id,date'});
    if(error) throw error;
    // Update UI
    document.querySelectorAll(`[data-sesion-plan="${planId}"]`).forEach(btn=>{
      btn.classList.remove('sesion-lograste','sesion-parcial','sesion-no');
      btn.style.opacity='0.4';
    });
    const active = document.querySelector(`[data-sesion-plan="${planId}"][data-sesion-val="${result}"]`);
    if(active){ active.classList.add('sesion-'+result.replace(' ','')); active.style.opacity='1'; }
    toast('✅ Resultado guardado','success');
  } catch(e){ toast('Error guardando resultado','error'); console.error(e); }
}

async function saveBlock(date, existId){
  const work_type = document.getElementById('blockTypeVal')?.value;
  if(!work_type){ toast('Selecciona el tipo de actividad','error'); return; }
  const scope = document.getElementById('blockScopeVal')?.value || 'general';
  let target_id = null;
  if(scope==='group') target_id = document.getElementById('blockGroupSel')?.value || null;
  if(scope==='individual') target_id = document.getElementById('blockAthSel')?.value || null;

  if((scope==='group'||scope==='individual')&&!target_id){ toast('Selecciona el destino','error'); return; }
  const isSesionBlock = work_type === 'sesion';
  const payload = {
    date, scope, target_id,
    work_type,
    objective: gv('blockObj'),
    notes: gv('blockNotes'),
    exercises: JSON.stringify(_planTasks.filter(t=>t.name.trim())),
    video_url: gv('blockVideo')||null,
    created_by: S.user.id,
    sesion_time: isSesionBlock ? (gv('blockSesionTime')||null) : null,
    sesion_reps: isSesionBlock ? (gv('blockSesionReps')||null) : null,
  };
  showLoad(true);
  try {
    if(existId){
      const{error}=await db.from('tss_daily_plans').update(payload).eq('id',existId);
      if(error) throw error;
    } else {
      const{error}=await db.from('tss_daily_plans').insert(payload);
      if(error) throw error;
    }
    toast('✅ Actividad guardada','success');
    closeModal('blockModal');
    loadPlanDay(date);
  } catch(e){ toast('Error al guardar: '+e.message,'error'); console.error(e); } finally { showLoad(false); }
}

async function deleteBlock(planId, date){
  if(!confirm('¿Eliminar esta actividad?')) return;
  showLoad(true);
  try {
    await db.from('tss_daily_plans').delete().eq('id',planId);
    toast('Actividad eliminada','success'); loadPlanDay(date);
  } catch(e){ toast('Error','error'); } finally { showLoad(false); }
}

/* COPY WEEK */
function openCopyWeek(fromDate){
  const m=document.createElement('div'); m.className='modal-overlay'; m.id='copyWeekModal';
  m.innerHTML=`<div class="modal-sheet">
    <div class="modal-head">
      <div><div class="modal-title">Copiar Semana</div><div class="modal-sub">Duplica todos los planes de una semana</div></div>
      <button class="modal-close" onclick="closeModal('copyWeekModal')">✕</button>
    </div>
    <label class="inp-label">Semana origen (cualquier día de esa semana)</label>
    <input type="date" class="inp" id="cwFrom" value="${fromDate}">
    <label class="inp-label">Semana destino (primer día de la semana destino)</label>
    <input type="date" class="inp" id="cwTo">
    <p style="font-size:11px;color:var(--grey);margin-top:8px;line-height:1.6;">⚠️ Solo copia planes que no existan ya en la semana destino.</p>
    <button class="save-btn" style="margin-top:16px;" onclick="execCopyWeek()">📋 Copiar Semana</button>
  </div>`;
  document.body.appendChild(m);
  m.onclick=e=>{ if(e.target===m) closeModal('copyWeekModal'); };
}

async function execCopyWeek(){
  const fromDate=new Date(gv('cwFrom')+'T00:00:00');
  const toDate=new Date(gv('cwTo')+'T00:00:00');
  if(!gv('cwFrom')||!gv('cwTo')){toast('Completa las fechas','error');return;}
  // Get start of from-week (Monday)
  const fromDay=fromDate.getDay()||7;
  const fromMon=new Date(fromDate); fromMon.setDate(fromDate.getDate()-(fromDay-1));
  // Get start of to-week
  const toDay=toDate.getDay()||7;
  const toMon=new Date(toDate); toMon.setDate(toDate.getDate()-(toDay-1));
  const diff=Math.round((toMon-fromMon)/(1000*60*60*24));
  if(diff===0){toast('Las semanas son iguales','error');return;}

  showLoad(true);
  try {
    // Get all plans from from-week
    const dates=[];
    for(let i=0;i<7;i++){ const d=new Date(fromMon); d.setDate(fromMon.getDate()+i); dates.push(d.toISOString().split('T')[0]); }
    const{data:plans}=await db.from('tss_daily_plans').select('*').in('date',dates);
    if(!plans||!plans.length){toast('No hay planes en la semana origen','error');return;}

    let copied=0;
    for(const p of plans){
      const newDate=new Date(p.date+'T00:00:00'); newDate.setDate(newDate.getDate()+diff);
      const nd=newDate.toISOString().split('T')[0];
      // Check if plan exists
      const{data:ex}=await db.from('tss_daily_plans').select('id').eq('date',nd).eq('scope',p.scope).eq('target_id',p.target_id||'').maybeSingle();
      if(!ex){
        const{id:_,...rest}=p;
        await db.from('tss_daily_plans').insert({...rest,date:nd,created_by:S.user.id});
        copied++;
      }
    }
    toast(`✅ ${copied} planes copiados`,'success');
    closeModal('copyWeekModal'); renderPlanDias();
  } catch(e){toast('Error','error');console.error(e);}
  finally{showLoad(false);}
}

/* GRUPOS */
async function renderGrupos(){
  try {
    const{data:groups}=await db.from('tss_groups').select('*').order('name');
    S.groups=groups||[];
    let html=`<button class="btn btn-cyan btn-sm" style="margin-bottom:14px;" onclick="openGroupModal(null)">+ Crear Grupo</button>`;
    if(!S.groups.length){
      html+=`<div class="empty"><div class="empty-icon">👥</div><p class="empty-txt">Sin grupos creados</p></div>`;
    } else {
      for(const g of S.groups){
        const{data:members}=await db.from('tss_group_members').select('athlete_id').eq('group_id',g.id);
        const mids=(members||[]).map(m=>m.athlete_id);
        const mnames=S.athletes.filter(a=>mids.includes(a.id)).map(a=>a.name);
        html+=`<div class="card anim-up">
          <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px;">
            <div style="font-size:15px;font-weight:700;">${g.name}</div>
            <div style="display:flex;gap:6px;">
              <button class="btn btn-xs btn-outline" onclick="openGroupModal('${g.id}')">✏️ Editar</button>
              <button class="btn btn-xs btn-red" onclick="deleteGroup('${g.id}')">🗑</button>
            </div>
          </div>
          <div style="display:flex;flex-wrap:wrap;gap:4px;">
            ${mnames.map(n=>`<span class="chip chip-purple">${n}</span>`).join('')}
            ${!mnames.length?'<span style="font-size:12px;color:var(--grey);">Sin atletas asignados</span>':''}
          </div>
        </div>`;
      }
    }
    document.getElementById('planTab').innerHTML=html;
  } catch(e){ console.error('renderGrupos error',e); toast('Error al cargar grupos','error'); }
}

function openGroupModal(groupId){
  const m=document.createElement('div'); m.className='modal-overlay'; m.id='groupModal';
  m.innerHTML=`<div class="modal-sheet">
    <div class="modal-head">
      <div><div class="modal-title">${groupId?'Editar Grupo':'Nuevo Grupo'}</div></div>
      <button class="modal-close" onclick="closeModal('groupModal')">✕</button>
    </div>
    <label class="inp-label">Nombre del grupo</label>
    <input type="text" class="inp" id="gName" placeholder="Ej: Shortboard, Mujeres, Sub-18...">
    <label class="inp-label" style="margin-top:16px;">Atletas del grupo</label>
    <div id="groupAthList" style="display:flex;flex-wrap:wrap;gap:6px;margin-top:8px;">
      ${S.athletes.map(a=>`<button type="button" class="opt-pill" id="ga-${a.id}" onclick="toggleGroupAth('${a.id}',this)">${a.name}</button>`).join('')}
    </div>
    <button class="save-btn" style="margin-top:20px;" onclick="saveGroup('${groupId||''}')">💾 Guardar Grupo</button>
  </div>`;
  document.body.appendChild(m);
  m.onclick=e=>{ if(e.target===m) closeModal('groupModal'); };

  if(groupId){
    db.from('tss_groups').select('*').eq('id',groupId).single().then(({data})=>{
      if(data) document.getElementById('gName').value=data.name;
    });
    db.from('tss_group_members').select('athlete_id').eq('group_id',groupId).then(({data})=>{
      (data||[]).forEach(m=>{ const btn=document.getElementById(`ga-${m.athlete_id}`); if(btn){btn.classList.add('on');btn.dataset.sel='1';} });
    });
  }
}

function toggleGroupAth(id,btn){
  if(btn.dataset.sel==='1'){ btn.classList.remove('on'); btn.dataset.sel='0'; }
  else { btn.classList.add('on'); btn.dataset.sel='1'; }
}

async function saveGroup(existId){
  const name=gv('gName'); if(!name){toast('Ingresa el nombre','error');return;}
  const selAths=[...document.querySelectorAll('#groupAthList .opt-pill')].filter(b=>b.dataset.sel==='1').map(b=>b.id.replace('ga-',''));
  showLoad(true);
  try {
    let groupId=existId;
    if(existId){
      await db.from('tss_groups').update({name}).eq('id',existId);
    } else {
      const{data}=await db.from('tss_groups').insert({name,created_by:S.user.id}).select().single();
      groupId=data.id;
    }
    // Sync members
    await db.from('tss_group_members').delete().eq('group_id',groupId);
    if(selAths.length) await db.from('tss_group_members').insert(selAths.map(aid=>({group_id:groupId,athlete_id:aid})));
    // Refresh groups
    const{data:grps}=await db.from('tss_groups').select('*').order('name');
    S.groups=grps||[];
    toast('✅ Grupo guardado','success'); closeModal('groupModal'); renderGrupos();
  } catch(e){toast('Error','error');console.error(e);}
  finally{showLoad(false);}
}

async function deleteGroup(id){
  if(!confirm('¿Eliminar este grupo?')) return;
  showLoad(true);
  try {
    await db.from('tss_group_members').delete().eq('group_id',id);
    await db.from('tss_groups').delete().eq('id',id);
    const{data:grps}=await db.from('tss_groups').select('*').order('name');
    S.groups=grps||[];
    toast('Grupo eliminado','success'); renderGrupos();
  } catch(e){toast('Error','error');} finally{showLoad(false);}
}

  if(!athleteId){toast('Selecciona un atleta','error');return;}

  const payload={
    athlete_id:athleteId, coach_id:S.user.id, date,
    event_name:eventName,
    athlete_category:gv('ce-athlete_category'),
    event_level:gv('ce-event_level'),
    conditions:gv('ce-conditions'),
    wind:gv('ce-wind'),
    round_reached:gv('ce-round_reached'),

    commitment:parseInt(gv('ce-commitment'))||null,
    right_board:gv('ce-right_board'),
    board_performance:parseInt(gv('ce-board_performance'))||null,
    backup_plan:gv('ce-backup_plan'),
    heat_prep:parseInt(gv('ce-heat_prep'))||null,
    conversion:gv('ce-conversion'),
    unconverted_quality:parseInt(gv('ce-unconverted_quality'))||null,
