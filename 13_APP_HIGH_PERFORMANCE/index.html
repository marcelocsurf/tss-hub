async function openDayReport(athleteId, athleteName){
  const today = todayStr();
  // Show modal immediately with loading state
  let m = document.getElementById('dayReportModal');
  if(m) m.remove();
  m = document.createElement('div');
  m.className = 'modal-overlay';
  m.id = 'dayReportModal';
  m.innerHTML = `<div class="modal-sheet" style="max-height:90vh;overflow-y:auto;">
    <div class="modal-head">
      <div class="modal-title">📋 Reporte del Día</div>
      <button class="btn-icon" onclick="closeModal('dayReportModal')">✕</button>
    </div>
    <div id="dayReportBody" style="padding:4px 0;">
      <div style="text-align:center;padding:30px;color:var(--grey);font-size:12px;">Cargando...</div>
    </div>
  </div>`;
  document.body.appendChild(m);
  m.onclick = e => { if(e.target===m) closeModal('dayReportModal'); };

  try {
    const [ciRes, plansRes, evalRes] = await Promise.all([
      db.from('tss_daily_checkins').select('*').eq('athlete_id',athleteId).eq('date',today).maybeSingle(),
      db.from('tss_daily_plans').select('*').eq('date',today).order('created_at'),
      db.from('tss_evaluations').select('*').eq('athlete_id',athleteId).order('date',{ascending:false}).limit(1),
    ]);
    const ci = ciRes.data;
    const lastEval = evalRes.data?.[0] || null;

    // Get athlete's plans
    const athProfile = S.athletes.find(a=>a.id===athleteId);
    const myGroups = [];
    const {data:gm} = await db.from('tss_group_members').select('group_id').eq('athlete_id',athleteId);
    (gm||[]).forEach(g=>myGroups.push(g.group_id));
    const plans = (plansRes.data||[]).filter(p=>
      p.scope==='general' ||
      (p.scope==='individual' && p.target_id===athleteId) ||
      (p.scope==='group' && myGroups.includes(p.target_id))
    );

    // Load comp state
    const compKey = 'tss_comp_'+athleteId+'_'+today;
    let compState = {};
    if(ci?.comp_state){ try{ compState=JSON.parse(ci.comp_state); }catch(e){} }

    // Build plan progress
    let planHtml = '';
    if(plans.length){
      plans.forEach(p=>{
        const blockDone = !!compState[p.id+'_block'];
        let tasks=[]; try{ tasks=JSON.parse(p.exercises||'[]'); }catch(e){}
        const tasksDone = tasks.filter((_,i)=>compState[p.id+'_task_'+i]).length;
        const bt = {sesion:'🏄',fisico:'💪',mental:'🧠',tecnico:'🎯',tactico:'♟️',respiracion:'🌬️',meditacion:'🧘',mobility:'🤸',recovery:'🛌',otro:'📋'}[p.work_type]||'📋';
        const statusColor = blockDone?'var(--green)':tasksDone>0?'var(--amber)':'rgba(255,255,255,.15)';
        const statusIcon = blockDone?'✅':tasksDone>0?'⚡':'○';
        planHtml += `<div style="display:flex;align-items:center;gap:10px;padding:8px 10px;background:var(--bg3);border-radius:8px;margin-bottom:5px;">
          <span style="font-size:18px;">${bt}</span>

            <div style="font-size:12px;font-weight:700;color:var(--white);">${p.title||p.work_type}</div>

function openEditBio(athleteId){

  let m = document.getElementById('editBioModal'); if(m) m.remove();
  m = document.createElement('div'); m.className='modal-overlay'; m.id='editBioModal';
  m.innerHTML = `<div class="modal-sheet">
    <div class="modal-head">
      <div class="modal-title">✏️ Datos Físicos</div>
      <button class="btn-icon" onclick="closeModal('editBioModal')">✕</button>
    </div>
    <input type="hidden" id="editBioId" value="${athleteId}">
    <label class="inp-label">Fecha de nacimiento</label>
    <input class="inp" type="date" id="editBirthDate" value="${ath.birth_date||''}">
    <label class="inp-label" style="margin-top:12px;">Peso actual (kg)</label>
    <input class="inp" type="number" step="0.1" min="30" max="200" id="editWeight" placeholder="Ej: 72.5" value="${ath.weight_kg||''}">
    <label class="inp-label" style="margin-top:12px;">Altura (cm)</label>
    <input class="inp" type="number" step="0.1" min="100" max="230" id="editHeight" placeholder="Ej: 175" value="${ath.height_cm||''}">
    <label class="inp-label" style="margin-top:12px;">Posición de surf</label>
    <div style="display:flex;gap:8px;margin-bottom:16px;">
      <button type="button" id="stanceRegular" class="btn${ath.stance==='Goofy'?'':' btn-cyan'}" style="flex:1;" onclick="document.getElementById('stanceRegular').classList.add('btn-cyan');document.getElementById('stanceGoofy').classList.remove('btn-cyan');">🏄 Regular</button>
      <button type="button" id="stanceGoofy" class="btn${ath.stance==='Goofy'?' btn-cyan':''}" style="flex:1;" onclick="document.getElementById('stanceGoofy').classList.add('btn-cyan');document.getElementById('stanceRegular').classList.remove('btn-cyan');">🏄 Goofy</button>
    </div>
    <button class="btn btn-cyan" style="width:100%;" onclick="saveEditBio()">💾 Guardar</button>
  </div>`;
  document.body.appendChild(m);

async function saveEditBio(){
  const athleteId = document.getElementById('editBioId').value;
  const birth_date = document.getElementById('editBirthDate').value || null;
  const weight_kg = parseFloat(document.getElementById('editWeight').value) || null;
  const height_cm = parseFloat(document.getElementById('editHeight').value) || null;
  const stance = document.getElementById('stanceGoofy').classList.contains('btn-cyan') ? 'Goofy' : 'Regular';
  try {
    const {error} = await db.from('tss_profiles').update({birth_date, weight_kg, height_cm, stance}).eq('id', athleteId);
    if(error) throw error;
    // Update local cache
    const ai = S.athletes.findIndex(a=>a.id===athleteId);
    if(ai>=0) S.athletes[ai] = {...S.athletes[ai], birth_date, weight_kg, height_cm, stance};
    toast('✅ Datos actualizados','success');
    closeModal('editBioModal');
    // Refresh profile
    const athName = S.athletes[ai]?.name || '';
    vPerfil(athleteId, athName);
  } catch(e){ toast('Error: '+e.message,'error'); console.error(e); }
}

async function confirmDeactivate(athleteId, athleteName){
  if(!confirm('¿Desactivar a ' + athleteName + '? Sus datos históricos se conservan pero dejará de aparecer en el equipo.')) return;
  try {
    const {error} = await db.from('tss_profiles').update({active: false}).eq('id', athleteId);
    if(error) throw error;
    S.athletes = S.athletes.filter(a=>a.id!==athleteId);
    toast('✅ ' + athleteName + ' desactivado','success');
    vAtletas();
  } catch(e){ toast('Error: '+e.message,'error'); console.error(e); }
}

async function vPerfil(athleteId=null,athleteName=null){
  const id=athleteId||S.user.id; const name=athleteName||S.user.name;
  const isCoach=S.user.role==='coach'||S.user.role==='acoach';
  const isOwnProfile = id===S.user.id;
  // Get avatar_url from athletes list or current user
  const athData = S.athletes.find(a=>a.id===id) || S.user;
  const avatarUrl = athData?.avatar_url || S.user.avatar_url || null;
  const _initials = name?name.charAt(0):'?';
  const avatarHtml = avatarUrl
    ? ["<img src=\"",avatarUrl,"\" style=\"width:52px;height:52px;border-radius:50%;object-fit:cover;border:2px solid var(--cyan);\" onerror=\"this.onerror=null\">"].join("")
    : '<div class="ath-avatar" style="width:52px;height:52px;font-size:22px;">'+_initials+'</div>';

  // Coach viewing own profile
  if(isCoach && isOwnProfile){
    const roleLabel = S.user.role==='coach'?'Head Coach':'Coach Asistente';
    const roleColor = S.user.role==='coach'?'var(--amber)':'var(--purple)';
    render(`<div class="page-title">Mi Perfil</div><div class="page-sub">TSS El Salvador 2026</div>

      <div onclick="uploadMyAvatar()" style="cursor:pointer;position:relative;flex-shrink:0;">
        ${avatarHtml}

          ${evals[0].strengths?`<p style="font-size:12px;color:var(--green);margin-top:8px;">💪 ${evals[0].strengths}</p>`:''}
          ${evals[0].limitations?`<p style="font-size:12px;color:var(--red);margin-top:4px;">⚠️ ${evals[0].limitations}</p>`:''}
          ${evals[0].recommendations?`<p style="font-size:12px;color:var(--grey);margin-top:4px;">📋 ${evals[0].recommendations}</p>`:''}
        </div>`:''}
      ${athleteId?`<button class="btn btn-ghost" style="margin-top:12px;" onclick="switchView('${S.user.role==='coach'||S.user.role==='acoach'?'panel':'semana'}')">← Volver</button>`:''}
      <div id="compEvalProfileSection" style="margin-top:14px;"></div>
      <div id="compSection" style="margin-top:14px;"><p style="padding:12px;text-align:center;color:var(--grey);font-size:12px;">Cargando competencias...</p></div>`;

  // Render wave bar chart if data exists
  const chartEl=document.getElementById('waveBarChart');
  if(chartEl&&allWaveScores.length>=2){
    const arr=[...allWaveScores].reverse().slice(-8);
    const maxS=Math.max(...arr); const minS=Math.min(...arr); const range=maxS-minS||1;
    chartEl.innerHTML=arr.map((s,i)=>{
      const h=Math.round(10+((s-minS)/range)*38);
      const isLast=i===arr.length-1;
      return '<div style="flex:1;display:flex;flex-direction:column;align-items:center;gap:2px;">'
        +'<div style="font-size:8px;color:'+(isLast?'var(--cyan)':'var(--grey)')+';">'+s+'</div>'
        +'<div style="width:100%;height:'+h+'px;background:'+(isLast?'var(--cyan)':'rgba(0,201,232,.3)')+';border-radius:3px 3px 0 0;"></div>'
        +'</div>';
    }).join('');
  }
  // Load competitions and comp evals after profile renders
  const compEl=document.getElementById('compSection');
  if(compEl) loadCompetencias(id);
  loadCompEvalProfile(id);
  } catch(e){ document.getElementById('perfilContent').innerHTML='<p style="padding:20px;text-align:center;color:var(--red);font-size:12px;">Error al cargar perfil</p>'; console.error(e); }
}

/* ============================================================
   PDF REPORT
============================================================ */
async function genPDF(athleteId, athleteName){
  toast('Generando PDF...','info');
  try {
    const[{data:sessions},{data:evals},{data:checkins}]=await Promise.all([
      db.from('tss_sessions').select('*').eq('athlete_id',athleteId).order('date',{ascending:false}),
      db.from('tss_evaluations').select('*').eq('athlete_id',athleteId).order('date',{ascending:false}),
      db.from('tss_daily_checkins').select('*').eq('athlete_id',athleteId).order('date',{ascending:false}),
    ]);

    const { jsPDF } = window.jspdf;
    const doc = new jsPDF({unit:'mm',format:'a4'});
    const W=210, M=20;
    let y=20;

    // Header
    doc.setFillColor(0,201,232);
    doc.rect(0,0,W,14,'F');
    doc.setTextColor(5,10,15);
    doc.setFontSize(11); doc.setFont('helvetica','bold');
    doc.text('TSS — THE SURF SEQUENCE® | EL SALVADOR 2026',M,9);

    y=28;
    doc.setTextColor(5,10,15);
    doc.setFontSize(20); doc.setFont('helvetica','bold');
    doc.text(athleteName,M,y); y+=8;
    doc.setFontSize(10); doc.setFont('helvetica','normal');
    doc.setTextColor(100,130,150);
    doc.text(`Reporte generado: ${new Date().toLocaleDateString('es-SV')}`,M,y); y+=10;

    // Índice de Rendimiento
    const scores=(evals||[]).map(e=>((e.physical||0)+(e.technique||0)+(e.mindset||0)+(e.competitive||0))/4).filter(Boolean);
    const ws=scores.length?(scores.reduce((a,b)=>a+b,0)/scores.length).toFixed(1):'N/A';
    doc.setFillColor(10,16,24);
    doc.roundedRect(M,y,W-M*2,18,3,3,'F');
    doc.setTextColor(0,201,232);
    doc.setFontSize(14); doc.setFont('helvetica','bold');
    doc.text(`ÍNDICE DE RENDIMIENTO: ${ws}/10`,M+8,y+7);
    doc.setFontSize(9); doc.setFont('helvetica','normal');
    doc.setTextColor(107,138,154);
    doc.text(`${scores.length} evaluaciones · ${sessions?.length||0} sesiones · ${checkins?.length||0} check-ins`,M+8,y+14);
    y+=26;

    // Evaluations
    if(evals&&evals.length){
      doc.setTextColor(0,201,232);
      doc.setFontSize(11); doc.setFont('helvetica','bold');
      doc.text('EVALUACIONES DEL COACH',M,y); y+=6;
      doc.setDrawColor(0,201,232,0.3); doc.setLineWidth(0.3);
      doc.line(M,y,W-M,y); y+=5;

      evals.forEach(ev=>{
        if(y>260){doc.addPage();y=20;}
        doc.setFontSize(9); doc.setFont('helvetica','bold'); doc.setTextColor(232,240,245);
        doc.text(fmtDate(ev.date),M,y);
        const avg=((ev.physical+ev.technique+ev.mindset+ev.competitive)/4).toFixed(1);
        doc.setTextColor(0,201,232);
        doc.text(`Promedio: ${avg}/10`,M+40,y); y+=5;
        doc.setFont('helvetica','normal'); doc.setTextColor(107,138,154);
        doc.text(`Físico: ${ev.physical}  Técnica: ${ev.technique}  Mentalidad: ${ev.mindset}  Competitivo: ${ev.competitive}`,M+4,y); y+=4;
        if(ev.strengths){ const lines=doc.splitTextToSize(`💪 ${ev.strengths}`,W-M*2-8); doc.setTextColor(34,197,94); doc.text(lines,M+4,y); y+=lines.length*4; }
        if(ev.limitations){ const lines=doc.splitTextToSize(`⚠️ ${ev.limitations}`,W-M*2-8); doc.setTextColor(239,68,68); doc.text(lines,M+4,y); y+=lines.length*4; }
        if(ev.recommendations){ const lines=doc.splitTextToSize(`📋 ${ev.recommendations}`,W-M*2-8); doc.setTextColor(107,138,154); doc.text(lines,M+4,y); y+=lines.length*4; }
        y+=4;
      });
    }

    // Sessions
    if(sessions&&sessions.length){
      if(y>240){doc.addPage();y=20;}
      doc.setTextColor(0,201,232);
      doc.setFontSize(11); doc.setFont('helvetica','bold');
      doc.text('HISTORIAL DE SESIONES',M,y); y+=6;
      doc.line(M,y,W-M,y); y+=5;
      sessions.forEach(s=>{
        if(y>265){doc.addPage();y=20;}
        doc.setFontSize(8); doc.setFont('helvetica','bold'); doc.setTextColor(232,240,245);
        doc.text(`${fmtDate(s.date)} — ${s.type}`,M,y);
        doc.setFont('helvetica','normal'); doc.setTextColor(107,138,154);
        doc.text(`${s.duration} min | Int. ${s.intensity}/10`,M+80,y); y+=4;
        if(s.notes){ const lines=doc.splitTextToSize(s.notes,W-M*2-8); doc.setTextColor(150,170,180); doc.text(lines,M+4,y); y+=lines.length*4; }
        y+=2;
      });
    }

    // Check-ins summary
    if(checkins&&checkins.length){
      if(y>240){doc.addPage();y=20;}
      doc.setTextColor(0,201,232);
      doc.setFontSize(11); doc.setFont('helvetica','bold');
      doc.text('CHECK-INS DIARIOS',M,y); y+=6;
      doc.line(M,y,W-M,y); y+=5;
      const avgE=(checkins.reduce((s,c)=>s+c.energy_level,0)/checkins.length).toFixed(1);
      const avgF=(checkins.reduce((s,c)=>s+c.focus_level,0)/checkins.length).toFixed(1);
      const goals=checkins.filter(c=>c.goal_achieved==='Si').length;
      doc.setFontSize(9); doc.setFont('helvetica','normal'); doc.setTextColor(107,138,154);
      doc.text(`Total: ${checkins.length} check-ins | Energía promedio: ${avgE}/5 | Enfoque promedio: ${avgF}/5 | Objetivos logrados: ${goals}`,M,y); y+=8;
      checkins.slice(0,20).forEach(c=>{
        if(y>265){doc.addPage();y=20;}
        doc.setFontSize(8); doc.setTextColor(232,240,245);
        doc.text(`${fmtDate(c.date)}`,M,y);
        doc.setTextColor(107,138,154);
        doc.text(`💧${c.water_glasses}v  ⚡${c.energy_level}/5  🥗${c.nutrition}  🎯${c.focus_level}/5  ✅${c.goal_achieved}`,M+28,y); y+=5;
      });
    }

    // Footer
    const pages=doc.internal.getNumberOfPages();
    for(let i=1;i<=pages;i++){
      doc.setPage(i);
      doc.setFontSize(8); doc.setTextColor(70,96,112);
      doc.text('© TSS — The Surf Sequence® | Propiedad intelectual de Marcelo Castellanos',M,290);
      doc.text(`${i}/${pages}`,W-M,290,{align:'right'});
    }

    doc.save(`TSS_${athleteName.replace(' ','_')}_${todayStr()}.pdf`);
    toast('✅ PDF generado','success');
  } catch(e){ toast('Error generando PDF','error'); console.error(e); }
}

async function saveNewAthlete(){
  const name = document.getElementById('newAthName')?.value?.trim();
  const pin = document.getElementById('newAthPin')?.value?.trim();
  if(!name){ toast('Ingresa el nombre del atleta','error'); return; }
  if(!pin || pin.length !== 4 || isNaN(pin)){ toast('El PIN debe ser exactamente 4 dígitos','error'); return; }
  // Check PIN not already in use
  const pinExists = S.athletes.find(a=>a.pin===pin) || (pin==='0000');
  if(pinExists){ toast('Ese PIN ya está en uso, elige otro','error'); return; }
  showLoad(true);
  try {
    const{data,error} = await db.from('tss_profiles').insert({
      user_id: crypto.randomUUID(),
      name,
      role: 'athlete',
      pin,
      stance: document.getElementById('newStanceGoofy')?.classList.contains('btn-cyan')?'Goofy':'Regular',
      active: true
    }).select().single();
    if(error) throw error;
    // Add to local list
    S.athletes.push(data);
    toast(`✅ ${name} agregado al equipo`,'success');
    closeModal('addAthleteModal');
    vAtletas();
  } catch(e){ toast('Error al crear atleta: '+e.message,'error'); console.error(e); }
  finally{ showLoad(false); }
}

async function uploadAvatar(athleteId){
  const input = document.createElement('input');
  input.type = 'file'; input.accept = 'image/*';
  input.onchange = async (e) => {
    const file = e.target.files[0]; if(!file) return;
    // Resize if too large
    if(file.size > 2*1024*1024){ toast('Imagen muy grande, máximo 2MB','error'); return; }
    showLoad(true);
    try {
      const ext = file.name.split('.').pop();
      const path = `${athleteId}.${ext}`;
      const { error: upErr } = await db.storage.from('avatars').upload(path, file, {upsert:true});
      if(upErr) throw upErr;
      const { data: urlData } = db.storage.from('avatars').getPublicUrl(path);
      const avatarUrl = urlData.publicUrl + '?t=' + Date.now();
      const { error: dbErr } = await db.from('tss_profiles').update({avatar_url: avatarUrl}).eq('id', athleteId);
      if(dbErr) throw dbErr;
      // Update local cache
      const ath = S.athletes.find(a=>a.id===athleteId);
      if(ath) ath.avatar_url = avatarUrl;
      if(athleteId === S.user.id){ S.user.avatar_url = avatarUrl; updateHeaderAvatar(); }
      toast('✅ Foto actualizada','success');
      vPerfil(athleteId, athleteId===S.user.id ? S.user.name : S.athletes.find(a=>a.id===athleteId)?.name);
    } catch(e){ toast('Error al subir foto: '+e.message,'error'); console.error(e); }
    finally{ showLoad(false); }
  };
  input.click();
}

function getWeekDays(offset=0){
  const now=new Date(new Date().toLocaleString('en-US', {timeZone:'America/El_Salvador'}));
  const day=now.getDay()||7;
  const mon=new Date(now); mon.setDate(now.getDate()-day+1+(offset*7));
  return Array.from({length:7},(_,i)=>{ const d=new Date(mon); d.setDate(mon.getDate()+i); return d.toISOString().split('T')[0]; });
}

async function openWeeklyReport(athleteId, athleteName, weekOffset=0){

    const ciMap = {}; (checkins||[]).forEach(c=>ciMap[c.date]=c);
    
    // Filter presencial sessions for this athlete
    const myPres = (presSessions||[]).filter(s=>{
      try{ const ids=s.athlete_ids?JSON.parse(s.athlete_ids):[];return ids.includes(athleteId);}catch(e){return false;}
    });
    const presMap = {};
    myPres.forEach(s=>{ if(!presMap[s.date]) presMap[s.date]=[]; presMap[s.date].push(s); });

    // Stats
    const totalDays = 7;
    const checkinDays = (checkins||[]).length;
    const avgWater = checkinDays ? (checkinDays>0?(checkins.reduce((s,c)=>s+(c.water_glasses||0),0)/checkinDays).toFixed(1):'0') : '—';
    const avgEnergy = checkinDays ? (checkins.reduce((s,c)=>s+(c.energy_level||0),0)/checkinDays).toFixed(1) : '—';
    const avgFocus = checkinDays ? (checkins.reduce((s,c)=>s+(c.focus_level||0),0)/checkinDays).toFixed(1) : '—';
    const goodNutrition = (checkins||[]).filter(c=>c.nutrition==='Si').length;

    const avgPlan = checkinDays ? Math.round((checkins||[]).reduce((s,c)=>s+(c.progress_pct||0),0)/checkinDays) : 0;

      <!-- WAVE SCORE AREAS -->
      ${latestEval ? `<div style="background:var(--bg3);border-radius:10px;padding:12px;margin-bottom:14px;">
        <div style="font-size:11px;color:var(--grey);letter-spacing:.8px;text-transform:uppercase;margin-bottom:10px;">⭐ Índice de Rendimiento — Áreas</div>
        ${[['Físico',latestEval.physical,'var(--green)'],['Técnica',latestEval.technique,'var(--cyan)'],['Mentalidad',latestEval.mindset,'var(--purple)'],['Competitivo',latestEval.competitive,'var(--amber)']].map(([label,val,color])=>`
          <div style="margin-bottom:8px;">

              <span style="font-size:12px;">${label}</span>

        ${days.map((date,i)=>{

   MÓDULO: REPORTES PDF — Mensual equipo e individual (federación)
   genMonthlyPDF, openMonthlyAthleteSelect, genWeeklyPDF

async function genMonthlyPDF(athleteIdOrTeam){
  try {
    showLoad(true);
    // Get previous month range
    const now = new Date();
    const firstDay = new Date(now.getFullYear(), now.getMonth()-1, 1);
    const lastDay = new Date(now.getFullYear(), now.getMonth(), 0);
    const mon = firstDay.toISOString().split('T')[0];
    const sun = lastDay.toISOString().split('T')[0];
    const monthName = firstDay.toLocaleString('es',{month:'long',year:'numeric'});

    const isTeam = athleteIdOrTeam==='team';
    const athletes = isTeam ? S.athletes : S.athletes.filter(a=>a.id===athleteIdOrTeam);
    if(!athletes.length){ toast('No hay atletas','error'); return; }

    const {jsPDF}=window.jspdf;
    const doc=new jsPDF({unit:'mm',format:'a4'});
    const M=15; const pw=210-M*2;

    for(let ai=0; ai<athletes.length; ai++){
      const ath = athletes[ai];
      if(ai>0) doc.addPage();
      let y=M;

      // Load data for this athlete
      const [ciRes,evalRes,sessRes] = await Promise.all([
        db.from('tss_daily_checkins').select('*').eq('athlete_id',ath.id).gte('date',mon).lte('date',sun).order('date'),
        db.from('tss_evaluations').select('*').eq('athlete_id',ath.id).gte('date',mon).lte('date',sun).order('date'),
        db.from('tss_presencial_sessions').select('*').gte('date',mon).lte('date',sun).order('date'),
      ]);
      const checkins = ciRes.data||[];
      const evals = evalRes.data||[];
      const sessions = (sessRes.data||[]).filter(s=>{
        try{ const ids=Array.isArray(s.athlete_ids)?s.athlete_ids:JSON.parse(s.athlete_ids||'[]'); return ids.includes(ath.id); }catch(e){return false;}
      });

      // HEADER
      doc.setFillColor(5,10,15); doc.rect(0,0,210,297,'F');
      doc.setFillColor(0,201,232); doc.rect(0,0,210,22,'F');
      doc.setTextColor(5,10,15); doc.setFontSize(13); doc.setFont('helvetica','bold');
      doc.text('TSS — The Surf Sequence',M,10);
      doc.setFontSize(9); doc.setFont('helvetica','normal');
      doc.text('El Salvador National Surf Team',M,16);
      doc.setTextColor(5,10,15); doc.setFontSize(10); doc.setFont('helvetica','bold');
      doc.text('REPORTE MENSUAL',210-M,10,{align:'right'});
      doc.text(monthName.toUpperCase(),210-M,16,{align:'right'});
      y=30;

      // ATHLETE NAME
      doc.setTextColor(232,240,245); doc.setFontSize(14); doc.setFont('helvetica','bold');
      doc.text(ath.name,M,y); y+=3;
      doc.setDrawColor(0,201,232); doc.line(M,y,210-M,y); y+=6;

      // SUMMARY STATS
      const totalSurf = checkins.reduce((s,ci)=>s+(parseFloat(ci.surf_hours)||0),0);
      const avgEnergy = checkins.length ? (checkins.reduce((s,ci)=>s+(ci.energy_level||0),0)/checkins.length).toFixed(1) : '—';
      const avgFocus = checkins.length ? (checkins.reduce((s,ci)=>s+(ci.focus_level||0),0)/checkins.length).toFixed(1) : '—';
      const goalsAchieved = checkins.filter(ci=>ci.goal_achieved==='Si').length;
      const checkinsTotal = checkins.filter(ci=>ci.water_glasses||ci.energy_level).length;
      const avgPct = checkins.length ? Math.round(checkins.reduce((s,ci)=>s+(ci.progress_pct||0),0)/checkins.length) : 0;

      // Last eval for index
      const lastEval = evals.length ? evals[evals.length-1] : null;
      const idx4 = lastEval ? (((lastEval.physical||0)+(lastEval.technique||0)+(lastEval.mindset||0)+(lastEval.competitive||0))/4).toFixed(1) : '—';

      // Stats boxes
      const stats = [
        {l:'Horas Surf',v:totalSurf.toFixed(1)+'h'},
        {l:'Check-ins',v:checkinsTotal+'/'+checkins.length},
        {l:'Energía Prom',v:avgEnergy+'/10'},
        {l:'Enfoque Prom',v:avgFocus+'/10'},
        {l:'Objetivos',v:goalsAchieved},
        {l:'% Plan Prom',v:avgPct+'%'},
        {l:'Sesiones',v:sessions.length},
        {l:'Índice Final',v:idx4+'/10'},
      ];
      const bw=(pw)/4; const bh=16;
      stats.forEach((s,i)=>{
        const col=i%4; const row=Math.floor(i/4);
        const bx=M+col*bw; const by=y+row*(bh+3);
        doc.setFillColor(12,20,32); doc.roundedRect(bx,by,bw-2,bh,2,2,'F');
        doc.setDrawColor(0,201,232); doc.setLineWidth(0.3); doc.roundedRect(bx,by,bw-2,bh,2,2,'S');
        doc.setTextColor(0,201,232); doc.setFontSize(10); doc.setFont('helvetica','bold');
        doc.text(s.v,bx+(bw-2)/2,by+6,{align:'center'});
        doc.setTextColor(100,140,160); doc.setFontSize(6); doc.setFont('helvetica','normal');
        doc.text(s.l,bx+(bw-2)/2,by+11,{align:'center'});
      });
      y+=38;

      // EVALUACIONES DEL COACH
      if(evals.length){
        if(y>250){doc.addPage();y=20;}
        doc.setTextColor(0,201,232); doc.setFontSize(10); doc.setFont('helvetica','bold');
        doc.text('EVALUACIONES DEL COACH',M,y); y+=2;
        doc.setDrawColor(0,201,232); doc.line(M,y,210-M,y); y+=5;
        evals.forEach(ev=>{
          if(y>270){doc.addPage();y=20;}
          const evIdx=(((ev.physical||0)+(ev.technique||0)+(ev.mindset||0)+(ev.competitive||0))/4).toFixed(1);
          doc.setFillColor(12,20,28); doc.roundedRect(M,y,pw,18,2,2,'F');
          doc.setFontSize(8); doc.setFont('helvetica','bold'); doc.setTextColor(232,240,245);
          doc.text(ev.date,M+3,y+5);
          doc.setTextColor(0,201,232); doc.setFontSize(10);
          doc.text('Índice: '+evIdx+'/10',M+pw-3,y+5,{align:'right'});
          doc.setFontSize(7); doc.setFont('helvetica','normal'); doc.setTextColor(180,200,210);
          const breakdown=`Físico: ${ev.physical||0}  Técnica: ${ev.technique||0}  Mental: ${ev.mindset||0}  Competitivo: ${ev.competitive||0}`;
          doc.text(breakdown,M+3,y+10);
          if(ev.strengths){ doc.setTextColor(100,200,140); doc.text('+ '+ev.strengths.substring(0,80),M+3,y+15); }
          y+=22;
        });
        y+=4;
      }

      // SESIONES PRESENCIALES
      if(sessions.length){
        if(y>250){doc.addPage();y=20;}
        doc.setTextColor(0,201,232); doc.setFontSize(10); doc.setFont('helvetica','bold');
        doc.text('SESIONES PRESENCIALES',M,y); y+=2;
        doc.setDrawColor(0,201,232); doc.line(M,y,210-M,y); y+=5;
        sessions.forEach(s=>{
          if(y>275){doc.addPage();y=20;}
          doc.setFillColor(12,20,28); doc.roundedRect(M,y,pw,10,2,2,'F');
          doc.setFontSize(8); doc.setFont('helvetica','normal'); doc.setTextColor(232,240,245);
          const sLine=`${s.date}  ${s.time_start||''}  ${s.title||''}`;
          doc.text(sLine,M+3,y+6);
          const statusColor = s.status==='done'?[34,197,94]:[245,158,11];
          doc.setTextColor(...statusColor);
          doc.text(s.status==='done'?'✓ Completada':'Programada',M+pw-3,y+6,{align:'right'});
          y+=13;
        });
        y+=4;
      }

      // PROGRESO SEMANAL (mini chart - text based)
      if(checkins.length){
        if(y>240){doc.addPage();y=20;}
        doc.setTextColor(0,201,232); doc.setFontSize(10); doc.setFont('helvetica','bold');
        doc.text('REGISTRO DIARIO',M,y); y+=2;
        doc.setDrawColor(0,201,232); doc.line(M,y,210-M,y); y+=5;
        // Header row
        doc.setFillColor(5,15,25); doc.rect(M,y,pw,7,'F');
        doc.setFontSize(6); doc.setFont('helvetica','bold'); doc.setTextColor(0,201,232);
        const cols2=[{t:'Fecha',x:M+3},{t:'Agua',x:M+38},{t:'Energía',x:M+58},{t:'Enfoque',x:M+78},{t:'Surf h',x:M+98},{t:'Objetivo',x:M+118},{t:'% Plan',x:M+140}];
        cols2.forEach(col=>doc.text(col.t,col.x,y+4.5));
        y+=8;
        checkins.forEach(ci=>{
          if(y>278){doc.addPage();y=20;}
          const rowBg = checkins.indexOf(ci)%2===0?[8,16,26]:[12,22,34];
          doc.setFillColor(...rowBg); doc.rect(M,y,pw,7,'F');
          doc.setFontSize(6.5); doc.setFont('helvetica','normal'); doc.setTextColor(200,220,230);
          doc.text(ci.date||'',M+3,y+4.5);
          doc.text((ci.water_glasses||0)+' vasos',M+38,y+4.5);
          doc.text((ci.energy_level||0)+'/10',M+58,y+4.5);
          doc.text((ci.focus_level||0)+'/10',M+78,y+4.5);
          doc.text((parseFloat(ci.surf_hours)||0)+'h',M+98,y+4.5);
          const goalColor=ci.goal_achieved==='Si'?[34,197,94]:ci.goal_achieved==='Parcial'?[245,158,11]:[180,180,180];
          doc.setTextColor(...goalColor);
          doc.text(ci.goal_achieved||'—',M+118,y+4.5);
          doc.setTextColor(200,220,230);
          doc.text((ci.progress_pct||0)+'%',M+140,y+4.5);
          y+=8;
        });
      }
    }

    // TEAM SUMMARY PAGE (only for team report)
    if(isTeam && athletes.length>1){
      doc.addPage();
      let y=M;
      doc.setFillColor(5,10,15); doc.rect(0,0,210,297,'F');
      doc.setFillColor(0,201,232); doc.rect(0,0,210,22,'F');
      doc.setTextColor(5,10,15); doc.setFontSize(13); doc.setFont('helvetica','bold');
      doc.text('TSS — RESUMEN DEL EQUIPO',M,10);
      doc.setFontSize(9); doc.setFont('helvetica','normal');
      doc.text(monthName.toUpperCase(),M,16);
      y=30;

      doc.setTextColor(0,201,232); doc.setFontSize(10); doc.setFont('helvetica','bold');
      doc.text('COMPARATIVA DE ATLETAS',M,y); y+=2;
      doc.setDrawColor(0,201,232); doc.line(M,y,210-M,y); y+=5;

      // Header
      doc.setFillColor(5,15,25); doc.rect(M,y,pw,8,'F');
      doc.setFontSize(7); doc.setFont('helvetica','bold'); doc.setTextColor(0,201,232);
      const teamCols=[{t:'Atleta',x:M+3},{t:'Surf h',x:M+65},{t:'Energía',x:M+85},{t:'Enfoque',x:M+105},{t:'Sesiones',x:M+125},{t:'% Plan',x:M+145},{t:'Índice',x:M+165}];
      teamCols.forEach(col=>doc.text(col.t,col.x,y+5));
      y+=10;

      for(const ath of athletes){
        if(y>270){doc.addPage();y=20;}
        const [ciR,evR,seR]=await Promise.all([
          db.from('tss_daily_checkins').select('surf_hours,energy_level,focus_level,progress_pct,goal_achieved').eq('athlete_id',ath.id).gte('date',mon).lte('date',sun),
          db.from('tss_evaluations').select('physical,technique,mindset,competitive').eq('athlete_id',ath.id).gte('date',mon).lte('date',sun).order('date'),
          db.from('tss_presencial_sessions').select('athlete_ids,status').gte('date',mon).lte('date',sun),
        ]);
        const cis=ciR.data||[]; const evs=evR.data||[];
        const sesh=(seR.data||[]).filter(s=>{try{const ids=Array.isArray(s.athlete_ids)?s.athlete_ids:JSON.parse(s.athlete_ids||'[]');return ids.includes(ath.id);}catch(e){return false;}});
        const tSurf=cis.reduce((s,ci)=>s+(parseFloat(ci.surf_hours)||0),0).toFixed(1);
        const aEn=cis.length?(cis.reduce((s,ci)=>s+(ci.energy_level||0),0)/cis.length).toFixed(1):'—';
        const aFo=cis.length?(cis.reduce((s,ci)=>s+(ci.focus_level||0),0)/cis.length).toFixed(1):'—';
        const aPct=cis.length?Math.round(cis.reduce((s,ci)=>s+(ci.progress_pct||0),0)/cis.length)+'%':'—';
        const lastEv=evs.length?evs[evs.length-1]:null;
        const evIdx=lastEv?(((lastEv.physical||0)+(lastEv.technique||0)+(lastEv.mindset||0)+(lastEv.competitive||0))/4).toFixed(1):'—';

        const rowBg=athletes.indexOf(ath)%2===0?[8,16,26]:[12,22,34];
        doc.setFillColor(...rowBg); doc.rect(M,y,pw,9,'F');
        doc.setFontSize(7.5); doc.setFont('helvetica','bold'); doc.setTextColor(232,240,245);
        doc.text(ath.name.substring(0,22),M+3,y+6);
        doc.setFont('helvetica','normal'); doc.setTextColor(200,220,230);
        doc.text(tSurf+'h',M+65,y+6);
        doc.text(aEn+'/10',M+85,y+6);
        doc.text(aFo+'/10',M+105,y+6);
        doc.text(String(sesh.length),M+125,y+6);
        doc.text(aPct,M+145,y+6);
        doc.setTextColor(0,201,232);
        doc.text(evIdx,M+165,y+6);
        y+=10;
      }
    }

    const fileName = isTeam
      ? `TSS_Reporte_Equipo_${monthName.replace(' ','_')}.pdf`
      : `TSS_${athletes[0].name.replace(' ','_')}_${monthName.replace(' ','_')}.pdf`;
    doc.save(fileName);
    if(!isTeam) closeModal('monthlyAthModal');
    toast('✅ Reporte generado','success');
  } catch(e){ toast('Error al generar reporte: '+e.message,'error'); console.error(e); }
  finally{ showLoad(false); }
}



async function genAnalyticsPDF(athleteId, athleteName){
  toast('Generando reporte...','info');
  try {
    const today = todayStr();
    const d30ago = new Date(); d30ago.setDate(d30ago.getDate()-29);
    const from30 = d30ago.toISOString().split('T')[0];

    // Fetch all data
    const [{data:checkins},{data:evals},{data:compEvals},{data:sessions},{data:profile}] = await Promise.all([
      db.from('tss_daily_checkins').select('*').eq('athlete_id',athleteId).gte('date',from30).order('date',{ascending:true}),
      db.from('tss_evaluations').select('*').eq('athlete_id',athleteId).order('date',{ascending:false}).limit(20),
      db.from('tss_comp_evaluations').select('*').eq('athlete_id',athleteId).order('date',{ascending:false}),
      db.from('tss_presencial_sessions').select('id,date,title,athlete_ids').gte('date',from30).order('date',{ascending:false}),
      db.from('tss_profiles').select('*').eq('id',athleteId).maybeSingle(),
    ]);

    const cis = checkins||[];
    const evs = evals||[];
    const comps = compEvals||[];
    const ath = profile||{};

    // Attendance
    const attended = (sessions||[]).filter(s=>{
      try{ const ids=Array.isArray(s.athlete_ids)?s.athlete_ids:JSON.parse(s.athlete_ids||'[]'); return ids.includes(athleteId); }catch(e){ return false; }
    });

    // Stats
    const avgC = cis.length ? Math.round(cis.reduce((s,ci)=>s+(ci.progress_pct||0),0)/cis.length) : 0;
    const totalH = cis.reduce((s,ci)=>s+(ci.surf_hours||0),0);
    const avgEnergy = cis.filter(ci=>ci.energy_level>0).length ? (cis.filter(ci=>ci.energy_level>0).reduce((s,ci)=>s+(ci.energy_level||0),0)/cis.filter(ci=>ci.energy_level>0).length).toFixed(1) : '—';
    const avgWater = cis.filter(ci=>ci.water_glasses>0).length ? (cis.filter(ci=>ci.water_glasses>0).reduce((s,ci)=>s+(ci.water_glasses||0),0)/cis.filter(ci=>ci.water_glasses>0).length).toFixed(1) : '—';
    const avgFocus = cis.filter(ci=>ci.focus_level>0).length ? (cis.filter(ci=>ci.focus_level>0).reduce((s,ci)=>s+(ci.focus_level||0),0)/cis.filter(ci=>ci.focus_level>0).length).toFixed(1) : '—';
    const checkinDays = cis.filter(ci=>ci.water_glasses||ci.energy_level||ci.notes).length;

    // Eval stats
    const lastEval = evs[0]||null;
    const prevEval = evs[1]||null;
    const currentIdx = lastEval ? (((lastEval.physical||0)+(lastEval.technique||0)+(lastEval.mindset||0)+(lastEval.competitive||0))/4).toFixed(1) : '—';
    const prevIdx = prevEval ? (((prevEval.physical||0)+(prevEval.technique||0)+(prevEval.mindset||0)+(prevEval.competitive||0))/4).toFixed(1) : null;
    const trend = (currentIdx!=='—'&&prevIdx) ? (parseFloat(currentIdx)>parseFloat(prevIdx)?'↑ Subiendo':parseFloat(currentIdx)<parseFloat(prevIdx)?'↓ Bajando':'= Estable') : '';

    // Weekly surf hours (4 weeks)
    const weeks = [];
    for(let w=3;w>=0;w--){
      const wStart = new Date(); wStart.setDate(wStart.getDate() - wStart.getDay() - w*7);
      const wEnd = new Date(wStart); wEnd.setDate(wEnd.getDate()+6);
      const ws = wStart.toISOString().split('T')[0];
      const we = wEnd.toISOString().split('T')[0];
      const wCis = cis.filter(ci=>ci.date>=ws&&ci.date<=we);
      weeks.push({
        label: `S${4-w}`,
        hours: wCis.reduce((s,ci)=>s+(ci.surf_hours||0),0).toFixed(1),
        compliance: wCis.length ? Math.round(wCis.reduce((s,ci)=>s+(ci.progress_pct||0),0)/wCis.length) : 0,
        checkins: wCis.filter(ci=>ci.water_glasses||ci.energy_level).length
      });
    }

    // Bio
    const birthDate = ath.birth_date ? new Date(ath.birth_date+'T00:00:00') : null;
    const age = birthDate ? Math.floor((new Date()-birthDate)/(1000*60*60*24*365.25)) : null;
    const imc = (ath.weight_kg&&ath.height_cm) ? (ath.weight_kg/((ath.height_cm/100)**2)).toFixed(1) : null;
    const imcLabel = imc ? (imc<18.5?'Bajo peso':imc<25?'Normal':imc<30?'Sobrepeso':'Obesidad') : null;

    // ── PDF SETUP ───────────────────────────────────────────
    const {jsPDF} = window.jspdf;
    const doc = new jsPDF({orientation:'portrait',unit:'mm',format:'a4'});
    const W=210, M=14, CW=W-M*2;
    let y=0;

    const cyan=[0,201,232], white=[232,240,245], grey=[100,120,135], dark=[8,15,25], bg2=[18,25,38], bg3=[25,35,52];
    const green=[34,197,94], amber=[245,158,11], red=[239,68,68], purple=[168,85,247];

    const setC = (rgb) => doc.setTextColor(...rgb);
    const setF = (rgb) => doc.setFillColor(...rgb);
    const setD = (rgb) => doc.setDrawColor(...rgb);
    const box = (x,iy,w,h,rgb,r=3) => { setF(rgb); doc.roundedRect(x,iy,w,h,r,r,'F'); };
    const line = (x1,y1,x2,y2,rgb,lw=0.3) => { setD(rgb); doc.setLineWidth(lw); doc.line(x1,y1,x2,y2); };
    const txt = (text,x,iy,size,rgb,style='normal') => { setC(rgb); doc.setFontSize(size); doc.setFont('helvetica',style); doc.text(String(text),x,iy); };

    // ══ PAGE 1 ══════════════════════════════════════════════

    // Header bar
    setF(dark); doc.rect(0,0,W,22,'F');
    setF(cyan); doc.rect(0,22,W,2,'F');
    txt('TSS EL SALVADOR',M,10,8,grey,'normal');
    txt('REPORTE INDIVIDUAL DE ATLETA',M,16,11,white,'bold');
    doc.setTextColor(...grey); doc.setFontSize(8); doc.setFont('helvetica','normal'); doc.text(today,W-M,16,{align:'right'});
    y=32;

    // Athlete name + bio row
    txt(athleteName,M,y,18,cyan,'bold'); y+=8;
    const bioItems = [];
    if(age) bioItems.push(`${age} años`);
    if(ath.height_cm) bioItems.push(`${ath.height_cm}cm`);
    if(ath.weight_kg) bioItems.push(`${ath.weight_kg}kg`);
    if(imc) bioItems.push(`IMC ${imc} - ${imcLabel}`);
    if(ath.stance) bioItems.push(`Surf: ${ath.stance}`);
    if(ath.score_capacity) bioItems.push(`Score Cap: ${ath.score_capacity}/10`);
    txt(bioItems.join('   '),M,y,8,grey);
    txt(`Período: ${from30} → ${today}`,M,y+6,8,grey);
    y+=18;

    // Injury alert
    if(ath.injury){
      box(M,y,CW,10,[60,15,15],2);
      setD(red); doc.setLineWidth(0.4); doc.roundedRect(M,y,CW,10,2,2,'S');
      txt(`LESION ACTIVA: ${ath.injury}${ath.injury_since?' — desde '+ath.injury_since:''}`,M+3,y+6.5,8,red,'bold');
      y+=14;
    }

    // ── KPI CARDS ──
    const kpis = [
      {label:'CUMPLIMIENTO PROM.',val:avgC+'%',color:avgC>=80?green:avgC>=50?amber:red},
      {label:'ÍNDICE ACTUAL',val:currentIdx+(trend?' '+trend:''),color:purple},
      {label:'HORAS SURF 30D',val:totalH.toFixed(1)+'h',color:cyan},
      {label:'ASISTENCIA',val:attended.length+' sesiones',color:green},
      {label:'CHECK-INS',val:checkinDays+'/'+cis.length+' días',color:amber},
      {label:'ENERGÍA PROM.',val:avgEnergy+'/5',color:amber},
    ];
    const kw=(CW-10)/3, kh=16;
    kpis.forEach((k,i)=>{
      const kx=M+(i%3)*(kw+5);
      const ky=y+Math.floor(i/3)*(kh+4);
      box(kx,ky,kw,kh,bg3,2);
      txt(k.val,kx+kw/2,ky+7,12,k.color,'bold');
      doc.setFontSize(7); doc.setTextColor(...grey); doc.setFont('helvetica','normal');
      doc.text(k.label,kx+kw/2,ky+13,{align:'center'});
    });
    y+=42;

    // ── WEEKLY BREAKDOWN ──
    line(M,y,W-M,y,grey,0.2); y+=5;
    txt('DESGLOSE SEMANAL (ÚLTIMAS 4 SEMANAS)',M,y,8,cyan,'bold'); y+=6;
    const wcols=[M,M+35,M+70,M+105,M+140];
    txt('SEMANA',wcols[0],y,7,grey,'bold');
    txt('HORAS SURF',wcols[1],y,7,grey,'bold');
    txt('CUMPLIMIENTO',wcols[2],y,7,grey,'bold');
    txt('CHECK-INS',wcols[3],y,7,grey,'bold');
    y+=4; line(M,y,W-M,y,grey,0.2); y+=4;
    weeks.forEach(w=>{
      const cColor=w.compliance>=80?green:w.compliance>=50?amber:red;
      txt(w.label,wcols[0],y,8,white); txt(w.hours+'h',wcols[1],y,8,cyan); txt(w.compliance+'%',wcols[2],y,8,cColor,'bold'); txt(String(w.checkins),wcols[3],y,8,white);
      y+=6;
    });
    y+=4;

    // ── EVALUACIÓN DEL COACH ──
    if(evs.length){
      line(M,y,W-M,y,grey,0.2); y+=5;
      txt('EVALUACIÓN DEL COACH',M,y,8,cyan,'bold'); y+=6;

      // Dimension bars
      const dims=[
        {key:'physical',label:'Fisico',color:cyan},
        {key:'technique',label:'Tecnica',color:purple},
        {key:'mindset',label:'Mental',color:green},
        {key:'competitive',label:'Competitivo',color:amber},
      ];
      const barW=CW/2-10;
      dims.forEach((d,i)=>{
        const dx=M+(i%2)*(barW+20);
        const dy=y+Math.floor(i/2)*14;
        const cur=lastEval?lastEval[d.key]||0:0;
        const prev=prevEval?prevEval[d.key]||0:0;
        const diff=cur-prev;
        const diffTxt=diff>0?'↑'+diff:diff<0?'↓'+Math.abs(diff):'=';
        const diffColor=diff>0?green:diff<0?red:grey;
        txt(d.label,dx,dy+4,8,white); txt(cur+'/10',dx+barW-8,dy+4,8,d.color,'bold');
        txt(diffTxt,dx+barW-18,dy+4,7,diffColor);
        box(dx,dy+6,barW,4,bg3,1);
        box(dx,dy+6,barW*cur/10,4,d.color,1);
      });
      y+=dims.length/2*14+2;

      // Last eval text fields
      if(lastEval){
        const textFields=[
          {key:'strengths',label:'✅ Fortalezas'},
          {key:'limitations',label:'⚠️ Limitaciones'},
          {key:'recommendations',label:'📋 Recomendaciones'},
        ];
        textFields.forEach(tf=>{
          if(lastEval[tf.key]){
            if(y>260){doc.addPage();y=M;}
            txt(tf.label+':',M,y,7,grey,'bold');
            const lines=doc.splitTextToSize(lastEval[tf.key],CW-5);
            txt(lines.join(' '),M+25,y,7,white);
            y+=lines.length*4+2;
          }
        });
        txt('Última evaluación: '+lastEval.date+(lastEval.date&&prevEval?' | Anterior: '+prevEval.date:''),M,y,7,grey);
        y+=6;
      }
    }

    // ── WELLNESS ──
    if(cis.length){
      if(y>240){doc.addPage();y=M;}
      line(M,y,W-M,y,grey,0.2); y+=5;
      txt('WELLNESS — PROMEDIOS 30 DÍAS',M,y,8,cyan,'bold'); y+=6;
      const wItems=[
        {label:'Agua',val:avgWater,unit:'vasos',color:cyan},
        {label:'Energia',val:avgEnergy,unit:'/5',color:amber},
        {label:'Enfoque',val:avgFocus,unit:'/5',color:purple},
      ];
      const ww=(CW-10)/3;
      wItems.forEach((wi,i)=>{
        const wx=M+i*(ww+5);
        box(wx,y,ww,14,bg3,2);
        txt(wi.val,wx+ww/2,y+7,12,wi.color,'bold');
        doc.setFontSize(7); doc.setTextColor(...grey); doc.text(wi.label+' '+wi.unit,wx+ww/2,y+12,{align:'center'});
      });
      y+=20;
    }

    // ── REGISTRO DIARIO ──
    if(y>230){doc.addPage();y=M;}
    line(M,y,W-M,y,grey,0.2); y+=5;
    txt('REGISTRO DIARIO',M,y,8,cyan,'bold'); y+=6;
    const cols=[M,M+28,M+50,M+68,M+86,M+106,M+124,M+142];
    const headers=['FECHA','CUMPL.','AGUA','ENERGÍA','ENFOQUE','HORAS','OBJETIVO','NOTAS'];
    headers.forEach((h,i)=>{ txt(h,cols[i],y,6,grey,'bold'); });
    y+=3; line(M,y,W-M,y,grey,0.2); y+=4;

    cis.slice().reverse().forEach(ci=>{
      if(y>275){doc.addPage();y=M;}
      const pct=ci.progress_pct||0;
      const pc=pct>=80?green:pct>=50?amber:red;
      txt(ci.date,cols[0],y,7,white);
      txt(pct+'%',cols[1],y,7,pc,'bold');
      txt(String(ci.water_glasses||0),cols[2],y,7,ci.water_glasses>=6?green:ci.water_glasses>=4?white:grey);
      txt(String(ci.energy_level||0),cols[3],y,7,ci.energy_level>=4?green:ci.energy_level>=3?white:grey);
      txt(String(ci.focus_level||0),cols[4],y,7,white);
      txt((ci.surf_hours||0)+'h',cols[5],y,7,cyan);
      if(ci.goal_achieved) txt(ci.goal_achieved==='Si'?'✓':'✗',cols[6],y,7,ci.goal_achieved==='Si'?green:red);
      if(ci.notes){ const n=ci.notes.substring(0,28); txt(n,cols[7],y,6,grey); }
      y+=5;
    });

    // ── COMPETENCIAS ──
    if(comps.length){
      if(y>230){doc.addPage();y=M;}
      y+=4; line(M,y,W-M,y,grey,0.2); y+=5;
      txt('HISTORIAL DE COMPETENCIAS',M,y,8,cyan,'bold'); y+=6;
      const ccols=[M,M+28,M+85,M+115,M+140,M+165];
      ['FECHA','COMPETENCIA','CATEGORÍA','RONDA','PROM. OLA','MEJOR OLA'].forEach((h,i)=>txt(h,ccols[i],y,6,grey,'bold'));
      y+=3; line(M,y,W-M,y,grey,0.2); y+=4;
      comps.forEach(co=>{
        if(y>275){doc.addPage();y=M;}
        txt(co.date||'',ccols[0],y,7,white);
        const evName=(co.event_name||co.competition_name||'').substring(0,22);
        txt(evName,ccols[1],y,7,white);
        txt(co.athlete_category||'',ccols[2],y,7,grey);
        txt(co.round_reached||'',ccols[3],y,7,white);
        txt(co.avg_wave_score?parseFloat(co.avg_wave_score).toFixed(2):'—',ccols[4],y,7,cyan,'bold');
        txt(co.highest_wave?parseFloat(co.highest_wave).toFixed(1):'—',ccols[5],y,7,amber,'bold');
        y+=5;
      });
    }

    // Footer on all pages
    const pageCount = doc.getNumberOfPages();
    for(let p=1;p<=pageCount;p++){
      doc.setPage(p);
      setF(dark); doc.rect(0,287,W,10,'F');
      txt('TSS El Salvador  ·  Sistema de Entrenamiento Técnico de Surf  ·  Generado '+today,W/2,293,6,grey,'normal');
      doc.setTextColor(...grey); doc.setFontSize(6); doc.text('Pág. '+p+' / '+pageCount,W-M,293,{align:'right'});
    }

    doc.save('TSS_'+athleteName.replace(/ /g,'_')+'_'+today+'.pdf');
    toast('✅ Reporte descargado','success');
  } catch(e){ toast('Error generando reporte','error'); console.error(e); }
}



async function genWeeklyPDF(athleteId, athleteName, mon, sun){
  try {
  showLoad(true);
  // Load all data for the week
  const [ciRes, plansRes, sessRes, evalRes, membRes] = await Promise.all([
    db.from('tss_daily_checkins').select('*').eq('athlete_id',athleteId).gte('date',mon).lte('date',sun).order('date'),

    db.from('tss_evaluations').select('*').eq('athlete_id',athleteId).gte('date',mon).lte('date',sun).order('date'),
    db.from('tss_group_members').select('group_id').eq('athlete_id',athleteId),
  ]);
  const checkins = ciRes.data||[];
  const myGroups = (membRes.data||[]).map(m=>m.group_id);
  const plans = (plansRes.data||[]).filter(p=>
    p.scope==='general'||
    (p.scope==='individual'&&p.target_id===athleteId)||
    (p.scope==='group'&&myGroups.includes(p.target_id))
  );
  const sessions = sessRes.data||[];
  const evals = evalRes.data||[];

  const {jsPDF}=window.jspdf;
  const doc=new jsPDF({unit:'mm',format:'a4'});
  const M=15; let y=M; const pw=210-M*2;

  // Header bar
  doc.setFillColor(5,10,15); doc.rect(0,0,210,297,'F');
  doc.setFillColor(0,201,232); doc.rect(0,0,210,20,'F');
  doc.setTextColor(5,10,15);
  doc.setFontSize(14); doc.setFont('helvetica','bold');
  doc.text('TSS — The Surf Sequence',M,13);
  doc.setFontSize(9); doc.setFont('helvetica','normal');
  doc.text('Reporte Semanal · '+athleteName,M,19);
  doc.setTextColor(5,10,15);
  doc.text(mon+' al '+sun,210-M,13,{align:'right'});
  y=30;

  // Summary stats
  const totalSurf = checkins.reduce((s,ci)=>s+(ci.surf_hours||0),0);
  const avgEnergy = checkins.length?(checkins.reduce((s,ci)=>s+(ci.energy_level||0),0)/checkins.length).toFixed(1):0;
  const avgFocus = checkins.length?(checkins.reduce((s,ci)=>s+(ci.focus_level||0),0)/checkins.length).toFixed(1):0;
  const goals = checkins.filter(ci=>ci.goal_achieved==='Si').length;
  const avgPlan = checkins.length?Math.round(checkins.reduce((s,ci)=>s+(ci.progress_pct||0),0)/checkins.length):0;

  doc.setTextColor(0,201,232);
  doc.setFontSize(10); doc.setFont('helvetica','bold');
  doc.text('RESUMEN DE LA SEMANA',M,y); y+=2;
  doc.setDrawColor(0,201,232); doc.setLineWidth(0.3); doc.line(M,y,210-M,y); y+=6;

  doc.setFontSize(9); doc.setFont('helvetica','normal'); doc.setTextColor(232,240,245);
  const statW=pw/4;
  const avgIdx = evals.length?(evals.reduce((s,e)=>s+((e.physical+e.technique+e.mindset+e.competitive)/4),0)/evals.length).toFixed(1):null;
  const stats=[
    ['🏄 '+totalSurf.toFixed(1)+'h','Horas Surf'],
    ['⚡ '+avgEnergy+'/5','Energía'],
    ['🎯 '+avgFocus+'/5','Enfoque'],
    ['✅ '+goals+'/'+checkins.length,'Objetivos'],
  ];
  stats.forEach((st,i)=>{
    const x=M+i*statW;
    doc.setFillColor(15,24,32); doc.roundedRect(x,y,statW-3,14,2,2,'F');
    doc.setFontSize(11); doc.setFont('helvetica','bold'); doc.setTextColor(0,201,232);
    doc.text(st[0],x+(statW-3)/2,y+7,{align:'center'});
    doc.setFontSize(7); doc.setFont('helvetica','normal'); doc.setTextColor(107,138,154);
    doc.text(st[1],x+(statW-3)/2,y+12,{align:'center'});
  });
  y+=20;
  if(avgIdx){
    doc.setFillColor(0,60,75); doc.roundedRect(M,y,pw,10,2,2,'F');
    doc.setFontSize(9); doc.setFont('helvetica','bold'); doc.setTextColor(0,201,232);
    doc.text('ÍNDICE DE RENDIMIENTO SEMANAL: '+avgIdx+'/10',M+pw/2,y+6,{align:'center'});
    y+=14;
  }

  // Daily checkins
  if(checkins.length){
    doc.setTextColor(0,201,232); doc.setFontSize(10); doc.setFont('helvetica','bold');
    doc.text('CHECK-INS DIARIOS',M,y); y+=2;
    doc.setDrawColor(0,201,232); doc.line(M,y,210-M,y); y+=5;
    checkins.forEach(ci=>{
      if(y>270){doc.addPage();y=20;}
      doc.setFillColor(12,20,28); doc.roundedRect(M,y,pw,10,2,2,'F');
      doc.setFontSize(8); doc.setFont('helvetica','bold'); doc.setTextColor(232,240,245);
      doc.text(ci.date,M+3,y+6);
      doc.setFont('helvetica','normal'); doc.setTextColor(107,138,154);
      let sesResLine='';
      if(ci.sesion_result){try{const sr=JSON.parse(ci.sesion_result);const vals=Object.values(sr);if(vals.length){sesResLine='  🌊'+(vals.includes('Si')?'✅':vals.includes('Parcial')?'⚡':'❌');}}catch(e){}}
      const line='💧'+ci.water_glasses+'v  ⚡'+ci.energy_level+'/5  🎯'+(ci.focus_level||'—')+'/5  🥗'+(ci.nutrition||'—')+'  ✅'+(ci.goal_achieved||'—')+(ci.surf_hours?'  🏄'+ci.surf_hours+'h':'')+sesResLine+(ci.progress_pct?'  📋'+ci.progress_pct+'%':'');
      doc.text(line,M+28,y+6);
      y+=12;
      if(ci.notes){ doc.setTextColor(107,138,154); doc.setFontSize(7); const lines=doc.splitTextToSize('Nota: '+ci.notes,pw-30); doc.text(lines,M+3,y); y+=lines.length*4; }
    });
    y+=4;
  }

  // Sessions
  if(sessions.length){
    if(y>250){doc.addPage();y=20;}
    doc.setTextColor(0,201,232); doc.setFontSize(10); doc.setFont('helvetica','bold');
    doc.text('SESIONES PRESENCIALES',M,y); y+=2;
    doc.setDrawColor(0,201,232); doc.line(M,y,210-M,y); y+=5;
    sessions.forEach(s=>{
      if(y>270){doc.addPage();y=20;}
      doc.setFillColor(12,20,28); doc.roundedRect(M,y,pw,8,2,2,'F');
      doc.setFontSize(8); doc.setFont('helvetica','bold'); doc.setTextColor(232,240,245);
      doc.text(s.date+(s.time_start?' '+s.time_start:''),M+3,y+5);
      doc.setFont('helvetica','normal'); doc.setTextColor(0,201,232);
      doc.text(s.title||(s.pilar||'Sesión'),M+30,y+5);
      doc.setTextColor(107,138,154);
      doc.text(s.status==='done'?'✅ Completada':s.status==='live'?'En curso':'Planificada',M+130,y+5);
      y+=10;
    });
    y+=4;
  }

  // Evaluaciones del coach
  if(evals.length){
    if(y>250){doc.addPage();y=20;}
    doc.setTextColor(0,201,232); doc.setFontSize(10); doc.setFont('helvetica','bold');
    doc.text('EVALUACIONES DEL COACH',M,y); y+=2;
    doc.setDrawColor(0,201,232); doc.line(M,y,210-M,y); y+=5;
    evals.forEach(ev=>{
      if(y>270){doc.addPage();y=20;}
      const idx4=((ev.physical+ev.technique+ev.mindset+ev.competitive)/4).toFixed(1);
      doc.setFillColor(12,20,28); doc.roundedRect(M,y,pw,14,2,2,'F');
      doc.setFontSize(8); doc.setFont('helvetica','bold'); doc.setTextColor(232,240,245);
      doc.text(ev.date,M+3,y+5);
      doc.setTextColor(0,201,232); doc.setFontSize(10);
      doc.text('Índice: '+idx4+'/10',M+pw-3,y+5,{align:'right'});
      doc.setFontSize(7); doc.setFont('helvetica','normal'); doc.setTextColor(107,138,154);
      doc.text('Físico: '+ev.physical+'  Técnica: '+ev.technique+'  Mental: '+ev.mindset+'  Competitivo: '+ev.competitive,M+3,y+11);
      if(ev.notes){ const ns=doc.splitTextToSize('Obs: '+ev.notes, pw-6); doc.text(ns,M+3,y+14); y+=ns.length*3.5; }
      y+=16;
    });
    y+=4;
  }

  // Plan blocks
  if(plans.length){
    if(y>250){doc.addPage();y=20;}
    doc.setTextColor(0,201,232); doc.setFontSize(10); doc.setFont('helvetica','bold');
    doc.text('PLAN DE ENTRENAMIENTO',M,y); y+=2;
    doc.setDrawColor(0,201,232); doc.line(M,y,210-M,y); y+=5;
    plans.forEach(p=>{
      if(y>270){doc.addPage();y=20;}
      doc.setFillColor(12,20,28); doc.roundedRect(M,y,pw,8,2,2,'F');
      doc.setFontSize(8); doc.setFont('helvetica','bold'); doc.setTextColor(232,240,245);
      doc.text(p.date,M+3,y+5);
      doc.setFont('helvetica','normal'); doc.setTextColor(107,138,154);
      doc.text((p.work_type||'Bloque')+(p.objective?' — '+p.objective:''),M+25,y+5);
      y+=10;
    });
  }

  // Footer
  const pages=doc.getNumberOfPages();
  for(let i=1;i<=pages;i++){
    doc.setPage(i);
    doc.setFontSize(7); doc.setTextColor(107,138,154);
    doc.text('TSS El Salvador · Reporte generado '+new Date().toLocaleDateString('es-SV'),M,292);
    doc.text('Pág '+i+'/'+pages,210-M,292,{align:'right'});
  }

  doc.save('TSS_'+athleteName.replace(/\s+/g,'_')+'_semana_'+mon+'.pdf');
  toast('✅ PDF descargado','success');
  } catch(e){ toast('Error generando PDF','error'); console.error(e); } finally { showLoad(false); }
}

/* ============================================================
   COMPETENCIAS
============================================================ */
function openCompModal(athleteId, compId){
  const m=document.createElement('div'); m.className='modal-overlay'; m.id='compModal';
  m.innerHTML=`<div class="modal-sheet">
    <div class="modal-head">
      <div><div class="modal-title">${compId?'Editar Competencia':'Nueva Competencia'}</div></div>
      <button class="modal-close" onclick="closeModal('compModal')">✕</button>
    </div>
    <label class="inp-label">Nombre del campeonato</label>
    <input type="text" class="inp" id="cpName" placeholder="Ej: ISA World Surfing Games">
    <label class="inp-label">Fecha</label>
    <input type="date" class="inp" id="cpDate" value="${todayStr()}">
    <label class="inp-label">Lugar / Ubicación</label>
    <input type="text" class="inp" id="cpPlace" placeholder="Ej: Huntington Beach, California">
    <label class="inp-label">Categoría / Modalidad</label>
    <input type="text" class="inp" id="cpCat" placeholder="Ej: Shortboard Open, Sub-18...">
    <label class="inp-label">Notas (opcional)</label>
    <textarea class="ta" id="cpNotes" placeholder="Info adicional..."></textarea>
    <button class="save-btn" onclick="saveComp('${athleteId}','${compId||''}')">💾 Guardar Competencia</button>
  </div>`;
  document.body.appendChild(m);
  // Force date value after DOM insertion (Safari fix)
  const cpDateEl = document.getElementById('cpDate');
  if(cpDateEl && !cpDateEl.value) cpDateEl.value = todayStr();
  m.onclick=e=>{ if(e.target===m) closeModal('compModal'); };
  if(compId){
    db.from('tss_competitions').select('*').eq('id',compId).single().then(({data})=>{
      if(!data) return;
      document.getElementById('cpName').value=data.name||'';
      document.getElementById('cpDate').value=data.date||'';
      document.getElementById('cpPlace').value=data.place||'';
      document.getElementById('cpCat').value=data.category||'';
      document.getElementById('cpNotes').value=data.notes||'';
    });
  }
}

async function saveComp(athleteId, existId){
  const name=gv('cpName'); const date=gv('cpDate');
  if(!name){toast('Ingresa el nombre','error');return;}
  if(!date){toast('Ingresa la fecha','error');return;}
  const payload={athlete_id:athleteId,name,date,place:gv('cpPlace'),category:gv('cpCat'),notes:gv('cpNotes'),created_by:S.user.id};
  showLoad(true);
  try {
    if(existId){ await db.from('tss_competitions').update(payload).eq('id',existId); }
    else { await db.from('tss_competitions').insert(payload); }
    toast('✅ Competencia guardada','success');
    closeModal('compModal');
    // Reload profile competitions section
    loadCompetencias(athleteId);
  } catch(e){toast('Error','error');console.error(e);}
  finally{showLoad(false);}
}

async function deleteComp(compId, athleteId){
  if(!confirm('¿Eliminar esta competencia?')) return;
  showLoad(true);
  try {
    await db.from('tss_competitions').delete().eq('id',compId);
    toast('Eliminado','success'); loadCompetencias(athleteId);
  } catch(e){toast('Error','error');} finally{showLoad(false);}
}

async function loadCompetencias(athleteId){
  const el=document.getElementById('compSection'); if(!el) return;
  const isCoach=S.user.role==='coach'||S.user.role==='acoach';
  try {
    const{data}=await db.from('tss_competitions').select('*').eq('athlete_id',athleteId).order('date',{ascending:true});
    const today=todayStr();
    const upcoming=(data||[]).filter(c=>c.date>=today);
    const past=(data||[]).filter(c=>c.date<today);

    let html=`<div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px;">
      <div class="sec-title" style="margin-bottom:0;">🏆 Competencias</div>
      ${isCoach?`<button class="btn btn-xs btn-cyan" onclick="openCompModal('${athleteId}',null)">+ Agregar</button>`:''}
    </div>`;

    if(!data||!data.length){
      html+=`<div style="text-align:center;padding:16px;color:var(--grey);font-size:12px;">Sin competencias registradas</div>`;
    } else {
      if(upcoming.length){
        upcoming.forEach(c=>{
          const d=new Date(c.date+'T00:00:00');
          const dayNames=['Dom','Lun','Mar','Mié','Jue','Vie','Sáb'];
          const monNames=['ENE','FEB','MAR','ABR','MAY','JUN','JUL','AGO','SEP','OCT','NOV','DIC'];
          const daysLeft=Math.ceil((d-new Date())/(1000*60*60*24));
          html+=`<div class="comp-card comp-upcoming">
            <div class="comp-date-box">
              <div class="comp-date-day">${d.getDate()}</div>
              <div class="comp-date-mon">${monNames[d.getMonth()]}</div>
              <div class="comp-date-mon">${d.getFullYear()}</div>
            </div>
            <div style="flex:1;min-width:0;">
              <div style="font-size:14px;font-weight:700;margin-bottom:3px;">${c.name}</div>
              ${c.place?`<div style="font-size:12px;color:var(--grey);">📍 ${c.place}</div>`:''}
              ${c.category?`<div style="margin-top:5px;"><span class="chip chip-amber">${c.category}</span></div>`:''}
              <div style="font-size:11px;color:var(--cyan);margin-top:5px;font-weight:700;">En ${daysLeft} día${daysLeft!==1?'s':''}</div>
              ${c.notes?`<p style="font-size:11px;color:rgba(232,240,245,.4);margin-top:4px;">${c.notes}</p>`:''}
            </div>
            ${isCoach?`<div style="display:flex;flex-direction:column;gap:4px;">
              <button class="btn btn-xs btn-outline" onclick="openCompModal('${athleteId}','${c.id}')">✏️</button>
              <button class="btn btn-xs btn-red" onclick="deleteComp('${c.id}','${athleteId}')">🗑</button>
            </div>`:''}
          </div>`;
        });
      }
      if(past.length){
        html+=`<div style="font-size:10px;color:var(--grey);letter-spacing:1px;text-transform:uppercase;margin:12px 0 6px;">Pasadas</div>`;
        past.slice(0,3).forEach(c=>{
          const d=new Date(c.date+'T00:00:00');
          const monNames=['ENE','FEB','MAR','ABR','MAY','JUN','JUL','AGO','SEP','OCT','NOV','DIC'];
          html+=`<div class="comp-card comp-past">
            <div class="comp-date-box">
              <div class="comp-date-day">${d.getDate()}</div>
              <div class="comp-date-mon">${monNames[d.getMonth()]}</div>
            </div>
            <div style="flex:1;">
              <div style="font-size:13px;font-weight:600;">${c.name}</div>
              ${c.place?`<div style="font-size:11px;color:var(--grey);">📍 ${c.place}</div>`:''}
              ${c.category?`<span class="chip chip-grey" style="margin-top:4px;">${c.category}</span>`:''}
            </div>
            ${isCoach?`<div style="display:flex;flex-direction:column;gap:4px;">
              <button class="btn btn-xs btn-outline" onclick="openCompModal('${athleteId}','${c.id}')">✏️</button>
              <button class="btn btn-xs btn-red" onclick="deleteComp('${c.id}','${athleteId}')">🗑</button>
            </div>`:''}
          </div>`;
        });
      }
    }
    el.innerHTML=html;
  } catch(e){ el.innerHTML='<p style="font-size:12px;color:var(--red);padding:8px;">Error cargando competencias</p>'; console.error(e); }
}


/* ============================================================
   BOOT
============================================================ */
async function boot(){
  // Always show login screen — no auto-restore
  localStorage.removeItem('tss_uid');
  document.getElementById('landingScreen').style.display='flex';
  showLoad(false);
}
boot();
</script>
