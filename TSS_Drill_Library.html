ion alta"},{"id":"DRL-MEN-MO-02","name":"Commitment Contract","pillar":"Mental","part":"Motivation","seq":"Pre-Surf","level":"All Levels","belt":"Todas las Cintas","block":"A","type":"Mission Drill","env":"Beach","age":"All","goal":"Increase commitment to the session goal","cue":"I commit to...","constraint":"Declarar en voz alta: Hoy me comprometo a [X especifico]. Si no declara, no entra.","success":"Compromiso claro y especifico declarado","error":"Lack of commitment","solution":"Mental reminder of purpose","reflection":"Cumpliste tu compromiso? Que te freno?","notes":"Funciona especialmente bien con adolescentes"},{"id":"DRL-MEN-RL-01","name":"Box Breathing Reset","pillar":"Mental","part":"Relaxation","seq":"Pre-Surf","level":"All Levels","belt":"Todas las Cintas","block":"A","type":"Mental Drill","env":"Beach / Water","age":"All","goal":"Reduce tension to improve flow","cue":"4-4-4-4","constraint":"4 seg inhalar, 4 sostener, 4 exhalar, 4 sostener. Minimo 4 ciclos.","success":"FC perceptiblemente mas baja, hombros relajados","error":"Tension before or during the session","solution":"Breath and relax","reflection":"Como cambio tu cuerpo despues de respirar?","notes":"Tecnica probada en deportes de alto rendimiento"},{"id":"DRL-MEN-RL-02","name":"Tension Scan & Release","pillar":"Mental","part":"Relaxation","seq":"Pre-Surf","level":"All Levels","belt":"Todas las Cintas","block":"A","type":"Awareness Drill","env":"Beach","age":"All","goal":"Identify and release tension patterns","cue":"Scan and release","constraint":"Escanear cuerpo pies a cabeza. Cada zona tensa: exhalar y soltar. Min 2 min.","success":"Identifica 2+ zonas de tension y las libera","error":"Holding breath and body tension","solution":"Conscious breathing and body awareness","reflection":"Donde guardas mas tension? Siempre es el mismo lugar?","notes":"Util para atletas con ansiedad pre-sesion"},{"id":"DRL-MEN-FO-01","name":"Anchor Word","pillar":"Mental","part":"Focus","seq":"Any","level":"All Levels","belt":"Todas las Cintas","block":"A","type":"Mental Drill","env":"Beach / Water","age":"All","goal":"Sustain attention on the session objective","cue":"Say your word","constraint":"UNA palabra que represente objetivo. Repetir internamente antes de cada ola.","success":"Atleta usa palabra consistentemente y reporta mayor claridad","error":"Losing focus mid-session","solution":"Use anchor word to refocus","reflection":"Tu anchor word te ayudo? Necesitas cambiarla?","notes":"Basado en task-relevant words de motor learning"},{"id":"DRL-MEN-FO-02","name":"3-Wave Focus Block","pillar":"Mental","part":"Focus","seq":"Mid-Session","level":"Intermediate+","belt":"Intermediate+","block":"A","type":"Mission Drill","env":"Water","age":"12+","goal":"Train sustained attention across multiple waves","cue":"3 waves, same focus","constraint":"Mismo foco tecnico durante 3 olas consecutivas. Si cambia, reinicia.","success":"3 olas con foco identico ejecutado consistentemente","error":"Inconsistent focus","solution":"Block focus training","reflection":"En que ola perdiste el foco? Que te distrajo?","notes":"Excelente preparacion para competencia"},{"id":"DRL-MEN-FB-01","name":"Post-Wave Debrief","pillar":"Mental","part":"Feedback","seq":"Post-Wave","level":"All Levels","belt":"Todas las Cintas","block":"A","type":"Awareness Drill","env":"Water","age":"All","goal":"Review and reflect after each wave","cue":"What happened?","constraint":"Despues de cada ola, antes de remar: Que hice? Funciono? Que cambio?","success":"Articula que funciono y que cambiaria en >50% de olas","error":"Ignoring session feedback","solution":"Review and reflect","reflection":"Cuantas olas surfeaste hoy sin pensar en lo que paso?","notes":"Base del aprendizaje consciente en TSS"},{"id":"DRL-MEN-MS-01","name":"Mission Lock","pillar":"Mental","part":"Mission","seq":"Pre-Surf","level":"All Levels","belt":"Todas las Cintas","block":"A","type":"Mission Drill","env":"Beach","age":"All","goal":"Define and maintain one clear mission","cue":"Lock your mission","constraint":"Escribir mision en la arena o mano. Debe ser visible. Si no declara, no entra.","success":"Atleta recuerda y ejecuta mision en >70% de olas","error":"No clear objective","solution":"Define one mission","reflection":"Tu mision fue la correcta para hoy?","notes":"El anclaje fisico mejora retencion"},{"id":"DRL-TAC-PCR-01","name":"Pre-Competition Ritual Builder","pillar":"Tactical","part":"Pre-Competition Routine","seq":"Pre-Surf","level":"Intermediate+","belt":"Intermediate+","block":"S","type":"Mission Drill","env":"Beach","age":"12+","goal":"Consistent pre-competition routine","cue":"Same steps every time","constraint":"Ejecutar rutina completa en exactamente 15 minutos","success":"Rutina completa, en tiempo, con calidad consistente","error":"Inconsistent pre-surf routine","solution":"Standardized warm-up and mental prep","reflection":"Tu rutina te preparo o te canso?","notes":"La rutina pre-competencia es sagrada"},{"id":"DRL-TAC-WS-01","name":"Wave Quality Score","pillar":"Tactical","part":"Wave Selection","seq":"During Session","level":"Intermediate+","belt":"Intermediate+","block":"S","type":"Game Drill","env":"Water","age":"12+","goal":"Improve wave selection decision-making","cue":"Score before you go","constraint":"Asignar puntaje 1-5 a cada ola ANTES de decidir. Solo remar por olas de 3+.","success":">70% de olas tomadas calificadas 3+ por el coach","error":"Taking any wave without criteria","solution":"Score waves before catching","reflection":"Tomaste alguna ola de 1-2? Por que?","notes":"Wave selection es el skill tactico #1"},{"id":"DRL-TAC-WS-02","name":"5-Wave Challenge","pillar":"Tactical","part":"Wave Selection","seq":"Full Session","level":"Intermediate+","belt":"Intermediate+","block":"S","type":"Mission Drill","env":"Water","age":"12+","goal":"Maximize score with limited waves","cue":"Only 5 waves","constraint":"Solo 5 olas en 30 minutos. Cada ola debe ser la mejor disponible.","success":"Puntaje promedio mayor que promedio libre del atleta","error":"Wasting waves on poor selection","solution":"Strategic wave selection under constraint","reflection":"Cual ola desperdiciaste? Cual fue tu mejor decision?","notes":"Drill inspirado en formatos competitivos"},{"id":"DRL-TAC-POS-01","name":"Peak Positioning Drill","pillar":"Tactical","part":"Positioning","seq":"Going Out","level":"Intermediate+","belt":"Intermediate+","block":"S","type":"Ecological Drill","env":"Water","age":"12+","goal":"Choose optimal position in lineup","cue":"Find the peak","constraint":"Posicionarse en el peak y mantenerse 3 sets antes de primera ola.","success":"Toma olas desde posicion de maxima prioridad consistentemente","error":"Poor lineup positioning","solution":"Strategic positioning based on sets","reflection":"Estuviste en el peak o al lado?","notes":"Los mejores surfistas son los mejores posicionadores"},{"id":"DRL-TAC-POS-02","name":"Current Adjustment","pillar":"Tactical","part":"Positioning","seq":"During Session","level":"All Levels","belt":"Todas las Cintas","block":"S","type":"Awareness Drill","env":"Water","age":"All","goal":"Maintain position despite current drift","cue":"Check your markers","constraint":"Identificar 2 marcadores en tierra. Verificar posicion cada 3 min.","success":"Mantiene posicion ±5 metros toda la sesion","error":"Drifting out of position","solution":"Constant position awareness","reflection":"Cuanto te movio la corriente sin que te dieras cuenta?","notes":"Skill tactico fundamental raramente entrenado"},{"id":"DRL-TAC-AD-01","name":"Mid-Session Adaptation","pillar":"Tactical","part":"Plan Creation","seq":"Mid-Session","level":"Intermediate+","belt":"Intermediate+","block":"S","type":"Mission Drill","env":"Water","age":"12+","goal":"Adapt plan when conditions change","cue":"Read and adapt","constraint":"A mitad de sesion, pausar, evaluar si condiciones cambiaron, declarar si mantiene o adapta plan.","success":"Identifica cambios y ajusta plan autonomamente","error":"Sticking to plan when conditions change","solution":"Flexible tactical adaptation","reflection":"Las condiciones cambiaron? Adaptaste o seguiste en piloto automatico?","notes":"Capacidad de adaptacion mid-session separa surfistas inteligentes de mecanicos"},{"id":"DRL-TAC-SH-01","name":"Simulated Heat","pillar":"Tactical","part":"Score Generation","seq":"Full Session","level":"Intermediate+","belt":"Intermediate+","block":"S","type":"Elite Drill","env":"Water","age":"12+","goal":"Practice competitive decision-making under pressure","cue":"Its a heat","constraint":"Heat de 20 min. Solo cuentan las 2 mejores olas. Max 8 olas. Prioridad real.","success":"Building (cada ola mejor) y wave management estrategico","error":"Poor competitive performance","solution":"Simulate competitive conditions","reflection":"Tu estrategia funciono? Que harias diferente en los ultimos 5 min?","notes":"Incluir debriefing post-heat"},{"id":"DRL-PHY-BA-01","name":"Single Leg Surf Stance","pillar":"Physical","part":"Balance","seq":"Preparation","level":"All Levels","belt":"Todas las Cintas","block":"C","type":"Performance Drill","env":"Beach","age":"All","goal":"Develop dynamic balance for surfing","cue":"One leg, stable","constraint":"Postura de surf en una pierna 30 seg. Si toca el piso, reiniciar.","success":"30 seg sin tocar piso en ambas piernas","error":"Poor balance during maneuvers","solution":"Train single-leg stability","reflection":"Cual pierna es mas estable? Por que?","notes":"Balance unipodal es fundamento de todo el surfing"},{"id":"DRL-PHY-BA-02","name":"Perturbation Recovery","pillar":"Physical","part":"Balance","seq":"Preparation","level":"Intermediate+","belt":"Intermediate+","block":"C","type":"Ecological Drill","env":"Beach / Indo Board","age":"10+","goal":"Recover balance under unexpected forces","cue":"Dont fall","constraint":"Postura surf mientras coach empuja aleatoriamente. Recuperar sin caer.","success":"Recupera equilibrio en <1 seg sin mover pies","error":"Falling on unexpected movements","solution":"Train reactive balance","reflection":"De que direccion te cuesta mas recuperar?","notes":"Simula fuerzas impredecibles de la ola"},{"id":"DRL-PHY-CO-01","name":"Upper-Lower Disconnect","pillar":"Physical","part":"Coordination","seq":"Preparation","level":"All Levels","belt":"Todas las Cintas","block":"C","type":"Performance Drill","env":"Beach","age":"All","goal":"Independent upper-lower body control","cue":"Top goes, bottom stays","constraint":"Rotar torso mientras cadera fija. Luego invertir. Coach verifica separacion.","success":"Separacion clara upper-lower visible para coach","error":"Poor body coordination","solution":"Train coordination","reflection":"Sientes torso y caderas juntos o separados al surfear?","notes":"Directamente transferible a bottom turns y carves"},{"id":"DRL-PHY-CO-02","name":"Surf Pattern Coordination","pillar":"Physical","part":"Coordination","seq":"Preparation","level":"Beginner","belt":"Cinta Blanca — Cinta Amarilla","block":"C","type":"Game Drill","env":"Beach","age":"All","goal":"Synchronize upper-lower body and board","cue":"All together","constraint":"Secuencia: paddle → pop-up → stance → rotation → reset. Sin pausas.","success":"Secuencia completa fluida sin pausas ni descoordinacion","error":"Disconnected movements","solution":"Link movements","reflection":"Donde pierdes fluidez en la secuencia?","notes":"Conecta dry training con movimiento real en agua"},{"id":"DRL-PHY-MO-01","name":"Hip Opener Flow","pillar":"Physical","part":"Mobility","seq":"Preparation","level":"All Levels","belt":"Todas las Cintas","block":"C","type":"Flow Drill","env":"Beach","age":"All","goal":"Improve hip mobility for surfing","cue":"Open your hips","constraint":"6 movimientos de apertura de cadera. Cada posicion min 10 seg.","success":"Rango de movimiento mejora sesion a sesion","error":"Limited range of motion in hips","solution":"Improve flexibility","reflection":"Tus caderas se sintieron mas libres en el agua?","notes":"Caderas = articulacion mas importante del surfing"},{"id":"DRL-PHY-MO-02","name":"Ankle Mobility Circuit","pillar":"Physical","part":"Mobility","seq":"Preparation","level":"All Levels","belt":"Todas las Cintas","block":"C","type":"Performance Drill","env":"Beach","age":"All","goal":"Improve ankle dorsiflexion for stance","cue":"Knees over toes","constraint":"Rodilla pasa punta del pie en posicion surf. Min 5cm. Mantener 10 seg.","success":"Dorsiflexion >10cm medida con test rodilla-pared","error":"Stiff ankles limiting stance","solution":"Increase ankle mobility","reflection":"Sientes que tus tobillos limitan tu postura?","notes":"Tobillo rigido = stance alto = perdida de control"},{"id":"DRL-PHY-ST-01","name":"Surf Plank Hold","pillar":"Physical","part":"Stability","seq":"Preparation","level":"All Levels","belt":"Todas las Cintas","block":"C","type":"Performance Drill","env":"Beach","age":"All","goal":"Develop core stability for surfing","cue":"Strong core","constraint":"Plank en posicion paddling (cobra). 45 seg minimo.","success":"45+ seg con postura mantenida sin colapso lumbar","error":"Unstable core during maneuvers","solution":"Improve core stability","reflection":"Donde cedes primero? Eso pasa en el agua?","notes":"Core stability es base de TODO en surf"},{"id":"DRL-PHY-ST-02","name":"Landing Absorption","pillar":"Physical","part":"Stability","seq":"Preparation","level":"Intermediate+","belt":"Intermediate+","block":"C","type":"Ecological Drill","env":"Beach","age":"10+","goal":"Absorb impact forces during maneuvers","cue":"Absorb and hold","constraint":"Saltar desde 30cm, aterrizar en postura surf. Mantener 3 seg sin mover pies.","success":"Aterrizaje silencioso, estable, 3 seg sin moverse","error":"Stiff landings causing loss of control","solution":"Train absorption pattern","reflection":"Tu aterrizaje fue silencioso o ruidoso?","notes":"Aplicable a aerials, re-entries, landings"},{"id":"DRL-PHY-LE-01","name":"Surf Squat Endurance","pillar":"Physical","part":"Strength","seq":"Dry Training","level":"All Levels","belt":"Todas las Cintas","block":"C","type":"Performance Drill","env":"Beach / Gym","age":"All","goal":"Build lower body endurance","cue":"Low and strong","constraint":"Squat en postura surf (split stance). 30 reps por lado sin pausa.","success":"30 reps por lado sin perdida de postura","error":"Legs giving out during session","solution":"Strengthen legs","reflection":"Tus piernas se cansan antes en el agua? En que momento?","notes":"Split squat > Bilateral squat para surfistas"},{"id":"DRL-PHY-PA-01","name":"Paddle Power Sets","pillar":"Physical","part":"Endurance","seq":"Water","level":"All Levels","belt":"Todas las Cintas","block":"C","type":"Performance Drill","env":"Water / Pool","age":"All","goal":"Improve paddling strength and endurance","cue":"Strong strokes","constraint":"Intervalos: 20 strokes max velocidad + 10 recovery. 6 sets.","success":"Mantiene velocidad en ultimo set al >80% del primero","error":"Fatigue during paddling","solution":"Improve paddling strength","reflection":"En que set empezaste a perder potencia?","notes":"Paddling = 50-70% del tiempo en agua"},{"id":"DRL-PHY-CR-01","name":"Rotational Power Band","pillar":"Physical","part":"Explosiveness","seq":"Dry Training","level":"Intermediate+","belt":"Intermediate+","block":"F","type":"Performance Drill","env":"Beach / Gym","age":"12+","goal":"Develop rotational power for turns","cue":"Rotate with power","constraint":"Rotacion con banda elastica en postura surf. 12 reps x lado, 3 sets.","success":"Rotacion potente con separacion upper-lower visible","error":"Weak rotation","solution":"Develop core rotation","reflection":"Sientes que tu rotacion en el agua viene del core o brazos?","notes":"La rotacion es el motor de todas las maniobras"},{"id":"DRL-PHY-CR-02","name":"Timing Rotation Drill","pillar":"Physical","part":"Explosiveness","seq":"Preparation","level":"Intermediate+","belt":"Intermediate+","block":"F","type":"Ecological Drill","env":"Beach","age":"10+","goal":"Develop rotational timing","cue":"Time it right","constraint":"Coach lanza pelota. Atleta rota para atrapar en postura surf. Timing varia.","success":"Atrapa >8/10 con rotacion correcta y postura mantenida","error":"Poor rotational timing","solution":"Train rotational patterns","reflection":"Rotaste antes o despues del momento ideal?","notes":"Perception-action coupling aplicado a entrenamiento fisico"},{"id":"DRL-SAF-EH-01","name":"Board Pass Drill","pillar":"Safety","part":"Equipment Handling","seq":"Pre-Surf","level":"Beginner","belt":"Cinta Blanca — Cinta Amarilla","block":"B","type":"Game Drill","env":"Beach / Shallow Water","age":"All","goal":"Control board safely around others","cue":"Control your board","constraint":"Pasar tabla a companero sin que toque piso ni persona. 10 pases exitosos.","success":"10/10 pases sin incidentes","error":"Losing control of board near others","solution":"Safe board handling","reflection":"Que pasa cuando pierdes control de tu tabla?","notes":"La tabla es responsabilidad del surfista EN TODO MOMENTO"},{"id":"DRL-TEC-PA-01","name":"Angle Finder","pillar":"Technical","part":"Paddling Angle","seq":"Wave Catch","level":"Beginner","belt":"Cinta Blanca — Cinta Amarilla","block":"B","type":"Game Drill","env":"Water","age":"All","goal":"Correct paddle angle for wave catch","cue":"Angle to the energy","constraint":"Coach senala direccion. Atleta ajusta angulo ANTES de remar. Angulo incorrecto = no cuenta.","success":"Catch exitoso en >70% con angulo correcto","error":"Missing waves or late takeoff","solution":"Correct paddle angle","reflection":"Hacia donde remaste? Hacia donde venia la energia?","notes":"Error comun y menos corregido en surf coaching"},{"id":"DRL-TEC-PA-02","name":"Energy Tracker","pillar":"Technical","part":"Paddling Angle","seq":"Wave Catch","level":"Intermediate","belt":"Cinta Azul — Cinta Morada","block":"B","type":"Ecological Drill","env":"Water","age":"All","goal":"Paddle toward wave energy intuitively","cue":"Follow the energy","constraint":"Solo puede remar cuando siente energia debajo. Sin timing verbal del coach.","success":"Conecta con ola en momento y angulo correcto consistentemente","error":"Paddling away from wave energy","solution":"Paddle toward wave energy","reflection":"Sentiste la energia antes de que llegara?","notes":"Drill puramente ecologico: el entorno ensena"},{"id":"DRL-TEC-CPL-01","name":"Line Selector","pillar":"Technical","part":"Cobra Pick Line","seq":"Wave Catch","level":"Beginner","belt":"Cinta Blanca — Cinta Amarilla","block":"B","type":"Mission Drill","env":"Water (whitewater)","age":"All","goal":"Select initial line on the wave","cue":"Pick your line","constraint":"En posicion cobra, declarar izquierda o derecha ANTES de ponerse de pie.","success":"Declara linea correcta y la ejecuta en >80%","error":"Undefined first line","solution":"Early line selection","reflection":"Elegiste la linea correcta? Que info usaste?","notes":"La cobra es el momento de decision"},{"id":"DRL-TEC-IPP-01","name":"Pocket Finder","pillar":"Technical","part":"Identify the Pocket","seq":"During Ride","level":"Intermediate","belt":"Cinta Azul — Cinta Morada","block":"C","type":"Ecological Drill","env":"Water","age":"All","goal":"Recognize most powerful part of wave","cue":"Stay in the pocket","constraint":"Mantener surf dentro de 2 metros del pocket. Si se aleja, ola no cuenta.","success":"Surf consistentemente cercano al pocket en >60% de olas","error":"Riding away from the power","solution":"Chase the pocket","reflection":"Donde estaba el pocket? Te alejaste? Por que?","notes":"Pocket awareness = skill mas importante del competitive surfing"},{"id":"DRL-TEC-PU-01","name":"Pop-Up Flow Sequence","pillar":"Technical","part":"Pop Up Connection","seq":"Take Off","level":"Beginner","belt":"Cinta Blanca — Cinta Amarilla","block":"B","type":"Performance Drill","env":"Beach / Water","age":"All","goal":"Smooth and efficient pop-up","cue":"One smooth move","constraint":"Pop-up completo en UN movimiento fluido. Si hay pausa, no cuenta.","success":"Pop-up fluido en <2 seg con pies en posicion correcta","error":"Slow or unstable pop-up","solution":"Smooth pop-up sequence","reflection":"Donde se traba tu pop-up?","notes":"Pop-up es critico pero NO se debe sobre-entrenar aislado"},{"id":"DRL-PHY-FL-01","name":"Surf Flexibility Flow","pillar":"Physical","part":"Mobility","seq":"Post-Session","level":"All Levels","belt":"Todas las Cintas","block":"C","type":"Flow Drill","env":"Beach","age":"All","goal":"Improve overall flexibility for surfing","cue":"Breathe and stretch","constraint":"8 posiciones mantenidas 30 seg cada una. Respiracion controlada obligatoria.","success":"Rango incrementa progresivamente medido mensualmente","error":"Stiff hips and shoulders","solution":"Increase mobility","reflection":"Que musculo o articulacion se siente mas limitada hoy?","notes":"Stretching post-sesion es recuperacion activa"},{"id":"DRL-TEC-PMF-01","name":"Rail-to-Rail Rhythm","pillar":"Technical","part":"Pump Frontside","seq":"Wave Ride","level":"Foundation to Elite","belt":"Foundation to Elite","block":"F","type":"Ecological Drill","env":"Water","age":"10+","goal":"Generate speed through rail-to-rail transitions frontside","cue":"Rail to rail","constraint":"Generate enough speed to reach end section using ONLY pump. No wave energy allowed at start.","success":"Visible acceleration after 3 consecutive pumps. Speed maintained or increased.","error":"No speed generation on the wave","solution":"Use rail transitions to generate speed","reflection":"Did you feel acceleration? How many pumps before you felt speed?","notes":"El pump es transferencia de peso entre rails, no movimiento vertical"},{"id":"DRL-TEC-PMF-02","name":"3-Pump Speed Test","pillar":"Technical","part":"Pump Frontside","seq":"Wave Ride","level":"Foundation to Elite","belt":"Foundation to Elite","block":"F","type":"Mission Drill","env":"Water","age":"10+","goal":"Generate measurable speed in exactly 3 pumps frontside","cue":"3 pumps, max speed","constraint":"Only 3 pumps allowed before executing a maneuver. Must generate enough speed for the maneuver.","success":"Maneuver after 3 pumps has same quality as with unlimited pumps.","error":"Losing speed mid-wave","solution":"Efficient pump technique","reflection":"Were 3 pumps enough? Which pump generated the most speed?","notes":"Constraint de numero fuerza eficiencia sobre cantidad"},{"id":"DRL-TEC-PMF-03","name":"Pump & Project","pillar":"Technical","part":"Pump Frontside","seq":"Wave Ride","level":"Emerging to Elite","belt":"Emerging to Elite","block":"F","type":"Performance Drill","env":"Water","age":"12+","goal":"Link pump speed generation to projection toward lip","cue":"Pump then project","constraint":"Every pump sequence MUST end in a projection toward the lip. No flat pumping.","success":"Clear upward projection visible after pump sequence. Coach confirms vertical intent.","error":"Pump without projection","solution":"Connect pump to projection","reflection":"Did you feel the energy transfer from pump to projection? Where did it go?","notes":"La conexion pump-projection es el circuito infinito en accion"},{"id":"DRL-TEC-PMF-04","name":"Speed Recovery Pump","pillar":"Technical","part":"Pump Frontside","seq":"Wave Ride","level":"Emerging to Elite","belt":"Emerging to Elite","block":"F","type":"Game Drill","env":"Water","age":"12+","goal":"Recover speed immediately after a completed maneuver frontside","cue":"Recover speed NOW","constraint":"After completing any maneuver, must execute 2 recovery pumps before next maneuver. No coasting.","success":"Speed after recovery pumps equals or exceeds pre-maneuver speed.","error":"Speed dies after maneuver","solution":"Recovery pump after maneuver","reflection":"How quickly did you recover speed? Did you lose the wave because you coasted?","notes":"Los mejores surfistas nunca pierden speed despues de una maniobra"},{"id":"DRL-TEC-PMF-05","name":"Frontside Circuito Infinito","pillar":"Technical","part":"Pump Frontside","seq":"Full Wave","level":"Emerging to Elite","belt":"Emerging to Elite","block":"F","type":"Elite Drill","env":"Water","age":"12+","goal":"Execute complete Circuito Infinito frontside: BT → Projection → Pump → BT","cue":"Never stop the loop","constraint":"Ride entire wave using ONLY the circuit: Bottom Turn → Projection → Pump → repeat. No other maneuvers.","success":"3+ complete circuits on one wave with visible acceleration each cycle.","error":"Disconnected sections on wave","solution":"Connect BT-Projection-Pump in loop","reflection":"How many circuits did you complete? Where did the loop break?","notes":"Este es EL drill que define el surfing funcional en TSS"},{"id":"DRL-TEC-PMB-01","name":"Backside Rail Drive","pillar":"Technical","part":"Pump Backside","seq":"Wave Ride","level":"Foundation to Elite","belt":"Foundation to Elite","block":"F","type":"Ecological Drill","env":"Water","age":"10+","goal":"Generate speed through backside rail transitions","cue":"Drive the backside rail","constraint":"Generate speed using ONLY backside pump. Head must turn to see wave face on each transition.","success":"Visible acceleration backside. Speed maintained through 3+ pumps.","error":"No speed generation backside","solution":"Backside rail engagement for speed","reflection":"Could you see the wave face on each pump? Did your head lead?","notes":"Backside pump es mas dificil porque la vision es limitada"},{"id":"DRL-TEC-PMB-02","name":"Backside Pump & Connect","pillar":"Technical","part":"Pump Backside","seq":"Wave Ride","level":"Emerging to Elite","belt":"Emerging to Elite","block":"F","type":"Mission Drill","env":"Water","age":"12+","goal":"Link backside pump to maneuver execution","cue":"Pump into your move","constraint":"3 backside pumps THEN immediate maneuver. No pause between pump and maneuver.","success":"Smooth transition from pump to maneuver. No speed loss in transition.","error":"Disconnected backside surfing","solution":"Connect pump to backside maneuvers","reflection":"Did the pump feed the maneuver? Or did you lose connection?","notes":"El pump backside debe alimentar la maniobra, no ser un evento separado"},{"id":"DRL-TEC-PMB-03","name":"Backside Speed Maintenance","pillar":"Technical","part":"Pump Backside","seq":"Wave Ride","level":"Emerging to Elite","belt":"Emerging to Elite","block":"F","type":"Performance Drill","env":"Water","age":"12+","goal":"Maintain consistent speed through entire backside wave","cue":"Keep the speed alive","constraint":"Ride backside wave from start to end. Speed at end must be >= speed at start. Coach verifies.","success":"Final section surfed with same or more speed than first section.","error":"Speed dies on backside waves","solution":"Maintain speed through full backside ride","reflection":"When did you feel speed drop? What caused it?","notes":"Speed maintenance backside separa surfistas intermedios de avanzados"},{"id":"DRL-TEC-PMB-04","name":"Backside Circuito Infinito","pillar":"Technical","part":"Pump Backside","seq":"Full Wave","level":"Emerging to Elite","belt":"Emerging to Elite","block":"F","type":"Elite Drill","env":"Water","age":"12+","goal":"Execute Circuito Infinito backside: BT → Projection → Pump → BT","cue":"Circuit backside","constraint":"Full wave using only the circuit backside. Head must lead every transition.","success":"3+ complete backside circuits with acceleration visible each cycle.","error":"No backside circuit flow","solution":"BT-Projection-Pump loop backside","reflection":"Did the backside circuit feel as natural as frontside? What was different?","notes":"El circuito infinito backside es el nivel mas alto de control de velocidad"},{"id":"DRL-TEC-PMB-05","name":"Switch Pump Challenge","pillar":"Technical","part":"Pump Backside","seq":"Full Session","level":"Emerging to Elite","belt":"Emerging to Elite","block":"F","type":"Game Drill","env":"Water","age":"12+","goal":"Equal pump quality frontside and backside in same session","cue":"Both sides equal","constraint":"Alternate: one wave frontside pump, one wave backside pump. Coach rates quality 1-5 each.","success":"Average pump quality score within 1 point between frontside and backside.","error":"Pump only works one direction","solution":"Equal pump quality both sides","reflection":"Which side felt weaker? What specifically felt different?","notes":"La asimetria en pump limita el surfing competitivo"},{"id":"DRL-TEC-TRF-01","name":"Tube Line Finder","pillar":"Technical","part":"Tube Riding Frontside","seq":"Wave Approach","level":"Functional to Elite","belt":"Functional to Elite","block":"I","type":"Ecological Drill","env":"Water (barreling waves)","age":"14+","goal":"Identify and set the correct line for frontside tube entry","cue":"Set your line early","constraint":"Decide tube line during paddle. Declare left/right/straight to coach before standing. Execute declared line.","success":"Enters tube on declared line. Stays inside 2+ seconds.","error":"Wrong line into tube section","solution":"Read and set tube line early","reflection":"Was your line correct? Did you need to adjust inside?","notes":"La linea se decide ANTES del takeoff, no durante"},{"id":"DRL-TEC-TRF-02","name":"Frontside Stall Control","pillar":"Technical","part":"Tube Riding Frontside","seq":"Inside Tube","level":"Functional to Elite","belt":"Functional to Elite","block":"I","type":"Performance Drill","env":"Water (barreling waves)","age":"14+","goal":"Control speed inside frontside barrel using stall techniques","cue":"Slow down inside","constraint":"Must stay INSIDE the barrel for maximum time. Use hand drag or weight shift to stall. No outrunning.","success":"Stays inside barrel >3 seconds with controlled stall.","error":"Outrunning the barrel","solution":"Control speed inside tube","reflection":"Did you outrun it or did it close on you? What stall technique worked best?","notes":"El stall es el skill mas critico del tube riding"},{"id":"DRL-TEC-TRF-03","name":"Tube Vision Training","pillar":"Technical","part":"Tube Riding Frontside","seq":"Inside Tube","level":"Functional to Elite","belt":"Functional to Elite","block":"I","type":"Mental Drill","env":"Water (barreling waves)","age":"14+","goal":"Maintain visual focus on exit point while inside frontside tube","cue":"Eyes on the light","constraint":"Eyes MUST stay open and focused on exit light. Post-wave debrief: describe what you saw inside.","success":"Can describe exit shape and light conditions after each tube attempt.","error":"Closing eyes or losing focus in tube","solution":"Keep eyes open and focused","reflection":"What did you see inside? Could you see the exit at all times?","notes":"La vision dentro del tubo es lo que separa completar de no completar"},{"id":"DRL-TEC-TRF-04","name":"Tube Exit Drive","pillar":"Technical","part":"Tube Riding Frontside","seq":"Tube Exit","level":"Functional to Elite","belt":"Functional to Elite","block":"I","type":"Mission Drill","env":"Water (barreling waves)","age":"14+","goal":"Clean tube exit with speed and control frontside","cue":"Drive through the door","constraint":"Must exit barrel with enough speed to execute at least one more turn. No falling at exit.","success":"Clean exit with speed maintained. Continues surfing after exit.","error":"Getting caught at exit","solution":"Drive through exit with speed","reflection":"Did you make it out? What slowed you down at exit?","notes":"La salida del tubo es donde se suman los puntos en competencia"},{"id":"DRL-TEC-TRB-01","name":"Backside Tube Entry","pillar":"Technical","part":"Tube Riding Backside","seq":"Wave Approach","level":"Functional to Elite","belt":"Functional to Elite","block":"I","type":"Ecological Drill","env":"Water (barreling waves)","age":"14+","goal":"Enter backside tube with correct body position and line","cue":"Head turns, body follows","constraint":"Head MUST turn to see inside barrel before entry. If head doesnt turn, dont go.","success":"Enters backside barrel with head turned and vision inside. Stays 2+ seconds.","error":"Cannot get into backside barrels","solution":"Backside tube positioning","reflection":"Could you see inside before committing? What did your body need to do differently than frontside?","notes":"Backside tube es uno de los skills mas dificiles del surfing"},{"id":"DRL-TEC-TRB-02","name":"Backside Grab & Hold","pillar":"Technical","part":"Tube Riding Backside","seq":"Inside Tube","level":"Functional to Elite","belt":"Functional to Elite","block":"I","type":"Performance Drill","env":"Water (barreling waves)","age":"14+","goal":"Maintain stability inside backside tube using rail grab","cue":"Grab and hold","constraint":"Inside hand grabs rail for stability. Maintain low stance. Eyes on exit at all times.","success":"Stable inside barrel with grab. No wobble. Clean exit.","error":"Losing balance in backside tube","solution":"Grab rail for stability","reflection":"Did the grab help stability? Could you eventually do it without grabbing?","notes":"El grab del rail backside es herramienta de estabilidad, no de estilo"},{"id":"DRL-TEC-TRB-03","name":"Backside Tube Exit","pillar":"Technical","part":"Tube Riding Backside","seq":"Tube Exit","level":"Functional to Elite","belt":"Functional to Elite","block":"I","type":"Mission Drill","env":"Water (barreling waves)","age":"14+","goal":"Clean backside tube exit with speed","cue":"Push through","constraint":"Weight must shift forward at exit point. Front foot drives. Must exit with enough speed to continue.","success":"Clean backside exit. Continues surfing. Speed maintained.","error":"Getting clipped at backside exit","solution":"Drive through backside exit","reflection":"Did you lean back or drive forward at the exit? Which worked?","notes":"La salida backside requiere cambio de peso hacia adelante"},{"id":"DRL-TEC-TRB-04","name":"Tube Breathing Protocol","pillar":"Technical","part":"Tube Riding Backside","seq":"Pre-Tube","level":"Functional to Elite","belt":"Functional to Elite","block":"I","type":"Mental Drill","env":"Water (barreling waves)","age":"14+","goal":"Maintain controlled breathing before and during tube riding","cue":"Breathe before entry","constraint":"Deliberate exhale before tube entry. Controlled breathing inside. Report breathing state after each attempt.","success":"Reports controlled breathing. No panic. Tension visibly lower than before protocol.","error":"Holding breath causes tension in tubes","solution":"Controlled breathing before and during tube","reflection":"Did you hold your breath or breathe? How did it affect your performance?","notes":"Aplica a frontside y backside. El control de respiracion reduce tension."},{"id":"DRL-TEC-SAF-01","name":"Ramp Approach Training","pillar":"Technical","part":"Straight Air Frontside","seq":"Ramp Phase","level":"Functional to Elite","belt":"Functional to Elite","block":"R","type":"Ecological Drill","env":"Water","age":"12+","goal":"Build correct approach speed and angle for frontside straight air","cue":"Speed into the ramp","constraint":"Bottom turn must generate enough speed and correct angle (45-60°) to reach lip. No air required yet — focus ONLY on the approach.","success":"Reaches lip with speed and correct angle. Could have launched but didn't need to.","error":"Bad approach angle for air","solution":"Correct ramp approach","reflection":"Did you have enough speed at the lip? Was your angle right?","notes":"Fase 1 del Air System: RAMP. Sin approach correcto no hay air."},{"id":"DRL-TEC-SAF-02","name":"Frontside Launch & Spot","pillar":"Technical","part":"Straight Air Frontside","seq":"Air Phase","level":"Functional to Elite","belt":"Functional to Elite","block":"R","type":"Performance Drill","env":"Water","age":"12+","goal":"Maintain body control and board connection during frontside straight air","cue":"Stay connected","constraint":"Feet MUST stay on board throughout flight. Eyes spot landing zone before descent begins.","success":"Board stays under feet. Eyes spot landing before descent. Body controlled.","error":"No control in the air","solution":"Body control during flight","reflection":"Did your feet stay connected? Could you see your landing spot?","notes":"Fase 2 del Air System: AIR. Control aereo = conexion con tabla en vuelo."},{"id":"DRL-TEC-SAF-03","name":"Frontside Landing Absorption","pillar":"Technical","part":"Straight Air Frontside","seq":"Landing Phase","level":"Functional to Elite","belt":"Functional to Elite","block":"R","type":"Performance Drill","env":"Water","age":"12+","goal":"Land frontside straight air with absorption and ride away clean","cue":"Absorb and ride","constraint":"Landing must be silent (absorbed). Must ride away for 3+ seconds after landing. If bounces off, doesn't count.","success":"Clean absorbed landing. Rides away 3+ seconds. No bounce. No fall.","error":"Stiff landings causing falls","solution":"Absorb landing forces","reflection":"Was your landing quiet or loud? Did you ride away or bounce?","notes":"Fase 3 del Air System: LANDING. El aterrizaje es donde se gana o pierde el air."},{"id":"DRL-TEC-SAB-01","name":"Backside Air Approach","pillar":"Technical","part":"Straight Air Backside","seq":"Ramp Phase","level":"Functional to Elite","belt":"Functional to Elite","block":"R","type":"Ecological Drill","env":"Water","age":"14+","goal":"Build correct backside approach for straight air","cue":"Head turns, launch follows","constraint":"Head must turn to see lip before launching. BT generates speed into vertical section. APPROACH ONLY first.","success":"Reaches lip backside with speed and vision. Could launch.","error":"No launch ability backside","solution":"Backside ramp approach","reflection":"Could you see the lip before launching? Did your head lead?","notes":"El air backside requiere que la cabeza gire para ver el lip"},{"id":"DRL-TEC-SAB-02","name":"Backside Air Complete","pillar":"Technical","part":"Straight Air Backside","seq":"Full Air","level":"Functional to Elite","belt":"Functional to Elite","block":"R","type":"Elite Drill","env":"Water","age":"14+","goal":"Complete backside straight air: ramp-air-landing","cue":"Full sequence backside","constraint":"All 3 phases must be executed: approach with vision, controlled flight, absorbed landing + ride away.","success":"Complete backside air with ride away. All 3 phases clean.","error":"Incomplete backside airs","solution":"Full backside air sequence","reflection":"Which phase was weakest? Approach, flight, or landing?","notes":"Secuencia completa: approach → launch → control → spot → absorb → ride away"},{"id":"DRL-TEC-ARF-01","name":"Reverse 180 Rotation","pillar":"Technical","part":"Reverse Frontside","seq":"Air Phase","level":"Functional to Elite","belt":"Functional to Elite","block":"R","type":"Performance Drill","env":"Water","age":"14+","goal":"Complete 180° rotation in the air for frontside air reverse","cue":"Commit to the rotation","constraint":"Head leads 180° rotation. Must complete FULL rotation before landing. Under-rotation = doesnt count.","success":"Full 180° rotation. Lands facing original direction. Board under feet.","error":"Incomplete rotation on reverse","solution":"Commit to full 180 rotation","reflection":"Did you complete the full 180? Where did rotation slow down?","notes":"El compromiso con la rotacion es mental antes que fisico"},{"id":"DRL-TEC-ARF-02","name":"Reverse Landing Spot","pillar":"Technical","part":"Reverse Frontside","seq":"Landing Phase","level":"Functional to Elite","belt":"Functional to Elite","block":"R","type":"Mission Drill","env":"Water","age":"14+","goal":"Spot and absorb landing during frontside air reverse","cue":"See the landing","constraint":"Eyes must find landing surface DURING rotation, not after. Report what you saw post-attempt.","success":"Reports seeing landing surface during rotation. Landing absorbed and clean.","error":"Landing blind on reverses","solution":"Spot landing during rotation","reflection":"Did you see where you were landing before you landed?","notes":"Ver el aterrizaje durante la rotacion cambia todo"},{"id":"DRL-TEC-ARF-03","name":"Reverse Full Sequence","pillar":"Technical","part":"Reverse Frontside","seq":"Full Air","level":"Functional to Elite","belt":"Functional to Elite","block":"R","type":"Elite Drill","env":"Water","age":"14+","goal":"Execute complete frontside air reverse: approach-rotation-landing","cue":"Full reverse, ride away","constraint":"Approach → Full 180 rotation → Spot landing → Absorb → Ride away 3+ seconds.","success":"Full air reverse with ride away. Judge-worthy execution.","error":"Disconnected reverse phases","solution":"Complete reverse sequence","reflection":"On a 1-10 scale, how would you score that reverse? What lowers the score?","notes":"El air reverse completo es la maniobra que define el surfing moderno"},{"id":"DRL-TEC-B360-01","name":"360 Rotation Commitment","pillar":"Technical","part":"Backside 360 Air","seq":"Air Phase","level":"Pre-Elite to Elite","belt":"Pre-Elite to Elite","block":"R","type":"Elite Drill","env":"Water","age":"14+","goal":"Complete full 360° rotation in backside air","cue":"All the way around","constraint":"Head leads FULL 360° rotation. Must complete entire rotation. Landing on or near board.","success":"Full 360° rotation with landing on board. Even incomplete landing with full rotation counts initially.","error":"Under-rotating 360s","solution":"Full rotation commitment","reflection":"How far did you rotate? What stopped you from completing?","notes":"La maniobra mas dificil de rotacion aerea en el surfing"},{"id":"DRL-TEC-B360-02","name":"360 Dry-to-Wet Transfer","pillar":"Technical","part":"Backside 360 Air","seq":"Preparation","level":"Pre-Elite to Elite","belt":"Pre-Elite to Elite","block":"R","type":"Hybrid Drill","env":"Beach + Trampoline + Water","age":"14+","goal":"Transfer 360 rotation pattern from dry training to ocean execution","cue":"Same rotation, new surface","constraint":"Practice sequence: 5 dry rotations → 3 trampoline → Ocean attempts. Same cue word for all.","success":"Ocean 360 resembles dry/tramp version. Key movement pattern transferred.","error":"Cannot transfer dry 360 to water","solution":"Progressive transfer from dry to ocean","reflection":"What felt different from dry to water? What stayed the same?","notes":"El transfer de dry a wet es el puente mas importante del air training"},{"id":"DRL-TEC-MC-01","name":"2-Maneuver Combo","pillar":"Technical","part":"Cutback Frontside","seq":"Full Wave","level":"Emerging to Elite","belt":"Emerging to Elite","block":"H","type":"Mission Drill","env":"Water","age":"12+","goal":"Execute 2 connected maneuvers on one wave","cue":"First move sets up second","constraint":"Must execute exactly 2 maneuvers per wave. Second must connect to first. No pause between.","success":"2 maneuvers connected with flow. No speed loss between them.","error":"Only one maneuver per wave","solution":"Connect maneuvers in sequence","reflection":"Did the first maneuver set up the second? Or did you force it?","notes":"El surf competitivo requiere combinaciones, no maniobras aisladas"},{"id":"DRL-TEC-MC-02","name":"Section Reading & Select","pillar":"Technical","part":"Carve Frontside","seq":"Wave Ride","level":"Emerging to Elite","belt":"Emerging to Elite","block":"H","type":"Ecological Drill","env":"Water","age":"12+","goal":"Select correct maneuver based on wave section type","cue":"Read then react","constraint":"Coach calls section type (wall, closeout, bowl, ramp). Athlete must select and execute appropriate maneuver.","success":"Selects appropriate maneuver for section >70% of the time. Coach confirms.","error":"Wrong maneuver for wave section","solution":"Read section and choose correct maneuver","reflection":"Did you read the section correctly? What told you it was that type?","notes":"La lectura de seccion es el skill tactico mas importante de la fase de maniobras"},{"id":"DRL-TEC-MC-03","name":"3-Turn Wave","pillar":"Technical","part":"Reentry Frontside","seq":"Full Wave","level":"Functional to Elite","belt":"Functional to Elite","block":"H","type":"Elite Drill","env":"Water","age":"14+","goal":"Execute 3+ scoring maneuvers on a single wave","cue":"Build the score","constraint":"Minimum 3 maneuvers per wave. Each must be different. Must maintain flow and speed throughout.","success":"3+ maneuvers executed with variety, power, and flow on one wave.","error":"Low wave count in competition","solution":"Maximize maneuvers per wave","reflection":"Which maneuver was strongest? Which broke the flow?","notes":"Las mejores olas competitivas tienen 3+ maniobras de scoring"},{"id":"DRL-TEC-MC-04","name":"Backside Combo Builder","pillar":"Technical","part":"Cutback Backside","seq":"Full Wave","level":"Emerging to Elite","belt":"Emerging to Elite","block":"H","type":"Mission Drill","env":"Water","age":"12+","goal":"Execute 2+ connected maneuvers on backside wave","cue":"Backside combo","constraint":"2+ maneuvers on backside wave. Head must lead every transition. No frontside-only sessions.","success":"2+ backside maneuvers connected with flow. Head leads all transitions.","error":"No backside combinations","solution":"Build backside maneuver combos","reflection":"Was your backside combo as fluid as frontside? What limits you?","notes":"Las combinaciones backside son mas dificiles pero valen mas en competencia"},{"id":"DRL-TEC-MC-05","name":"Finishing Maneuver","pillar":"Technical","part":"Floater Frontside","seq":"End Section","level":"Emerging to Elite","belt":"Emerging to Elite","block":"H","type":"Performance Drill","env":"Water","age":"12+","goal":"End every wave with a deliberate finishing maneuver","cue":"Finish strong","constraint":"Every wave MUST end with a deliberate finishing move (closeout reentry, floater, claim-worthy turn). No fading out.","success":"Every wave ends with a committed finishing maneuver. No fadeouts.","error":"Wave ends without strong finish","solution":"Always finish with power","reflection":"How did you end your best wave? Your worst? What was different?","notes":"La ultima maniobra es la que el juez recuerda"},{"id":"DRL-TEC-MC-06","name":"Flow vs Power Decision","pillar":"Technical","part":"Carve Backside","seq":"Wave Ride","level":"Emerging to Elite","belt":"Emerging to Elite","block":"H","type":"Game Drill","env":"Water","age":"12+","goal":"Alternate between flow turns and power turns on same wave","cue":"Flow then power","constraint":"Wave must include at least 1 flow turn (carve/cutback) and 1 power turn (snap/reentry). Both required.","success":"Clear contrast between flow and power visible in same wave. Coach rates variety.","error":"No variety between flow and power","solution":"Mix flow and power surfing","reflection":"Could a judge see the difference between your flow and power turns?","notes":"El contraste flow/power es lo que hace surfing dinamico y competitivo"},{"id":"DRL-TEC-MC-07","name":"Progressive Building","pillar":"Technical","part":"Reentry Backside","seq":"Full Wave","level":"Functional to Elite","belt":"Functional to Elite","block":"H","type":"Elite Drill","env":"Water","age":"14+","goal":"Build wave progressively: each maneuver better than the last","cue":"Build, build, build","constraint":"Each maneuver must be MORE committed than the previous one. Coach rates progression 1-5.","success":"Clear progressive building visible. Last turn is the best turn. Coach rates 4+.","error":"Best maneuver happens first then declines","solution":"Build wave from good to great","reflection":"Was your last turn the best? Or did you peak too early?","notes":"Building = cada maniobra mejor que la anterior. Es lo que los jueces quieren ver."},{"id":"DRL-TEC-MC-08","name":"Scoring Wave Simulation","pillar":"Technical","part":"Floater Backside","seq":"Full Session","level":"Functional to Elite","belt":"Functional to Elite","block":"H","type":"Elite Drill","env":"Water","age":"14+","goal":"Execute a complete wave that would score 7+ in competition","cue":"Make it count","constraint":"Surf wave as if in final. Coach scores 1-10 using ISA/WSL criteria. Debrief after each wave.","success":"Consistently scores 6+ from coach. Understands why and how to improve.","error":"Dont know what a high-scoring wave looks like","solution":"Practice complete scoring waves","reflection":"What score would you give yourself? What was missing for a higher score?","notes":"Simular olas de scoring es la mejor preparacion competitiva"},{"id":"DRL-TEC-POW-001","name":"Power Stance Voice Command","pillar":"Technical","part":"Stance & Body Position","seq":"3-surfing","level":"All Levels","belt":"Cinta Blanca — Cinta Negra","block":"C","type":"Awareness Drill","env":"Water","age":"All","goal":"Student establishes and maintains proper power stance through vocal self-cueing at pop-up and maneuver completion","cue":"Shout 'POSTURA' loud and clear at pop-up and after each maneuver","constraint":"Student MUST verbalize 'POSTURA' out loud twice per wave: once at pop-up, once after completing any maneuver","success":"Coach hears verbal command on every wave AND observes: SHORTBOARD = shoulders forward, knees bent, back knee pointing forward | LONGBOARD = upright posture, shoulders forward aligned with nose, minimal knee bend, stylish","error":"Loss of power stance mid-wave, shoulders rotating open, weight shifting back, stance collapsing after maneuvers","solution":"Vocal self-cueing creates kinesthetic anchor, reinforcing muscle memory of power position at critical moments","reflection":"When you shouted 'POSTURA', what did you feel change in your body position and balance?","notes":"SHORTBOARD POWER STANCE: Shoulders square to direction of travel, knees deeply flexed, back knee pointed forward, compact athletic position. LONGBOARD POWER STANCE: Upright elegant posture, shoulders aligned with board nose, minimal knee bend, weight centered, stylish flow. The verbal command 'POSTURA' serves as an instant body-check reminder to reset proper positioning. Encourage students to make it a ritual habit."},{"id":"DRL-TAC-POC-001","name":"Hunt The Pocket Game","pillar":"Tactical","part":"Wave Reading & Positioning","seq":"3-surfing","level":"All Levels","belt":"Cinta Blanca — Cinta Negra","block":"H","type":"Ecological Drill","env":"Water","age":"All","goal":"Develop awareness and proximity to the pocket (power source) throughout the entire wave by personifying it and consciously navigating toward it.","cue":"Stay married to the pocket—always know where your power source lives","constraint":"Before paddling out, give the pocket a face and name; every maneuver must happen within arm's reach of the pocket or doesn't count","success":"Student can point out pocket location before dropping in, maintains visual/positional awareness throughout ride, and executes maneuvers in the critical section consistently","error":"Surfing too far on the shoulder, losing connection to power source, performing flat maneuvers away from the critical section","solution":"Personify the pocket to create emotional/visual anchor, practice conscious positioning relative to power zone, understand pocket = highest scoring potential","reflection":"Where was your pocket today and how close did you stay to it during your best wave?","notes":"Before session: Each surfer names their pocket (e.g. 'Thunder Zone,' 'El Jefe'). Coach reminds: 'The difference between good and elite surfers is pocket proximity.' Longboarders use pocket awareness to time nose rides; shortboarders use it to load compression for vertical attacks. Debrief focuses on % of wave spent in power zone."},{"id":"DRL-TEC-BT-001","name":"Tail Button Commitment","pillar":"Technical","part":"Back Foot Positioning","seq":"3-surfing","level":"Intermediate","belt":"Cinta Amarilla — Cinta Naranja","block":"E","type":"Repetition Drill","env":"Water","age":"12+","goal":"Execute 15 radical maneuvers with full back foot commitment on the tail button to increase real performance level","cue":"Back foot on tail button, no hesitation","constraint":"Every single wave must have back foot fully positioned on the tail button before initiating any maneuver","success":"15 waves with visible back foot on tail button AND maneuver executed in critical section (not flat) with observable spray or projection","error":"Back foot positioned in middle of board causing weak, flat maneuvers with no projection","solution":"Conscious, committed foot placement on tail button before engaging rail, creating leverage point for radical turns","reflection":"What difference did you feel in power and control when your back foot was fully committed on the tail versus in the middle?","notes":"30-40 minute session focused exclusively on back foot positioning. Coach counts only waves where foot commitment is clear and immediate. Mental component: train decisiveness—hesitation kills momentum. Tactical component: wait for critical section, avoid executing on flat sections where power is wasted. This drill bridges technical precision with mental commitment."},{"id":"DRL-TEC-BT-002","name":"Critical Tail Button Commitment","pillar":"Technical","part":"Bottom Turn Weight Transfer","seq":"3-surfing","level":"Advanced","belt":"Cinta Naranja — Cinta Negra","block":"E","type":"Mission Drill","env":"Water","age":"12+","goal":"Student executes 15 radical maneuvers with back foot fully committed to tail for maximum power and projection","cue":"Back foot on tail button, compress and explode","constraint":"Every wave must have back foot completely on the tail pad before initiating the turn, cannot surf flat sections","success":"15 completed maneuvers where back foot is visibly on tail pad, turn creates visible spray or lip hit, and occurs in critical section not flat water","error":"Surfing with neutral stance or front-foot bias, resulting in weak, drawn-out turns without power","solution":"Deliberate back-foot loading in critical sections generates compression-extension power cycle for radical projection","reflection":"How did moving your back foot all the way to the tail change the power and arc of your turns?","notes":"30-40 minute session focus. Coach counts only maneuvers where: 1) back foot fully back, 2) turn occurs in critical/steep section, 3) visible power/spray generated. Student must not hesitate or second-guess the back foot movement—commitment is non-negotiable. This drill bridges technical foot placement with tactical wave reading and mental decisiveness."},{"id":"DRL-TEC-COM-001","name":"Compacto Low Compression Hold","pillar":"Technical","part":"Compression & Extension","seq":"3-surfing","level":"Intermediate","belt":"Cinta Naranja — Cinta Roja","block":"E","type":"Mission Drill","env":"Water","age":"12+","goal":"Generate speed through sustained compression position until explosion moment","cue":"LOW","constraint":"Must maintain compressed stance until reaching designated explosion point on wave face","success":"Student maintains low compressed position with chest over front knee through 15+ waves, only extending at optimal moment without premature rising","error":"Standing up too early, losing speed by rising before reaching critical section","solution":"Compression-extension timing: stay compact in the power zone to load energy, explode only when transitioning to next maneuver","reflection":"At what exact moment on the wave did you feel maximum speed from your compression?","notes":"Session duration: 30-40 minutes. Target: 15-20 waves focused exclusively on compression hold. Coach watches for: knees bent, chest forward, hips low, shoulders relaxed. The 'explosion' is the transition to top turn or next maneuver—not random extension. Tactical component: staying on wave face prevents going up section too early."},{"id":"DRL-TAC-WU-001","name":"Stay on the Face Mission","pillar":"Tactical","part":"Wave Usage & Positioning","seq":"3-surfing","level":"Intermediate","belt":"Cinta Naranja — Cinta Verde","block":"E","type":"Mission Drill","env":"Water","age":"12+","goal":"Develop conscious awareness of external wave forces by maintaining position on the wave face without reaching the flat, maximizing speed generation from the wall.","cue":"Stay on the face, kiss the flat line","constraint":"Cannot reach the flat section of the wave—must stay on the steep face throughout entire ride","success":"Bottom turns touch the flat line but do not enter it; speed is maintained or increased throughout ride; no stalls or flat sections reached","error":"Losing speed by drifting too high into the flat section of the wave","solution":"Using the wave face as an external force source—staying in the power pocket where gravity and wave push combine","reflection":"Where did you feel the wave pushing you most? When did you almost reach the flat?","notes":"This drill builds awareness of 'external usage' (uso externo): the wave face, foam, and wind as allies. Focus is not on radical maneuvers but on conscious positioning. Coach should watch for students drifting into flat sections and losing momentum. Ideal for surfers transitioning from survival mode to tactical wave reading."},{"id":"DRL-MEN-VIS-001","name":"Full Wave Mental Rehearsal","pillar":"Mental","part":"Visualization & Mental Imagery","seq":"1-pre surf","level":"All Levels","belt":"Cinta Blanca — Cinta Negra","block":"A","type":"Mental Drill","env":"Beach","age":"All","goal":"Execute a complete wave sequence mentally with full sensory immersion to build neural pathways and automate technical movements before entering the water","cue":"Breathe with the wave, see every detail, feel every movement","constraint":"Must perform full physical movements in real-time speed while maintaining vivid mental imagery of chosen wave type (beach break or point break)","success":"Student completes full sequence with eyes closed, synchronized breathing, real physical effort visible (sweating, elevated heart rate), and can describe 3+ sensory details afterward (water temperature, wind direction, sound of wave)","error":"Disconnection between mental preparation and physical execution, robotic movements without feeling, poor muscle memory automation","solution":"Multi-sensory visualization with physical rehearsal builds neural pathways identical to real surfing, creating automatic response patterns and technical confidence","reflection":"What did you smell, hear, and feel during your best turn in that mental wave? Can you recreate that sensation right now?","notes":"Coach setup: Have student choose their target wave (beach break power section vs point break wall). Stand and physically perform the ENTIRE wave sequence from paddle position on sand. Must include: arm paddling with effort, explosive pop-up, compressed stance movements, turning mechanics, breathing rhythm with wave sections. Eyes closed or soft focus. Coach watches for genuine physical commitment and real-time execution speed. Minimum 3 rounds. Best done immediately before paddling out or during technical training blocks to reinforce specific movements."},{"id":"DRL-TEC-HLD-001","name":"Hold & Maintain Position Mastery","pillar":"Technical","part":"Body Position & Timing","seq":"3-surfing","level":"Intermediate","belt":"Cinta Amarilla — Cinta Negra","block":"E","type":"Awareness Drill","env":"Water","age":"12+","goal":"Develop timing, energy efficiency, and postural control by consciously holding key surf positions longer than instinct suggests, maximizing speed generation through patience rather than constant movement.","cue":"Lock the position, let the wave do the work","constraint":"Student must audibly count 3-5 seconds while holding each critical position (bottom turn rail engagement, cutback rotation, tube crouch, hang five) before transitioning to next movement","success":"Student maintains compact posture through entire hold duration without premature weight shifts, demonstrates visible speed increase coming out of held positions, and can verbally identify the moment wave energy shifted requiring position change","error":"Over-surfing: constant unnecessary movement that breaks flow and bleeds speed","solution":"Teach stillness between movements - understanding that holding proper position allows external forces (wave, gravity, momentum) to generate speed while internal energy is conserved","reflection":"In which held position did you feel the most speed building, and what told you it was time to transition to the next movement?","notes":"Coach should emphasize this is counter-intuitive training - surfing culture often celebrates constant motion, but elite surfers master the art of strategic stillness. Video review is powerful here to show speed differential. Works exceptionally well for longboard hangs and noserides. Can be combined with oblique engagement cues during holds. Best practiced in consistent, predictable waves where student can plan hold sequences."},{"id":"DRL-MEN-FUN-001","name":"Destrucción Divertida","pillar":"Mental","part":"Competitive Mindset","seq":"3-surfing","level":"Intermediate","belt":"Cinta Naranja — Cinta Negra","block":"H","type":"Mental Drill","env":"Water","age":"12+","goal":"Desarrollar una mentalidad que balancee disfrute genuino con agresividad competitiva para maximizar performance bajo presión","cue":"Sonríe mientras atacas","constraint":"Cada ola requiere: 1 grito de celebración + mínimo 3 maniobras agresivas con velocidad máxima","success":"El surfista mantiene expresión facial positiva mientras ejecuta maniobras con máxima potencia y compromiso radical","error":"Mentalidad demasiado seria o tensa que reduce fluidez y creatividad en competencia","solution":"Asociar placer genuino con ejecución agresiva para crear estado mental óptimo de flow competitivo","reflection":"¿Cómo cambió tu surfing cuando dejaste de pensar en el resultado y te enfocaste en destruir la ola con alegría?","notes":"Coach debe observar lenguaje corporal post-maniobra. La verdadera integración ocurre cuando el surfista naturalmente celebra sus propias maniobras destructivas. Usar música energética pre-sesión. Filmar para que el surfista vea su propia expresión facial."},{"id":"DRL-TEC-BT-003","name":"Draw the U Bottom Turn","pillar":"Technical","part":"Bottom Turn","seq":"3-surfing","level":"All Levels","belt":"Cinta Amarilla — Cinta Negra Elite","block":"D","type":"Awareness Drill","env":"Water","age":"All","goal":"Student learns to intentionally draw different sized U-shaped bottom turns to position precisely in the pocket for any maneuver, improving timing and impact point control.","cue":"Draw the U size you need, not the maneuver you want","constraint":"Student must verbally announce U size (small/medium/large) before drop and focus only on completing the bottom turn arc, not the top turn or maneuver after","success":"Coach observes student completing the announced U-size bottom turn and arriving in the pocket at the correct depth and angle, regardless of what happens after","error":"Rushing through bottom turn to get to the maneuver, resulting in poor positioning, missed pocket, and reduced power","solution":"Separating bottom turn execution from maneuver outcome by focusing on drawing the correct U-shape for wave positioning and timing","reflection":"What size U did your wave require today, and how did changing the U-size affect where you landed in the pocket?","notes":"For longboarders: emphasize how small U positions for hang-five/ten vs medium U for cutbacks. For shortboarders: connect U-size to speed generation. Coach should call out U-size before student drops until pattern is internalized. Focus 100% on bottom turn quality, not what happens after."}];

function filter() {
  const pillar = document.getElementById('f-pillar').value;
  const level = document.getElementById('f-level').value;
  const block = document.getElementById('f-block').value;
  const type = document.getElementById('f-type').value;
  const env = document.getElementById('f-env').value;
  const search = document.getElementById('f-search').value.toLowerCase();

  const filtered = DRILLS.filter(d => {
    if (pillar && d.pillar !== pillar) return false;
    if (level && d.level !== level) return false;
    if (block && d.block !== block) return false;
    if (type && d.type !== type) return false;
    if (env && !d.env.toLowerCase().includes(env.toLowerCase())) return false;
    if (search) {
      const hay = [d.name,d.goal,d.cue,d.id,d.part,d.notes,d.error,d.solution].join(' ').toLowerCase();
      if (!hay.includes(search)) return false;
    }
    return true;
  });

  document.getElementById('stats').innerHTML = `<span>Showing <strong>${filtered.length}</strong> of ${DRILLS.length} drills</span>` +
    (pillar ? `<span>Pillar: <strong>${pillar}</strong></span>` : '') +
    (block ? `<span>Block: <strong>${block}</strong></span>` : '');

  const list = document.getElementById('list');
  if (filtered.length === 0) { list.innerHTML = '<div class="empty">No drills match your filters</div>'; return; }

  list.innerHTML = filtered.map((d, i) => `
    <div class="drill" onclick="this.classList.toggle('expanded')">
      <div class="drill__top">
        <div>
          <div class="drill__name">${d.name}</div>
          <div class="drill__tags">
            <span class="tag tag--pillar">${d.pillar}</span>
            ${d.block ? '<span class="tag tag--block">Block '+d.block+'</span>' : ''}
            <span class="tag tag--level">${d.level}</span>
            <span class="tag tag--type">${d.type}</span>
            <span class="tag tag--env">${d.env}</span>
          </div>
        </div>
        <span class="drill__id">${d.id}</span>
      </div>
      <div class="drill__detail">
        <div class="detail-grid">
          <div class="detail-item detail-full"><label>Goal</label><p>${d.goal || '—'}</p></div>
          <div class="detail-item"><label>Key Cue</label><p>${d.cue || '—'}</p></div>
          <div class="detail-item"><label>Belt Range</label><p>${d.belt || '—'}</p></div>
          <div class="detail-item detail-full"><label>Constraint</label><p>${d.constraint || '—'}</p></div>
          <div class="detail-item"><label>Success Indicator</label><p>${d.success || '—'}</p></div>
          <div class="detail-item"><label>Related Error</label><p>${d.error || '—'}</p></div>
          <div class="detail-item"><label>Solution</label><p>${d.solution || '—'}</p></div>
          <div class="detail-item"><label>Reflection Question</label><p>${d.reflection || '—'}</p></div>
          ${d.notes ? '<div class="detail-item detail-full"><label>Coach Notes</label><p>'+d.notes+'</p></div>' : ''}
        </div>
      </div>
    </div>
  `).join('');
}

filter();
</script>
