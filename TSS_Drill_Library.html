<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#060e1a;color:#e0e0e0;min-height:100vh}
.header{padding:20px 24px;background:#0A1628;border-bottom:1px solid rgba(90,195,231,.1)}
.header h1{font-size:1.3rem;font-weight:800;color:#fff}
.header h1 span{color:#5AC3E7}
.header p{font-size:.82rem;color:rgba(255,255,255,.4);margin-top:4px}
.filters{padding:16px 24px;background:#0d1a2e;border-bottom:1px solid rgba(90,195,231,.06);display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.filters select,.filters input{padding:8px 12px;border:1px solid rgba(90,195,231,.15);border-radius:6px;background:rgba(255,255,255,.04);color:#fff;font-size:.82rem;font-family:inherit}
.filters select{min-width:130px}
.filters input{flex:1;min-width:200px}
.filters select:focus,.filters input:focus{outline:none;border-color:#5AC3E7}
.stats{padding:12px 24px;background:rgba(90,195,231,.03);font-size:.78rem;color:rgba(255,255,255,.3);display:flex;gap:16px}
.stats strong{color:#5AC3E7}
.list{padding:12px 24px;overflow-y:auto;max-height:calc(100vh - 200px)}
.drill{background:#0d1a2e;border:1px solid rgba(90,195,231,.06);border-radius:10px;padding:16px 20px;margin-bottom:8px;cursor:pointer;transition:all .2s}
.drill:hover{border-color:rgba(90,195,231,.2);background:#112240}
.drill.expanded{border-color:#5AC3E7;background:#112240}
.drill__top{display:flex;justify-content:space-between;align-items:center;gap:12px}
.drill__name{font-weight:700;font-size:.95rem;color:#fff}
.drill__id{font-size:.7rem;color:#5AC3E7;font-family:monospace;background:rgba(90,195,231,.08);padding:2px 8px;border-radius:4px}
.drill__tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:6px}
.tag{padding:2px 8px;border-radius:4px;font-size:.68rem;font-weight:600}
.tag--pillar{background:rgba(90,195,231,.1);color:#5AC3E7}
.tag--level{background:rgba(255,209,102,.1);color:#FFD166}
.tag--block{background:rgba(123,79,190,.1);color:#7B4FBE}
.tag--type{background:rgba(6,214,160,.1);color:#06D6A0}
.tag--env{background:rgba(255,107,107,.1);color:#FF6B6B}
.drill__detail{display:none;margin-top:14px;padding-top:14px;border-top:1px solid rgba(90,195,231,.08)}
.drill.expanded .drill__detail{display:block}
.detail-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.detail-item{padding:10px 12px;border-radius:6px;background:rgba(255,255,255,.02)}
.detail-item label{display:block;font-size:.68rem;color:#5AC3E7;font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:2px}
.detail-item p{font-size:.82rem;color:rgba(255,255,255,.6);line-height:1.5}
.detail-full{grid-column:1/-1}
.empty{text-align:center;padding:60px;color:rgba(255,255,255,.2);font-size:1.1rem}
@media(max-width:768px){.filters{flex-direction:column}.detail-grid{grid-template-columns:1fr}.drill__top{flex-direction:column;align-items:flex-start}}
</style>
</head>

inta Amarilla","block":"B","type":"Game Drill","env":"Water","age":"Kids","goal":"Prevent collisions and teach awareness","cue":"Scan 2 seconds","constraint":"Identify and explain all priority rules before entering. Quiz format.","success":"Correctly identifies priority in 5/5 scenarios presented by coach.","error":"Paddling without checking surroundings","solution":"Scan before paddling","reflection":"Did you give or receive priority today? Was it correct?","notes":"Before every paddle: student must turn head L/R for 2 seconds. If they forget, they sit one wave and restart."},{"id":"DRL-VA-001","name":"Safe vs Danger Zones (Map It)","pillar":"Safety","part":"Venue Analysis","seq":"1- pre surf","level":"Beginner","belt":"Cinta Blanca — Cinta Amarilla","block":"B","type":"Game Drill","env":"Beach","age":"All","goal":"Make the student “see” hazards and channels","cue":"Look before you go","constraint":"Spend 5 min observing before entering. Identify: currents, peaks, hazards, crowd.","success":"Identifies 4/4 key elements (current, peak, hazard, crowd) correctly.","error":"Entering the water in the wrong spot","solution":"Identify safe entry and exit","reflection":"What did you see that surprised you? Did conditions change during the session?","notes":"Student points: entry, exit, impact zone, channel. Coach corrects with simple labels (SAFE / DANGER)."},{"id":"DRL-VA-002","name":"Entry/Exit Verbal Plan","pillar":"Safety","part":"Venue Analysis","seq":"1- pre surf","level":"Beginner","belt":"Cinta Blanca — Cinta Amarilla","block":"B","type":"Mission Drill","env":"Beach","age":"All","goal":"Force a clear plan before action","cue":"Say it before you go","constraint":"Spend 5 min observing before entering. Identify: currents, peaks, hazards, crowd.","success":"Identifies 4/4 key elements (current, peak, hazard, crowd) correctly.","error":"Automatic entry without planning","solution":"Plan entry before paddling","reflection":"What did you see that surprised you? Did conditions change during the session?","notes":"Student must say: “I enter here, exit there.” If they can’t, they wait and watch 2 sets first."},{"id":"DRL-VA-003","name":"3-Set Observation Challenge","pillar":"Safety","part":"Venue Analysis","seq":"1- pre surf","level":"Beginner","belt":"Cinta Blanca — Cinta Amarilla","block":"B","type":"Game Drill","env":"Beach","age":"Teens","goal":"Train patience + timing","cue":"Watch 3 sets","constraint":"Spend 5 min observing before entering. Identify: currents, peaks, hazards, crowd.","success":"Identifies 4/4 key elements (current, peak, hazard, crowd) correctly.","error":"Entering without reading sets","solution":"Read sets before entering","reflection":"What did you see that surprised you? Did conditions change during the session?","notes":"Student must count 3 sets and call “go window” (a calmer moment). Coach keeps it simple: “We enter on the window.”"},{"id":"DRL-MN-001","name":"One Goal Declaration","pillar":"Mental","part":"Goal Setting","seq":"1- pre surf","level":"Beginner","belt":"Cinta Blanca — Cinta Amarilla","block":"A","type":"Mission Drill","env":"Beach","age":"All","goal":"Create one clear objective per session","cue":"One goal only","constraint":"Write one specific goal before session. Must be measurable and achievable today.","success":"Goal is specific, measurable, and coach confirms alignment with current level.","error":"Surfing without a clear focus","solution":"Define session goal","reflection":"Did you achieve your goal? Was it the right goal for today?","notes":"Student says ONE goal in one sentence. Coach rejects vague goals and helps rewrite it (simple + measurable)."},{"id":"DRL-MN-002","name":"Attempt Counts (Process Points)","pillar":"Mental","part":"Goal Setting","seq":"2- going out and catching waves","level":"Beginner","belt":"Cinta Blanca — Cinta Amarilla","block":"A","type":"Game Drill","env":"Water","age":"All","goal":"Reduce pressure and increase reps","cue":"Attempt = point","constraint":"Write one specific goal before session. Must be measurable and achievable today.","success":"Goal is specific, measurable, and coach confirms alignment with current level.","error":"Frustration due to results","solution":"Focus on attempt, not outcome","reflection":"Did you achieve your goal? Was it the right goal for today?","notes":"Scoring: 1 point for every real attempt at the goal. No points for “random surfing”. Keeps focus tight."},{"id":"DRL-MN-003","name":"Goal Recall Tap","pillar":"Mental","part":"Goal Setting","seq":"2- going out and catching waves","level":"Beginner","belt":"Cinta Blanca — Cinta Amarilla","block":"A","type":"Awareness Drill","env":"Water","age":"Adults","goal":"Re-center attention during session","cue":"“What’s your goal?”","constraint":"Write one specific goal before session. Must be measurable and achievable today.","success":"Goal is specific, measurable, and coach confirms alignment with current level.","error":"Forgetting the session focus","solution":"Recall goal mid-session","reflection":"Did you achieve your goal? Was it the right goal for today?","notes":"Coach asks randomly. If student can’t answer instantly, they stop, breathe once, repeat goal, then continue."},{"id":"DRL-SSP-010","name":"Sweet Spot Reps","pillar":"Technical","part":"Sweet Spot","seq":"2- going out and catching waves","level":"Beginner","belt":"Cinta Blanca — Cinta Amarilla","block":"C","type":"Repetition Drill","env":"Water","age":"All","goal":"Find and hold sweet spot consistently","cue":"Chest up, weight centered","constraint":"Focus on correcting: Board nose sinking or tail dragging. Use cue 'Chest up, weight centered' before each attempt.","success":"Demonstrates: Find and hold sweet spot consistently. Consistent execution in 3+ consecutive attempts.","error":"Board nose sinking or tail dragging","solution":"Correct body positioning","reflection":"Where did you feel most stable on the board? Where did it feel wrong?","notes":"Enter water. Paddle 10 times holding correct sweet spot. If board sinks or drags → restart rep count."},{"id":"DRL-SSP-011","name":"Arrow Paddle Sets","pillar":"Technical","part":"Sweet Spot","seq":"2- going out and catching waves","level":"Beginner","belt":"Cinta Blanca — Cinta Amarilla","block":"C","type":"Repetition Drill","env":"Water","age":"All","goal":"Reduce drag and improve glide","cue":"Legs together like an arrow","constraint":"Focus on correcting: Legs open. Use cue 'Legs together like an arrow' before each attempt.","success":"Demonstrates: Reduce drag and improve glide. Consistent execution in 3+ consecutive attempts.","error":"Legs open","solution":"Legs together","reflection":"Where did you feel most stable on the board? Where did it feel wrong?","notes":"3 sets of 8 paddle strokes with ankles together. Coach only cues if legs separate."},{"id":"DRL-PHY-010","name":"Warm-Up Surf Flow","pillar":"Physical","part":"Warm Up","seq":"1- pre surf","level":"Beginner","belt":"Cinta Blanca — Cinta Amarilla","block":"B","type":"Repetition Drill","env":"Beach","age":"All","goal":"Prepare joints and muscles","cue":"Flow, don’t rush","constraint":"Complete full warm-up sequence before any water activity. No shortcuts.","success":"Full ROM achieved, HR elevated appropriately, athlete reports readiness.","error":"Entering cold or stiff","solution":"Surf-specific warm-up","reflection":"Did the warm-up prepare you? What did your body need more of?","notes":"3 rounds of full-body surf warm-up. Coach checks rhythm, not speed."},{"id":"DRL-WU-KID-001","name":"Animal Warm-Up Flow","pillar":"Physical","part":"Warm Up","seq":"1- pre surf","level":"Beginner","belt":"Cinta Blanca — Cinta Amarilla","block":"B","type":"Game Drill","env":"Beach","age":"Kids","goal":"Heat the body in a fun and natural way","cue":"Move like the animal","constraint":"Complete full warm-up sequence before any water activity. No shortcuts.","success":"Full ROM achieved, HR elevated appropriately, athlete reports readiness.","error":"Entering cold or stiff","solution":"Surf-specific warm-up","reflection":"Did the warm-up prepare you? What did your body need more of?","notes":"5–8 minutes continuous flow. Movements: Frog jumps (rana), Gorilla walk (gorilla), Tiger crawl (tigre), Pop-up reps. Keep moving until warm."},{"id":"DRL-WU-KID-002","name":"Frog to Pop-Up","pillar":"Physical","part":"Warm Up","seq":"1- pre surf","level":"Beginner","belt":"Cinta Blanca — Cinta Amarilla","block":"B","type":"Game Drill","env":"Beach","age":"Kids","goal":"Warm legs and connect to surf movement","cue":"Frog → pop up","constraint":"Complete full warm-up sequence before any water activity. No shortcuts.","success":"Full ROM achieved, HR elevated appropriately, athlete reports readiness.","error":"Cold body and slow reactions","solution":"Activate legs and pop-up pattern","reflection":"Did the warm-up prepare you? What did your body need more of?","notes":"Kids start as frogs, jump forward, then perform one pop-up. Repeat continuously for 5 minutes."},{"id":"DRL-WU-KID-003","name":"Animal Circuit","pillar":"Physical","part":"Warm Up","seq":"1- pre surf","level":"Beginner","belt":"Cinta Blanca — Cinta Amarilla","block":"B","type":"Game Drill","env":"Beach","age":"Kids","goal":"Activate whole body naturally","cue":"Flow, don’t stop","constraint":"Complete full warm-up sequence before any water activity. No shortcuts.","success":"Full ROM achieved, HR elevated appropriately, athlete reports readiness.","error":"Lack of coordination","solution":"Warm full body with play","reflection":"Did the warm-up prepare you? What did your body need more of?","notes":"Set a circle: Gorilla walk → Tiger crawl → Frog jump → Pop-up. Rotate nonstop until kids are warm."},{"id":"DRL-WU-ADT-001","name":"Natural Flow 4 Moves","pillar":"Physical","part":"Warm Up","seq":"1- pre surf","level":"Beginner","belt":"Cinta Blanca — Cinta Amarilla","block":"B","type":"Flow Drill","env":"Beach","age":"Adults","goal":"Create mobility and flow","cue":"Base position flow","constraint":"Complete full warm-up sequence before any water activity. No shortcuts.","success":"Full ROM achieved, HR elevated appropriately, athlete reports readiness.","error":"Stiff body before surf","solution":"Fluid surf warm-up","reflection":"Did the warm-up prepare you? What did your body need more of?","notes":"4 connected movements: Base surf stance → Swing rotation → Sun salutation → Frog squat with kick. 2–3 slow rounds."},{"id":"DRL-WU-ADT-002","name":"Surf Mobility Flow","pillar":"Physical","part":"Warm Up","seq":"1- pre surf","level":"All Levels","belt":"Todas las Cintas","block":"B","type":"Flow Drill","env":"Beach","age":"Adults","goal":"Prepare body for surfing","cue":"Smooth and breathe","constraint":"Complete full warm-up sequence before any water activity. No shortcuts.","success":"Full ROM achieved, HR elevated appropriately, athlete reports readiness.","error":"Entering water tight","solution":"Activate joints with flow","reflection":"Did the warm-up prepare you? What did your body need more of?","notes":"Coach emphasizes smooth transitions and breathing, not speed. Entire flow lasts ~6 minutes."},{"id":"DRL-WU-HTT-001","name":"Head to Toe Zen Swing","pillar":"Physical","part":"Warm Up","seq":"1- pre surf","level":"All Levels","belt":"Todas las Cintas","block":"B","type":"Flow Drill","env":"Beach","age":"All","goal":"Warm every joint progressively","cue":"Start at the neck","constraint":"Complete full warm-up sequence before any water activity. No shortcuts.","success":"Full ROM achieved, HR elevated appropriately, athlete reports readiness.","error":"Global stiffness","solution":"Head-to-toe activation","reflection":"Did the warm-up prepare you? What did your body need more of?","notes":"Start at neck rotations → shoulders → spine swing (zen swing) → hips → knees → ankles. Slow, continuous, conscious."},{"id":"DRL-WU-HTT-002","name":"Progressive Body Scan Flow","pillar":"Physical","part":"Warm Up","seq":"1- pre surf","level":"All Levels","belt":"Todas las Cintas","block":"B","type":"Awareness Drill","env":"Beach","age":"Adults","goal":"Connect mind and body","cue":"Breathe and move","constraint":"Complete full warm-up sequence before any water activity. No shortcuts.","success":"Full ROM achieved, HR elevated appropriately, athlete reports readiness.","error":"Lack of body awareness","solution":"Activate body awareness","reflection":"Did the warm-up prepare you? What did your body need more of?","notes":"Coach names the body part being moved. One breath per movement. Ends with light pop-ups."},{"id":"DRL-PH-WU-01","name":"Animal Flow Warm Up (Kids)","pillar":"Physical","part":"Warm Up","seq":"Preparation","level":"Beginner","belt":"Cinta Blanca — Cinta Amarilla","block":"B","type":"Game Drill","env":"Beach","age":"Kids (5–10)","goal":"Increase body temperature and coordination","cue":"Move like animals","constraint":"Complete full warm-up sequence before any water activity. No shortcuts.","success":"Full ROM achieved, HR elevated appropriately, athlete reports readiness.","error":"Block cold body / low focus","solution":"Natural animal-based warm up","reflection":"Did the warm-up prepare you? What did your body need more of?","notes":"Frog jumps, bear walk, gorilla walk, tiger crawl for 5–8 min"},{"id":"DRL-PH-WU-02","name":"Natural Flow Warm Up (Adults)","pillar":"Physical","part":"Warm Up","seq":"Preparation","level":"All Levels","belt":"Todas las Cintas","block":"B","type":"Flow Drill","env":"Beach","age":"Adults (16+)","goal":"Prepare joints and nervous system","cue":"Breathe and flow","constraint":"Complete full warm-up sequence before any water activity. No shortcuts.","success":"Full ROM achieved, HR elevated appropriately, athlete reports readiness.","error":"Stiff movement pattern","solution":"Connected surf flow warm up","reflection":"Did the warm-up prepare you? What did your body need more of?","notes":"Base position swing → sun salutation → frog kick → pop-up flow"},{"id":"DRL-PH-WU-03","name":"Head to Toe Activation","pillar":"Physical","part":"Warm Up","seq":"Preparation","level":"All Levels","belt":"Todas las Cintas","block":"B","type":"Performance Drill","env":"Beach","age":"All Ages","goal":"Prepare joints from neck to ankles","cue":"Smooth swing","constraint":"Complete full warm-up sequence before any water activity. No shortcuts.","success":"Full ROM achieved, HR elevated appropriately, athlete reports readiness.","error":"Disconnected body awareness","solution":"Full body activation","reflection":"Did the warm-up prepare you? What did your body need more of?","notes":"Start from neck, shoulders, spine, hips, knees, ankles"},{"id":"DRL-TE-GB-01","name":"Board Carry Reps","pillar":"Technical","part":"Grab Board","seq":"Preparation","level":"Beginner","belt":"Cinta Blanca — Cinta Amarilla","block":"B","type":"Performance Drill","env":"Beach","age":"All Ages","goal":"Control board at all times","cue":"Board under arm","constraint":"Focus on correcting: Holding board incorrectly. Use cue 'Board under arm' before each attempt.","success":"Demonstrates: Control board at all times. Consistent execution in 3+ consecutive attempts.","error":"Holding board incorrectly","solution":"Proper board carry","reflection":"Did you enter the water safely and efficiently?","notes":"Carry board 10 reps without rails touching body"},{"id":"DRL-TE-WO-01","name":"Controlled Entry Reps","pillar":"Technical","part":"Walk Out","seq":"Preparation","level":"Beginner","belt":"Cinta Blanca — Cinta Amarilla","block":"B","type":"Performance Drill","env":"Shallow Water","age":"All Ages","goal":"Enter water safely and with intention","cue":"Board protects","constraint":"Focus on correcting: Losing control in shallow water. Use cue 'Board protects' before each attempt.","success":"Demonstrates: Enter water safely and with intention. Consistent execution in 3+ consecutive attempts.","error":"Losing control in shallow water","solution":"Controlled entry"," ess":"Demonstrates: Stable foam entry. Consistent execution in 3+ consecutive attempts.","error":"Approaching without control","solution":"Control speed before floater","reflection":"Did you stay above the lip? Was your landing centered and stable?","notes":""},{"id":"DRL-FLB-02","name":"Posture on Foam","pillar":"Technical","part":"Floater Backside","seq":"Maneuver","level":"Advanced","belt":"Cinta Morada — Cinta Café","block":"G","type":"Performance Drill","env":"Water","age":"12+","goal":"Balance on foam","cue":"Posture first","constraint":"Focus on correcting: Hitting foam without posture. Use cue 'Posture first' before each attempt.","success":"Demonstrates: Balance on foam. Consistent execution in 3+ consecutive attempts.","error":"Hitting foam without posture","solution":"Enter power stance","reflection":"Did you stay above the lip? Was your landing centered and stable?","notes":""},{"id":"DRL-FLB-03","name":"Light Rail Hold","pillar":"Technical","part":"Floater Backside","seq":"Maneuver","level":"Advanced","belt":"Cinta Morada — Cinta Café","block":"G","type":"Game Drill","env":"Water","age":"12+","goal":"Board guidance","cue":"Hold the rail","constraint":"Focus on correcting: Sliding on foam. Use cue 'Hold the rail' before each attempt.","success":"Demonstrates: Board guidance. Consistent execution in 3+ consecutive attempts.","error":"Sliding on foam","solution":"Maintain light rail hold","reflection":"Did you stay above the lip? Was your landing centered and stable?","notes":""},{"id":"DRL-FLB-04","name":"Back Foot Support","pillar":"Technical","part":"Floater Backside","seq":"Maneuver","level":"Advanced","belt":"Cinta Morada — Cinta Café","block":"G","type":"Performance Drill","env":"Water","age":"12+","goal":"Stability","cue":"Back foot back","constraint":"Focus on correcting: Back foot too far forward. Use cue 'Back foot back' before each attempt.","success":"Demonstrates: Stability. Consistent execution in 3+ consecutive attempts.","error":"Back foot
