<head>

<title>TSS Sequence Coach Tool — Errors, Corrections & Performance Standards</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Segoe UI',system-ui,sans-serif;background:#060e1a;color:#e0e0e0;min-height:100vh}
.header{padding:20px 24px;background:#0A1628;border-bottom:1px solid rgba(90,195,231,.1)}
.header h1{font-size:1.3rem;font-weight:800;color:#fff}.header h1 span{color:#5AC3E7}
.header p{font-size:.82rem;color:rgba(255,255,255,.4);margin-top:4px}
.controls{padding:16px 24px;background:#0d1a2e;border-bottom:1px solid rgba(90,195,231,.06);display:flex;gap:10px;flex-wrap:wrap;align-items:center}
.controls select{padding:10px 14px;border:1px solid rgba(90,195,231,.15);border-radius:8px;background:rgba(255,255,255,.04);color:#fff;font-size:.88rem;font-family:inherit;min-width:180px}
.controls select:focus{outline:none;border-color:#5AC3E7}
.controls input{padding:10px 14px;border:1px solid rgba(90,195,231,.15);border-radius:8px;background:rgba(255,255,255,.04);color:#fff;font-size:.85rem;font-family:inherit;flex:1;min-width:200px}
.stats-bar{padding:10px 24px;background:rgba(90,195,231,.02);font-size:.78rem;color:rgba(255,255,255,.3);display:flex;gap:16px;border-bottom:1px solid rgba(90,195,231,.04)}
.stats-bar strong{color:#5AC3E7}
.content{padding:16px 24px;overflow-y:auto;max-height:calc(100vh - 190px)}
/* Tabs */
.tabs{display:flex;gap:4px;margin-bottom:20px}
.tab{padding:8px 20px;border-radius:8px 8px 0 0;background:rgba(255,255,255,.03);color:rgba(255,255,255,.4);font-size:.85rem;font-weight:600;cursor:pointer;border:1px solid rgba(90,195,231,.06);border-bottom:none;transition:all .2s}
.tab.active{background:#0d1a2e;color:#5AC3E7;border-color:rgba(90,195,231,.15)}
/* Sequence steps */
.seq-group{margin-bottom:24px}
.seq-group__title{font-size:1rem;font-weight:700;color:#5AC3E7;margin-bottom:12px;padding:8px 12px;background:rgba(90,195,231,.04);border-radius:8px;display:flex;justify-content:space-between}
.step{background:#0d1a2e;border:1px solid rgba(90,195,231,.06);border-radius:10px;margin-bottom:6px;overflow:hidden;transition:all .2s}
.step:hover{border-color:rgba(90,195,231,.15)}
.step__header{padding:12px 16px;display:flex;align-items:center;gap:12px;cursor:pointer}
.step__num{width:28px;height:28px;border-radius:50%;background:rgba(90,195,231,.08);display:flex;align-items:center;justify-content:center;font-weight:700;font-size:.8rem;color:#5AC3E7;flex-shrink:0}
.step__name{font-weight:600;font-size:.9rem;color:#fff;flex:1}
.step__belt{font-size:.65rem;padding:2px 8px;border-radius:4px;font-weight:600}
.step__expand{color:rgba(255,255,255,.2);font-size:.8rem;transition:transform .2s}
.step.open .step__expand{transform:rotate(90deg)}
.step__body{display:none;padding:0 16px 16px;border-top:1px solid rgba(90,195,231,.04)}
.step.open .step__body{display:block}
.step__section{margin-top:12px}
.step__section-title{font-size:.7rem;font-weight:600;color:#5AC3E7;text-transform:uppercase;letter-spacing:.08em;margin-bottom:6px}
.expect-box{padding:10px 14px;border-radius:8px;background:rgba(6,214,160,.04);border-left:3px solid #06D6A0;font-size:.85rem;color:rgba(255,255,255,.7);line-height:1.6}
.error-item{padding:8px 12px;border-radius:6px;background:rgba(255,107,107,.04);border-left:3px solid #FF6B6B;margin-bottom:6px}
.error-item .err{font-size:.85rem;color:#FF6B6B;font-weight:600}
.error-item .sol{font-size:.82rem;color:#06D6A0;margin-top:2px}
.error-item .note{font-size:.75rem;color:rgba(255,255,255,.3);margin-top:2px}
/* Difficulty cards */
.diff-card{background:#0d1a2e;border:1px solid rgba(90,195,231,.06);border-radius:12px;padding:20px;margin-bottom:12px;cursor:pointer;transition:all .2s}
.diff-card:hover{border-color:rgba(90,195,231,.15);background:#112240}
.diff-card__top{display:flex;justify-content:space-between;align-items:center}
.diff-card__num{font-family:monospace;font-size:.8rem;color:#5AC3E7;background:rgba(90,195,231,.08);padding:2px 10px;border-radius:4px}
.diff-card__priority{font-size:.7rem;font-weight:600;padding:3px 10px;border-radius:4px}
.diff-card__priority.p1{background:rgba(255,107,107,.1);color:#FF6B6B}
.diff-card__priority.p2{background:rgba(255,209,102,.1);color:#FFD166}
.diff-card__priority.p3{background:rgba(90,195,231,.1);color:#5AC3E7}
.diff-card__priority.p4{background:rgba(123,79,190,.1);color:#7B4FBE}
.diff-card__priority.p5{background:rgba(6,214,160,.1);color:#06D6A0}
.diff-card h3{font-size:1.05rem;color:#fff;margin:8px 0 4px}
.diff-card__pillar{font-size:.78rem;color:rgba(255,255,255,.4)}
.diff-card__detail{display:none;margin-top:14px;padding-top:14px;border-top:1px solid rgba(90,195,231,.06)}
.diff-card.open .diff-card__detail{display:block}
.detail-row{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:8px}
.detail-box{padding:10px 12px;border-radius:6px;background:rgba(255,255,255,.02)}
.detail-box label{display:block;font-size:.68rem;color:#5AC3E7;font-weight:600;text-transform:uppercase;letter-spacing:.06em;margin-bottom:3px}
.detail-box p{font-size:.82rem;color:rgba(255,255,255,.6);line-height:1.5}
.detail-full{grid-column:1/-1}
.empty{text-align:center;padding:60px;color:rgba(255,255,255,.15);font-size:1rem}
@media(max-width:768px){.controls{flex-direction:column}.detail-row{grid-template-columns:1fr}.controls select{width:100%}}
</style>
</head>

nding body position and tension in space","level":"Todas las Cintas","notes":"Foundation for learning and correction"}],"Safety":[{"part":"Safety Signals","desc":"Understand and respect all visual and verbal safety signals used by the coach and in the lineup.","level":"Todas las Cintas","notes":"Signals are mandatory and override all other actions."},{"part":"Surf Etiquette","desc":"Respect right of way, priority rules, and safe distance between surfers.","level":"Todas las Cintas","notes":"Dropping in or unsafe behavior stops the session."},{"part":"Venue Analysis","desc":"Identify hazards, entry and exit zones, currents, and safe areas before entering the water.","level":"Todas las Cintas","notes":"“Look before you go” applies every session."},{"part":"Equipment Handling","desc":"Carry, control, and release the surfboard safely to avoid injuries to self and others.","level":"Todas las Cintas","notes":"Board control is a safety responsibility."},{"part":"Whitewater Management","desc":"Know how to pass whitewater safely using turtle roll or controlled exits.","level":"Cinta Blanca → Cinta Morada","notes":"Losing the board is considered a safety failure."},{"part":"Dismount Protocol","desc":"Use controlled dismounts (starfish or safe exit) to reduce impact and collision risk.","level":"Todas las Cintas","notes":"Never jump toward other surfers."},{"part":"Lineup Awareness","desc":"Maintain spatial awareness and avoid paddling through riding zones.","level":"Todas las Cintas","notes":"Paddle wide, never through the power zone."},{"part":"Decision Making","desc":"Recognize when NOT to go for a wave and choose safe alternatives.","level":"Todas las Cintas","notes":"Not paddling is sometimes the correct decision."},{"part":"Emergency Awareness","desc":"Identify panic, fatigue, or dangerous situations and signal for help if needed.","level":"Todas las Cintas","notes":"Stop surfing if safety is compromised."},{"part":"Physical Readiness","desc":"Enter the water only after proper warm-up and physical readiness.","level":"Todas las Cintas","notes":"Cold body = higher injury risk."},{"part":"Mental Readiness","desc":"Maintain calm, focus, and controlled breathing during all situations.","level":"Todas las Cintas","notes":"Panic breaks safety protocols."}]}};
let currentTab = 'sequences';

function switchTab(tab) {
  currentTab = tab;
  document.querySelectorAll('.tab').forEach((t,i) => {
    t.classList.toggle('active', ['sequences','errors','diagnostic'][i] === tab);
  });
  render();
}

function render() {
  const belt = document.getElementById('f-belt').value;
  const seq = document.getElementById('f-seq').value;
  const pillar = document.getElementById('f-pillar').value;
  const search = document.getElementById('f-search').value.toLowerCase();

  // Update sequence dropdown
  if (belt) {
    const seqs = [...new Set(DATA.sequences.filter(s=>s.belt===belt).map(s=>s.seq))].sort((a,b)=>a-b);
    const sel = document.getElementById('f-seq');
    const cur = sel.value;
    sel.innerHTML = '<option value="">All Sequences</option>' + seqs.map(s=>`<option value="${s}"${s==cur?' selected':''}>Sequence ${s}</option>`).join('');
  }

  if (currentTab === 'sequences') renderSequences(belt, seq, search);
  else if (currentTab === 'errors') renderErrors(belt, pillar, search);
  else renderDiagnostic(search);
}

function renderSequences(belt, seq, search) {
  let steps = DATA.sequences;
  if (belt) steps = steps.filter(s => s.belt === belt);
  if (seq) steps = steps.filter(s => s.seq == seq);
  if (search) steps = steps.filter(s => [s.part,s.expect,s.belt].join(' ').toLowerCase().includes(search));

  // Find matching errors for each step
  const solMap = {};
  DATA.solutions.forEach(s => {
    const key = s.part.toLowerCase();
    if (!solMap[key]) solMap[key] = [];
    solMap[key].push(s);
  });

  document.getElementById('stats').innerHTML = `<span>Showing <strong>${steps.length}</strong> sequence steps</span>` +
    (belt ? `<span>Belt: <strong>${belt}</strong></span>` : '') +
    (seq ? `<span>Sequence: <strong>${seq}</strong></span>` : '');

  if (!steps.length) { document.getElementById('tab-content').innerHTML = '<div class="empty">No steps match filters</div>'; return; }

  // Group by belt > sequence
  const groups = {};
  steps.forEach(s => {
    const key = s.belt + '|' + s.seq;
    if (!groups[key]) groups[key] = { belt: s.belt, seq: s.seq, steps: [] };
    groups[key].steps.push(s);
  });

  let html = '';
  Object.values(groups).forEach(g => {
    g.steps.sort((a,b) => a.step - b.step);
    html += `<div class="seq-group">
      <div class="seq-group__title"><span>${g.belt} — Sequence ${g.seq}</span><span style="font-size:.78rem;color:rgba(255,255,255,.3)">${g.steps.length} steps</span></div>`;

    g.steps.forEach(s => {
      // Find errors for this part
      const partKey = s.part.toLowerCase();
      const errors = solMap[partKey] || [];
      // Also search partial matches
      const partialErrors = DATA.solutions.filter(sol =>
        sol.part.toLowerCase().includes(partKey.split(' ')[0]) ||
        partKey.includes(sol.part.toLowerCase().split(' ')[0])
      ).filter(e => !errors.includes(e)).slice(0, 3);
      const allErrors = [...errors, ...partialErrors].slice(0, 5);

      const hasErrors = allErrors.length > 0;

      html += `<div class="step" onclick="this.classList.toggle('open')">
        <div class="step__header">
          <div class="step__num">${s.step}</div>
          <div class="step__name">${s.part}</div>
          ${hasErrors ? '<span style="font-size:.68rem;padding:2px 8px;border-radius:4px;background:rgba(255,107,107,.08);color:#FF6B6B">'+allErrors.length+' errors</span>' : ''}
          <div class="step__expand">▶</div>
        </div>
        <div class="step__body">
          <div class="step__section">
            <div class="step__section-title">✅ Performance Standard</div>
            <div class="expect-box">${s.expect || 'No standard defined yet'}</div>
          </div>`;

      if (allErrors.length) {
        html += '<div class="step__section"><div class="step__section-title">🔴 Common Errors & Corrections</div>';
        allErrors.forEach(e => {
          html += `<div class="error-item">
            <div class="err">❌ ${e.error}</div>
            <div class="sol">✅ ${e.solution}</div>
            ${e.notes ? '<div class="note">💡 '+e.notes+'</div>' : ''}
          </div>`;
        });
        html += '</div>';
      }

      html += '</div></div>';
    });
    html += '</div>';
  });

  document.getElementById('tab-content').innerHTML = html;
}

function renderErrors(belt, pillar, search) {
  let sols = DATA.solutions;
  if (pillar) sols = sols.filter(s => s.pillar === pillar);
  if (search) sols = sols.filter(s => [s.part,s.error,s.solution,s.notes].join(' ').toLowerCase().includes(search));

  document.getElementById('stats').innerHTML = `<span>Showing <strong>${sols.length}</strong> error-solution pairs</span>` +
    (pillar ? `<span>Pillar: <strong>${pillar}</strong></span>` : '');

  if (!sols.length) { document.getElementById('tab-content').innerHTML = '<div class="empty">No errors match filters</div>'; return; }

  // Group by pillar > part
  const groups = {};
  sols.forEach(s => {
    const key = s.pillar + '|' + s.part;
    if (!groups[key]) groups[key] = { pillar: s.pillar, part: s.part, items: [] };
    groups[key].items.push(s);
  });

  let html = '';
  Object.values(groups).forEach(g => {
    html += `<div class="seq-group">
      <div class="seq-group__title"><span>${g.pillar} → ${g.part}</span><span style="font-size:.78rem;color:rgba(255,255,255,.3)">${g.items.length} errors</span></div>`;
    g.items.forEach(e => {
      html += `<div class="error-item" style="margin-bottom:8px">
        <div class="err">❌ ${e.error}</div>
        <div class="sol">✅ ${e.solution}</div>
        ${e.notes ? '<div class="note">💡 '+e.notes+'</div>' : ''}
      </div>`;
    });
    html += '</div>';
  });

  document.getElementById('tab-content').innerHTML = html;
}

function renderDiagnostic(search) {
  let diffs = DATA.difficulties;
  if (search) diffs = diffs.filter(d => [d.name,d.errors,d.concept,d.pillar].join(' ').toLowerCase().includes(search));

  document.getElementById('stats').innerHTML = `<span>Showing <strong>${diffs.length}</strong> diagnostic difficulties</span>
    <span>Priority: <strong style="color:#FF6B6B">Critical</strong> → <strong style="color:#FFD166">High</strong> → <strong style="color:#5AC3E7">Performance</strong> → <strong style="color:#7B4FBE">Multiplier</strong> → <strong style="color:#06D6A0">Optimization</strong></span>`;

  let html = '';
  diffs.forEach(d => {
    const pClass = d.priority.includes('Criti') ? 'p1' : d.priority.includes('Alto') ? 'p2' : d.priority.includes('Perf') ? 'p3' : d.priority.includes('Multi') ? 'p4' : 'p5';
    html += `<div class="diff-card" onclick="this.classList.toggle('open')">
      <div class="diff-card__top">
        <div class="diff-card__num">#${d.num}</div>
        <div class="diff-card__priority ${pClass}">${d.priority}</div>
      </div>
      <h3>${d.name}</h3>
      <div class="diff-card__pillar">${d.pillar} | ${d.level}</div>
      <div class="diff-card__detail">
        <div class="detail-row">
          <div class="detail-box detail-full"><label>Errors / Symptoms</label><p>${d.errors.replace(/\|/g, ' · ')}</p></div>
        </div>
        <div class="detail-row">
          <div class="detail-box"><label>Key Concept</label><p>${d.concept}</p></div>
          <div class="detail-box"><label>Solution Blocks</label><p>${d.blocks}</p></div>
        </div>
        <div class="detail-row">
          <div class="detail-box"><label>First Drill Recommended</label><p>${d.drill}</p></div>
          <div class="detail-box"><label>Coach Notes</label><p>${d.notes}</p></div>
        </div>
      </div>
    </div>`;
  });

  document.getElementById('tab-content').innerHTML = html;
}

render();
</script>
